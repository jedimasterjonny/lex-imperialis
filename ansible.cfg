[defaults]
inventory = ./inventory
collections_path = ./collections:~/.ansible/collections

# Modern yaml-style stdout
stdout_callback = default
callback_result_format = yaml

# Quiet Python interpreter discovery deprecation warnings
interpreter_python = auto_silent

# Strict host keys — every scenario must seed known_hosts (Hetzner CI: pull fingerprint from API).
host_key_checking = true

[ssh_connection]
# Multiplex SSH for speed across many tasks against the same host
# Note: pipelining requires target sudoers without `requiretty` (modern distro default)
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30
pipelining = true
