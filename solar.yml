---
- name: Configure solar
  hosts: solar
  vars:
    # Match jonny's uid on the NAS (administratum: 1026; gid 100/users already
    # matches) so NFS ownership reconciles — the v4 mounts use numeric sec=sys,
    # which carries raw uids and bypasses name-based idmapping.
    common_user_uid: 1026
    # NFS exports from the NAS (administratum), each mounted at /nfs/<name>.
    nfs_shares:
      - name: scriptorum
        server: administratum
        export: /volume1/scriptorum
      - name: astropath
        server: administratum
        export: /volume2/astropath
    # Bring the arr stack up one container at a time.
    arr_enabled:
      - prowlarr
      - lidarr
      - radarr
      - sonarr
      - beets
      - recyclarr
      - plex
      - wireguard
      - transmission
    # Media lives under arr-data on the NAS; mounting it as /data makes the apps'
    # /data/media/... paths match their restored configs. The NAS owns the layout
    # and its perms, so the role creates no data dirs here.
    arr_data_root: /nfs/scriptorum/arr-data
    arr_data_dirs: {}
    # Firewall openings beyond the ssh baseline. caddy serves http/https, and
    # QUIC needs 443/udp too. Plex runs on the host network, so its ports are
    # opened here: 32400 plus the GDM/DLNA discovery set.
    firewalld_services:
      - ssh
      - http
      - https
    firewalld_ports:
      - 443/udp
      - 32400/tcp
      - 1900/udp
      - 5353/udp
      - 8324/tcp
      - 32410/udp
      - 32412-32414/udp
      - 32469/tcp
  roles:
    - common
    - sshd
    - firewalld
    - podman
    - autoupdate
    - nfs
    - caddy
    - arr
    - podman_backup
