---
extends: default
rules:
  comments:
    min-spaces-from-content: 1

  comments-indentation: false

  line-length:
    max: 160

  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1

  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true

ignore: |
  .venv/
  .molecule/
  collections/ansible_collections/*/*/changelogs/.plugin-cache.yaml
  collections/ansible_collections/*/*/changelogs/changelog.yaml
