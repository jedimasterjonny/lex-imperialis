---
# Shared across roles; role-agnostic via molecule_yml.platforms.
- name: Destroy
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Stop instances
      ansible.builtin.command: "virsh -c qemu:///system destroy {{ item.name }}"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      register: mol_stopped
      changed_when: mol_stopped.rc == 0
      failed_when:
        - mol_stopped.rc != 0
        - "'failed to get domain' not in mol_stopped.stderr"
        - "'not running' not in mol_stopped.stderr"

    - name: Undefine instances and their UEFI nvram
      ansible.builtin.command: "virsh -c qemu:///system undefine --nvram {{ item.name }}"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      register: mol_undefined
      changed_when: mol_undefined.rc == 0
      failed_when:
        - mol_undefined.rc != 0
        - "'failed to get domain' not in mol_undefined.stderr"

    - name: Remove instance disks
      ansible.builtin.file:
        path: "/var/lib/libvirt/images/{{ item.name }}.qcow2"
        state: absent
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
