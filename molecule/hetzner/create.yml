---
# Shared across roles; role-agnostic via molecule_yml.platforms. Each role's
# hetzner scenario references it via provisioner.playbooks.create.
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    mol_platform: "{{ molecule_yml.platforms[0] }}"
    mol_ssh_key: "{{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/ssh_key"
  vars_files:
    # The token is in the repo's single vault file. MOLECULE_SCENARIO_DIRECTORY
    # is the role's scenario dir; ../../../.. is the repo root.
    - "{{ lookup('env', 'MOLECULE_SCENARIO_DIRECTORY') }}/../../../../inventory/group_vars/all/vault.yml"
  tasks:
    - name: Generate an ephemeral SSH key
      ansible.builtin.command: "ssh-keygen -t ed25519 -N '' -f {{ mol_ssh_key }}"
      args:
        creates: "{{ mol_ssh_key }}"

    - name: Read the public key
      ansible.builtin.slurp:
        src: "{{ mol_ssh_key }}.pub"
      register: mol_pubkey

    # api_token is no_log in the module spec, so it stays redacted in output;
    # a task-level no_log would add nothing and would hide API errors.
    - name: Upload the public key to Hetzner
      hetzner.hcloud.ssh_key:
        api_token: "{{ hcloud_token }}"
        name: "{{ mol_platform.name }}-key"
        public_key: "{{ mol_pubkey.content | b64decode | trim }}"
        state: present

    - name: Launch the server
      hetzner.hcloud.server:
        api_token: "{{ hcloud_token }}"
        name: "{{ mol_platform.name }}"
        server_type: "{{ mol_platform.server_type }}"
        image: "{{ mol_platform.image }}"
        location: "{{ mol_platform.location }}"
        ssh_keys:
          - "{{ mol_platform.name }}-key"
        # openSUSE cloud images may ship without python3; cloud-init installs
        # it so Ansible can run. wait_for_connection below blocks until it lands.
        user_data: |
          #cloud-config
          packages:
            - python3
        state: started
      register: mol_server

    - name: Write the Molecule instance config
      ansible.builtin.copy:
        content: "{{ [mol_instance] | to_nice_yaml }}"
        dest: "{{ molecule_instance_config }}"
        mode: "0600"
      vars:
        mol_instance:
          instance: "{{ mol_platform.name }}"
          address: "{{ mol_server.hcloud_server.ipv4_address }}"
          user: root
          port: 22
          identity_file: "{{ mol_ssh_key }}"

    - name: Add the server to the in-memory inventory
      ansible.builtin.add_host:
        name: "{{ mol_platform.name }}"
        groups: hetzner
        ansible_host: "{{ mol_server.hcloud_server.ipv4_address }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ mol_ssh_key }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      changed_when: false

# Static group, not a molecule_yml template: the hosts keyword is resolved at
# syntax-check time, when molecule_yml is undefined.
- name: Wait for the server to be ready for Ansible
  hosts: hetzner
  gather_facts: false
  tasks:
    # Blocks on the SSH port, then on a ping test — i.e. until cloud-init has
    # installed python3. Retries until the timeout.
    - name: Wait for SSH and python3
      ansible.builtin.wait_for_connection:
        timeout: 300

    # python3 being up does not mean cloud-init is done: it installs packages via
    # zypper and holds the zypper lock until it finishes, so a converge that runs
    # zypper races it (rc 7, "system management is locked"). Block until done.
    - name: Wait for cloud-init to finish
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      failed_when: false
