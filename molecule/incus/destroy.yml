---
# Shared across roles; role-agnostic via molecule_yml.platforms.
- name: Destroy
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Delete instances
      ansible.builtin.command: "incus delete --force {{ item.name }}"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      register: mol_deleted
      changed_when: mol_deleted.rc == 0
      failed_when:
        - mol_deleted.rc != 0
        - "'Instance not found' not in mol_deleted.stderr"
