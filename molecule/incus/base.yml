---
# Tier config for this tier's scenarios (default and leap): molecule deep-merges
# it under a scenario's molecule.yml when the make targets pass it as the base
# config (-c). See molecule/README.md.
#
# Never name playbooks.prepare here — a base config sets a floor, so it would
# mask the prepare.yml a scenario ships.
provisioner:
  playbooks:
    create: "${MOLECULE_SCENARIO_DIRECTORY}/../../../../molecule/incus/create.yml"
    destroy: "${MOLECULE_SCENARIO_DIRECTORY}/../../../../molecule/incus/destroy.yml"
  config_options:
    defaults:
      roles_path: "${MOLECULE_SCENARIO_DIRECTORY}/../../.."
  inventory:
    group_vars:
      all:
        ansible_connection: community.general.incus
        ansible_incus_remote: local
