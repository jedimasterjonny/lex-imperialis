---
# Shared across roles: drives incus from molecule_yml.platforms, so it is
# role-agnostic. incus/base.yml wires it in as provisioner.playbooks.create.
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    # A platform's optional `config` map renders as -c key=value launch
    # options, e.g. security.nesting for roles that run nested containers.
    - name: Launch instances
      ansible.builtin.command: >-
        incus launch {{ item.image }} {{ item.name }}
        {% for option in item.config | default({}) | dict2items %} -c {{ option.key }}={{ option.value }}{% endfor %}
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      register: mol_launch
      changed_when: mol_launch.rc == 0
      failed_when:
        - mol_launch.rc != 0
        - "'already exists' not in mol_launch.stderr"

    # Network-online implies exec responds; converges that fetch packages
    # otherwise race the boot's DHCP/DNS setup.
    - name: Wait until instances are online
      ansible.builtin.command: "incus exec {{ item.name }} -- systemctl is-active network-online.target"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      register: mol_online
      until: mol_online.rc == 0
      retries: 30
      delay: 2
      changed_when: false

    # The Tumbleweed mirror CDN intermittently times out serving repo metadata
    # (curl 28), which a converge install reports as "No provider of <pkg> found".
    # Prime the cache here, retried, so the install reuses fresh metadata within
    # zypper's refresh window instead of racing a flaky refresh of its own.
    - name: Prime the zypper metadata cache
      ansible.builtin.command: "incus exec {{ item.name }} -- zypper --non-interactive refresh"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      register: mol_refresh
      until: mol_refresh.rc == 0
      retries: 5
      delay: 10
      changed_when: false
