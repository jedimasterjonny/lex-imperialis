---
# Shared across roles: drives incus from molecule_yml.platforms, so it is
# role-agnostic. Each role's default scenario references it via
# provisioner.playbooks.create.
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Launch instances
      ansible.builtin.command: "incus launch {{ item.image }} {{ item.name }}"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      register: mol_launch
      changed_when: mol_launch.rc == 0
      failed_when:
        - mol_launch.rc != 0
        - "'already exists' not in mol_launch.stderr"

    - name: Wait until instances respond to exec
      ansible.builtin.command: "incus exec {{ item.name }} -- true"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      register: mol_ping
      until: mol_ping.rc == 0
      retries: 30
      delay: 2
      changed_when: false
