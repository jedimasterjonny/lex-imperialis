---
# Shared across roles: the cloud images ship a default user holding uid 1000,
# which common pins for the owner — `opensuse` on Tumbleweed, `sles` on Leap 16.
# Scenarios that create the owner symlink this into their directory (common, dev).
- name: Prepare
  hosts: all
  tasks:
    - name: Remove the image's cloud user
      ansible.builtin.user:
        name: "{{ item }}"
        state: absent
        remove: true
      loop:
        - opensuse
        - sles
      become: true
