---
- name: Destroy Incus container
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    platform: "{{ molecule_yml.platforms[0] }}"
    container_name: "{{ platform.name }}"

  tasks:
    - name: Check whether the container exists
      ansible.builtin.command: incus info {{ container_name }}
      register: incus_info
      changed_when: false
      failed_when: false

    - name: Delete container if present
      ansible.builtin.command: incus delete --force {{ container_name }}
      when: incus_info.rc == 0
      changed_when: true

    - name: Truncate Molecule instance config
      ansible.builtin.copy:
        content: "{{ [] | to_nice_yaml }}"
        dest: "{{ molecule_instance_config }}"
        mode: '0644'
