---
- name: Create Hetzner server for Molecule
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    platform: "{{ molecule_yml.platforms[0] }}"
    server_name: "{{ platform.name }}"
    server_type: "{{ platform.server_type | default('cx23') }}"
    server_image: "{{ platform.image | default('opensuse-16') }}"
    # An explicit platform.location pins every attempt to one region (useful
    # for reproducing a region-specific failure). Empty/unset means "try every
    # region where the server_type is supported" — derived from the Hetzner
    # API below so new regions are picked up automatically.
    explicit_location: "{{ platform.location | default('') }}"
    # Fallback server_types are tried in order after `server_type` has been
    # exhausted across every candidate region. The default chain — cx23 →
    # cpx22 → ccx13 — walks shared-x86 cost_optimized → shared-x86
    # regular_purpose (slightly pricier, larger disk) → dedicated-x86
    # general_purpose (always in stock at time of writing). All three boot
    # opensuse-16 and share the x86 architecture. Override per-scenario when
    # a role needs a specific resource profile.
    fallback_server_types: "{{ platform.fallback_server_types | default(['cpx22', 'ccx13']) }}"
    attempt_server_types: "{{ ([server_type] + fallback_server_types) | unique }}"
    # MOLECULE_RUN_ID (set by .github/workflows/molecule.yml) scopes labels
    # per matrix entry so concurrent entries can't sweep each other's servers
    # via cleanup-orphans.yml. Falls back to bare GITHUB_RUN_ID outside that
    # workflow, or `local` for developer runs.
    run_id: "{{ lookup('env', 'MOLECULE_RUN_ID') | default(lookup('env', 'GITHUB_RUN_ID'), true) | default('local', true) }}"
    ssh_key_path: "{{ molecule_ephemeral_directory }}/ssh_key"
    hcloud_api: "https://api.hetzner.cloud/v1"

  tasks:
    - name: Verify HCLOUD_TOKEN is set
      ansible.builtin.assert:
        that:
          - lookup('env', 'HCLOUD_TOKEN') | length > 0
        fail_msg: "HCLOUD_TOKEN env var is not set."

    - name: Generate ephemeral SSH keypair for this scenario
      community.crypto.openssh_keypair:
        path: "{{ ssh_key_path }}"
        type: ed25519
        force: false

    - name: Read public key
      ansible.builtin.slurp:
        src: "{{ ssh_key_path }}.pub"
      register: ssh_pub

    - name: Set ssh_public_key fact
      ansible.builtin.set_fact:
        ssh_public_key: "{{ ssh_pub.content | b64decode | trim }}"

    - name: Upload public key to Hetzner for this scenario
      # Hetzner's API-driven key injection runs before image bootstrap and
      # primes /root/.ssh/authorized_keys directly, sidestepping cloud-init.
      # On openSUSE Leap images this also avoids the expired-root-password
      # PAM block that cloud-init key injection trips into. Labels mirror
      # the server so cleanup-orphans.yml can sweep both by run_id.
      hetzner.hcloud.ssh_key:
        api_token: "{{ lookup('env', 'HCLOUD_TOKEN') }}"
        name: "{{ server_name }}-key"
        public_key: "{{ ssh_public_key }}"
        labels:
          purpose: molecule-ci
          run_id: "{{ run_id }}"
        state: present
      register: hcloud_ssh_key

    - name: Render cloud-init user-data
      ansible.builtin.template:
        src: templates/cloud-init-user-data.j2
        dest: "{{ molecule_ephemeral_directory }}/user-data"
        mode: '0644'

    - name: Read rendered user-data
      ansible.builtin.slurp:
        src: "{{ molecule_ephemeral_directory }}/user-data"
      register: user_data_blob

    # Placement walks two nested loops:
    #   outer: server_type ∈ [server_type] + fallback_server_types
    #   inner: location  ∈ regions supporting that server_type (shuffled)
    # First success short-circuits both loops via placement_succeeded.
    #
    # Hetzner periodically runs out of capacity for the cost_optimized cx*
    # line — sometimes globally — and the create-server call comes back with
    # `resource_unavailable`. Cycling regions handles a single-region
    # stockout; cycling server_types handles a whole-line stockout. Together
    # CI no longer needs a human `gh run rerun`.
    #
    # We filter the datacenter list by `server_types.supported` rather than
    # `server_types.available`. The latter tracks momentary stock and lags
    # reality — during a stockout it is empty even in regions that accept
    # provisioning seconds later. The per-attempt loop below treats Hetzner's
    # create-server call as the authoritative real-time stock check.
    - name: List Hetzner datacenters
      ansible.builtin.uri:
        url: "{{ hcloud_api }}/datacenters"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('env', 'HCLOUD_TOKEN') }}"
        return_content: true
      register: hcloud_datacenters

    - name: Initialise placement sentinel and attempt log
      ansible.builtin.set_fact:
        placement_succeeded: false
        placement_attempts: []

    - name: Attempt provisioning across server_types until one succeeds
      ansible.builtin.include_tasks: try-server-type.yml
      loop: "{{ attempt_server_types }}"
      loop_control:
        loop_var: candidate_server_type
      when: not placement_succeeded

    - name: Assert placement succeeded somewhere
      ansible.builtin.assert:
        that:
          - placement_succeeded
        fail_msg: >-
          Placement failed across every (server_type, location) pair attempted.
          Attempts:
          {{ placement_attempts | to_nice_yaml }}

    - name: Report chosen placement
      ansible.builtin.debug:
        msg: "Provisioned {{ server_name }} as {{ chosen_server_type }} in {{ chosen_location }}."

    - name: Wait for SSH on the server
      ansible.builtin.wait_for:
        host: "{{ hcloud_server.hcloud_server.ipv4_address }}"
        port: 22
        timeout: 180
        state: started

    - name: Add server to in-memory inventory for the wait tasks
      ansible.builtin.add_host:
        name: "{{ server_name }}"
        ansible_host: "{{ hcloud_server.hcloud_server.ipv4_address }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ ssh_key_path }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      changed_when: false

    - name: Wait for Ansible connectivity to the server
      ansible.builtin.wait_for_connection:
        timeout: 180
      delegate_to: "{{ server_name }}"
      # delegate_to swaps the target host but not the play's connection plugin,
      # so without this override these tasks would run via connection=local
      # on the controller instead of SSHing into the server.
      connection: ssh

    - name: Wait for cloud-init boot-finished marker
      ansible.builtin.wait_for:
        path: /var/lib/cloud/instance/boot-finished
        timeout: 180
      delegate_to: "{{ server_name }}"
      connection: ssh

    - name: Build Molecule instance config entry
      ansible.builtin.set_fact:
        instance_conf_entry:
          instance: "{{ server_name }}"
          address: "{{ hcloud_server.hcloud_server.ipv4_address }}"
          user: root
          port: "22"
          identity_file: "{{ ssh_key_path }}"
          connection: ssh

    - name: Write Molecule instance config
      ansible.builtin.copy:
        content: "{{ [instance_conf_entry] | to_nice_yaml }}"
        dest: "{{ molecule_instance_config }}"
        mode: '0644'
