---
- name: Create libvirt VM for Molecule
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # community.libvirt needs the system libvirt-python bindings (installed by
    # lab-bootstrap as python<ver>-libvirt-python); the dev venv doesn't see
    # system site-packages, so run this play under the system interpreter.
    ansible_python_interpreter: /usr/bin/python3
    platform: "{{ molecule_yml.platforms[0] }}"
    vm_name: "{{ platform.name }}"
    backing_image: /var/lib/libvirt/images/tumbleweed-base.qcow2
    vm_overlay: "/var/lib/libvirt/images/{{ vm_name }}.qcow2"
    vm_seed_iso: "/var/lib/libvirt/images/{{ vm_name }}-seed.iso"
    vm_memory_mb: 1024
    vm_vcpus: 2
    ssh_key_path: "{{ molecule_ephemeral_directory }}/ssh_key"

  tasks:
    - name: Generate ephemeral SSH keypair for this scenario
      community.crypto.openssh_keypair:
        path: "{{ ssh_key_path }}"
        type: ed25519
        force: false

    - name: Read public key
      ansible.builtin.slurp:
        src: "{{ ssh_key_path }}.pub"
      register: ssh_pub

    - name: Set ssh_public_key fact
      ansible.builtin.set_fact:
        ssh_public_key: "{{ ssh_pub.content | b64decode | trim }}"

    - name: Render cloud-init user-data
      ansible.builtin.template:
        src: templates/cloud-init-user-data.j2
        dest: "{{ molecule_ephemeral_directory }}/user-data"
        mode: '0644'

    - name: Render cloud-init meta-data
      ansible.builtin.template:
        src: templates/cloud-init-meta-data.j2
        dest: "{{ molecule_ephemeral_directory }}/meta-data"
        mode: '0644'

    - name: Build cloud-init seed ISO
      ansible.builtin.command: >
        mkisofs
        -output {{ vm_seed_iso }}
        -volid cidata
        -joliet -rock
        {{ molecule_ephemeral_directory }}/user-data
        {{ molecule_ephemeral_directory }}/meta-data
      args:
        creates: "{{ vm_seed_iso }}"

    - name: Create copy-on-write overlay disk
      ansible.builtin.command: >
        qemu-img create -f qcow2
        -F qcow2
        -b {{ backing_image }}
        {{ vm_overlay }}
        20G
      args:
        creates: "{{ vm_overlay }}"

    - name: Define VM via virt-install (without starting console)
      ansible.builtin.command: >
        virt-install
        --connect qemu:///system
        --name {{ vm_name }}
        --memory {{ vm_memory_mb }}
        --vcpus {{ vm_vcpus }}
        --disk path={{ vm_overlay }},format=qcow2,bus=virtio
        --disk path={{ vm_seed_iso }},device=cdrom
        --import
        --os-variant=opensusetumbleweed
        --network network=default,model=virtio
        --noautoconsole
        --noreboot
      args:
        creates: "/etc/libvirt/qemu/{{ vm_name }}.xml"

    - name: Start the VM
      community.libvirt.virt:
        name: "{{ vm_name }}"
        state: running

    - name: Wait for VM to acquire DHCP lease
      ansible.builtin.shell: >
        set -o pipefail;
        virsh -c qemu:///system domifaddr {{ vm_name }}
        | awk '/ipv4/ {print $4}'
        | cut -d/ -f1
      register: vm_ip
      retries: 60
      delay: 2
      until: vm_ip.stdout | length > 0
      changed_when: false

    - name: Wait for SSH on the VM to accept connections
      ansible.builtin.wait_for:
        host: "{{ vm_ip.stdout }}"
        port: 22
        timeout: 120
        state: started

    - name: Add VM to in-memory inventory for the wait tasks
      ansible.builtin.add_host:
        name: "{{ vm_name }}"
        ansible_host: "{{ vm_ip.stdout }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ ssh_key_path }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      changed_when: false

    - name: Wait for Ansible connectivity to the VM
      ansible.builtin.wait_for_connection:
        timeout: 180
      delegate_to: "{{ vm_name }}"
      # delegate_to swaps the target host but not the play's connection plugin,
      # so without this override these tasks would run via connection=local
      # on the controller instead of SSHing into the VM.
      connection: ssh

    - name: Wait for cloud-init boot-finished marker
      ansible.builtin.wait_for:
        path: /var/lib/cloud/instance/boot-finished
        timeout: 180
      delegate_to: "{{ vm_name }}"
      connection: ssh

    - name: Build Molecule instance config entry
      ansible.builtin.set_fact:
        instance_conf_entry:
          instance: "{{ vm_name }}"
          address: "{{ vm_ip.stdout }}"
          user: root
          port: "22"
          identity_file: "{{ ssh_key_path }}"
          connection: ssh

    - name: Write Molecule instance config
      ansible.builtin.copy:
        content: "{{ [instance_conf_entry] | to_nice_yaml }}"
        dest: "{{ molecule_instance_config }}"
        mode: '0644'
