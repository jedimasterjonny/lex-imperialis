---
# Collections are installed by `make setup` into ~/.ansible/collections, so we
# omit molecule's `dependency:` stage to avoid the "Missing requirements file"
# noise. The sequence overrides below list only the phases we ship playbooks
# for — preventing molecule from warning about missing prepare/cleanup hooks.

driver:
  name: default

platforms:
  - name: molecule-lex-dev-default
    image: tumbleweed

provisioner:
  name: ansible
  playbooks:
    create: ../../../../molecule/shared/incus/create.yml
    destroy: ../../../../molecule/shared/incus/destroy.yml
    # converge.yml and verify.yml live one level up, at roles/<role>/molecule/,
    # shared across all scenarios (default, full, ci, …) for this role.
    converge: ../converge.yml
    verify: ../verify.yml
  inventory:
    host_vars:
      molecule-lex-dev-default:
        ansible_connection: community.general.incus
        ansible_user: root
  # Tier 1 keeps both host-config gates at their defaults (false): an
  # incus-in-incus container can't enable virt-host services like
  # incus.socket or the virt*d sockets. The general-dev package set and
  # the (now libvirt-free) Ansible-author Python bindings install
  # cleanly, so we exercise everything except the gated paths here.
  # The full and ci scenarios flip the gates on to cover the rest.

verifier:
  name: ansible

scenario:
  create_sequence:
    - create
  converge_sequence:
    - create
    - converge
  destroy_sequence:
    - destroy
  test_sequence:
    - destroy
    - syntax
    - create
    - converge
    - idempotence
    - verify
    - destroy
