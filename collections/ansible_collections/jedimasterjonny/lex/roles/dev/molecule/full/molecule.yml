---
# Tier-2 (libvirt) scenario — validates the role end-to-end against a real
# kernel by flipping both host-config gates on. Tier 1 (incus-in-incus)
# can't run virt-host services so the gated paths go untested there; this
# scenario covers them on a libvirt VM.
#
# The VM has no CPU host-passthrough, so nested KVM is unavailable — the
# role itself doesn't boot guests, only installs/configures the host
# surface (sockets, preseed, firewalld trust, group membership, perms,
# helper drop), so the missing nested KVM doesn't reduce coverage.
#
# dev_incus_images is left empty: pulling an Incus image in CI costs more
# time than it pays back in coverage. Pre-warm is exercised on the real
# lab box.
#
# extra-vars precedence beats vars_files (the verify playbook loads role
# defaults via vars_files), so this override propagates to both converge
# and verify.

driver:
  name: default

platforms:
  - name: molecule-lex-dev-full
    image: tumbleweed

provisioner:
  name: ansible
  playbooks:
    create: ../../../../molecule/shared/libvirt/create.yml
    destroy: ../../../../molecule/shared/libvirt/destroy.yml
    # converge.yml and verify.yml live one level up, at roles/<role>/molecule/,
    # shared across all scenarios (default, full, ci, …) for this role.
    converge: ../converge.yml
    verify: ../verify.yml
  # Override role defaults to flip both host-config gates on; full vars
  # (including a dir-driver preseed override for non-btrfs filesystems) live
  # in roles/dev/molecule/host-config-vars.yml alongside this scenario.
  options:
    extra-vars: "@../host-config-vars.yml"

verifier:
  name: ansible

scenario:
  create_sequence:
    - create
  converge_sequence:
    - create
    - converge
  destroy_sequence:
    - destroy
  test_sequence:
    - destroy
    - syntax
    - create
    - converge
    - idempotence
    - verify
    - destroy
