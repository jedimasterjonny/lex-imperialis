---
# Default vars for jedimasterjonny.lex.common role.

# Operator accounts to ensure exist on the host. Empty by default —
# many consumers provision their accounts out of band (cloud-init,
# image baking, …). Each entry is a dict; `name` is required;
# `uid`/`group`/`shell` are optional and forwarded to
# ansible.builtin.user (omitted attributes fall back to the module's
# defaults).
common_users: []

# Packages installed on every Lex Imperialis host.
common_packages:
  - htop
  - openssh
  - python3-rpm
  - stow
  - sudo
  - vim

# GNU stow dotfiles. When common_stow_users is non-empty, clones
# common_dots_repo to ~/dots for each user and stows the packages in
# common_stow_packages from there. Stow runs with `--adopt` and the
# role then git-restores ~/dots back to upstream HEAD, so any
# pre-existing target file (e.g. an /etc/skel-seeded ~/.bashrc) is
# replaced by a symlink to upstream content. Any local edits to
# ~/dots are wiped on re-run — the role treats the clone as a
# read-only mirror.
#
# common_dots_repo intentionally has no default — the role would
# otherwise quietly install the maintainer's personal dotfiles on
# any consumer who set common_stow_users without thinking about the
# repo. The task layer asserts this is set when common_stow_users
# is non-empty; leave it null otherwise and stow runs are skipped.
common_dots_repo: null
common_stow_packages:
  - bash-suse
common_stow_users: []
