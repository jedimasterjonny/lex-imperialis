---
# Run first: any downstream task that becomes one of these users
# would fail with "user does not exist" if the account hadn't been
# created yet. Defaults to an empty list, so the task is a noop for
# consumers that provision accounts out of band.
- name: Ensure configured users exist
  ansible.builtin.user:
    name: "{{ item.name }}"
    uid: "{{ item.uid | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
    shell: "{{ item.shell | default(omit) }}"
    state: present
  loop: "{{ common_users }}"
  loop_control:
    label: "{{ item.name }}"

# Idempotent by nature: the module only acts when the live hostname differs
# from common_hostname, so on a correctly-provisioned host this is a no-op
# that doubles as an assertion the name is right. Defaults to the short
# inventory_hostname — the DNS search domain below supplies the FQDN.
- name: Set the system hostname
  ansible.builtin.hostname:
    name: "{{ common_hostname }}"

# The search domain must be applied through whatever owns /etc/resolv.conf, and
# that differs across the fleet: netconfig on Tumbleweed (resolv.conf ->
# /run/netconfig/resolv.conf), systemd-resolved on Leap 16 (-> /run/systemd/
# resolve/stub-resolv.conf). Resolve the symlink and dispatch on its target
# rather than guessing from the distribution — a Leap 16 host carrying a
# leftover /etc/sysconfig/network/config but no netconfig binary would fool a
# name- or file-presence check and then crash the `netconfig update` handler.
- name: Configure DNS search domains
  when: common_search_domains | length > 0
  block:
    - name: Stat /etc/resolv.conf to find the active resolver
      ansible.builtin.stat:
        path: /etc/resolv.conf
      register: __common_resolv_stat

    # systemd-resolved does not always own resolv.conf via a symlink: some Leap
    # 16 cloud images ship it as a regular file while resolved still runs and is
    # the intended resolver. A running resolved always maintains its stub under
    # /run/systemd/resolve/, so stat that as the capability probe rather than
    # relying on the symlink alone — and without shelling out to systemctl.
    - name: Probe whether systemd-resolved is running
      ansible.builtin.stat:
        path: /run/systemd/resolve/stub-resolv.conf
      register: __common_resolved_stub

    - name: Select the DNS search-domain mechanism
      ansible.builtin.set_fact:
        __common_dns_mechanism: >-
          {{ 'netconfig' if 'netconfig' in __common_resolv_link
             else 'systemd-resolved'
             if ('systemd' in __common_resolv_link
                 or __common_resolved_stub.stat.exists)
             else 'unknown' }}
      vars:
        __common_resolv_link: "{{ __common_resolv_stat.stat.lnk_target | default('') }}"

    - name: Assert a supported resolver manages /etc/resolv.conf
      ansible.builtin.assert:
        that:
          - __common_dns_mechanism != 'unknown'
        fail_msg: >-
          common_search_domains is set but /etc/resolv.conf is managed by
          neither netconfig nor systemd-resolved (symlink target:
          {{ __common_resolv_stat.stat.lnk_target | default('<not a symlink>') }}).
          Apply the search domain through the host's active resolver, or unset
          common_search_domains here.

    # Tumbleweed / netconfig: set the static searchlist and let `netconfig
    # update` (handler) regenerate resolv.conf. NETCONFIG_DNS_POLICY=auto merges
    # the static list with interface-provided domains. The config file is
    # guaranteed present here — resolv.conf already points into netconfig's tree.
    - name: Set the netconfig static search list
      when: __common_dns_mechanism == 'netconfig'
      ansible.builtin.lineinfile:
        path: /etc/sysconfig/network/config
        regexp: '^NETCONFIG_DNS_STATIC_SEARCHLIST='
        line: 'NETCONFIG_DNS_STATIC_SEARCHLIST="{{ common_search_domains | join(" ") }}"'
      notify: Apply netconfig

    # Leap 16 / systemd-resolved: a resolved.conf.d drop-in. The 00- prefix
    # sorts first; resolved merges Domains= across drop-ins, so this adds our
    # suffixes alongside any interface-provided ones rather than replacing them.
    - name: Apply search domains via systemd-resolved
      when: __common_dns_mechanism == 'systemd-resolved'
      block:
        - name: Ensure the systemd-resolved drop-in directory exists
          ansible.builtin.file:
            path: /etc/systemd/resolved.conf.d
            state: directory
            owner: root
            group: root
            mode: '0755'

        - name: Install the systemd-resolved search-domain drop-in
          ansible.builtin.template:
            src: lex-search.conf.j2
            dest: /etc/systemd/resolved.conf.d/00-lex-search.conf
            owner: root
            group: root
            mode: '0644'
          notify: Restart systemd-resolved

- name: Install baseline packages
  community.general.zypper:
    name: "{{ common_packages }}"
    state: present

- name: Enable and start sshd
  ansible.builtin.systemd_service:
    name: sshd
    enabled: true
    state: started

- name: Apply sshd hardening
  when: common_sshd_harden
  block:
    # HostKeyAlgorithms in the drop-in offers only Ed25519 and RSA. On an
    # image whose only host key is ECDSA — or one with no host keys yet (a
    # cloud image that defers key generation) — sshd would have nothing to
    # offer and the next connection would fail host-key negotiation: a green
    # run that bricks SSH. ssh-keygen -A generates any missing default host
    # keys (Ed25519 included) and `creates:` keeps it idempotent; this also
    # guarantees the sshd -t/-T checks below have a key to load.
    - name: Ensure default host keys exist (Ed25519 for the hardened algorithms)
      ansible.builtin.command:
        cmd: ssh-keygen -A
        creates: /etc/ssh/ssh_host_ed25519_key
      notify: Reload sshd

    # The drop-in is only honoured if some sshd_config Includes the
    # directory. openSUSE's stock layout depends on the OpenSSH build:
    # vendor configs at /usr/etc/ssh/sshd_config (Tumbleweed 10.x) ship
    # the Include directive already; Leap 16's /etc/ssh/sshd_config
    # override does not. Touch only the /etc copy when it exists — never
    # the /usr/etc vendor file — and insert at BOF so first-match-wins
    # makes our drop-in beat anything later in the main config.
    - name: Probe for an /etc-level sshd_config override
      ansible.builtin.stat:
        path: /etc/ssh/sshd_config
      register: __common_sshd_config_stat

    # The drop-in only wins if its Include is the FIRST occurrence in the
    # resolved config: sshd is first-match-wins, so an Include that lands
    # after a directive in the main file lets the main file win. A plain
    # lineinfile is not enough — when its regexp matches an existing Include
    # anywhere (e.g. one a previous admin appended at EOF) it edits that line
    # IN PLACE and ignores insertbefore, so the drop-in would be read last
    # and silently lose. Slurp the file and only rewrite when the canonical
    # Include is not already the leading directive.
    - name: Read /etc/ssh/sshd_config to check Include placement
      ansible.builtin.slurp:
        src: /etc/ssh/sshd_config
      register: __common_sshd_config_raw
      when: __common_sshd_config_stat.stat.exists

    # Reduce to the first directive (skipping comments and blanks); the
    # block below keys its when: on this, so it stays a plain string rather
    # than a templated bool that could stringify to a truthy "False".
    - name: Find the first directive in /etc/ssh/sshd_config
      ansible.builtin.set_fact:
        __common_sshd_first_directive: >-
          {{ (__common_sshd_config_raw.content | b64decode).splitlines()
             | map('trim') | reject('match', '^#') | reject('match', '^$')
             | list | first | default('') }}
      when: __common_sshd_config_stat.stat.exists

    # Gated on misplacement so re-runs are a no-op (idempotence): strip any
    # existing Include of the drop-in dir — wherever it sits, whatever its
    # glob — then insert the canonical `*.conf` Include at BOF. Splitting the
    # remove from the add is what lets insertbefore actually fire: the add's
    # line no longer matches anything, so lineinfile honours BOF.
    - name: Lead /etc/ssh/sshd_config with the drop-in Include
      when:
        - __common_sshd_config_stat.stat.exists
        - not (__common_sshd_first_directive is match('Include\s+/etc/ssh/sshd_config\.d/\*\.conf$'))
      block:
        - name: Strip any stray drop-in Include
          ansible.builtin.lineinfile:
            path: /etc/ssh/sshd_config
            regexp: '^\s*Include\s+/etc/ssh/sshd_config\.d/'
            state: absent
            validate: 'sshd -t -f %s'
          notify: Reload sshd

        - name: Insert the drop-in Include at the top
          ansible.builtin.lineinfile:
            path: /etc/ssh/sshd_config
            line: 'Include /etc/ssh/sshd_config.d/*.conf'
            insertbefore: BOF
            validate: 'sshd -t -f %s'
          notify: Reload sshd

    # Intersect the preferred KEX allowlist with what the running sshd
    # actually supports. Older OpenSSH (e.g. pre-9.9, no mlkem) simply
    # drops algorithms it doesn't recognise; newer OpenSSH picks them up
    # the next time __common_sshd_kex_preferred widens. Avoids the
    # per-distro hardcoded lists that go stale with image snapshots.
    # `ssh -Q kex` rather than `sshd -Q kex` because sshd dropped `-Q` in
    # OpenSSH 10. The client and server share the crypto code, so the
    # client's list is the same as what sshd will accept.
    - name: Discover OpenSSH-supported KEX algorithms
      ansible.builtin.command: ssh -Q kex
      register: __common_sshd_supported_kex
      changed_when: false
      check_mode: false

    # `select('in', …)` rather than `intersect`: intersect reduces to
    # `list(set(a) & set(b))`, whose ordering is hash-randomised, so the
    # rendered KexAlgorithms line would shuffle on every run and the
    # template would never settle. select preserves the order of
    # __common_sshd_kex_preferred so output is stable. Set as a fact so
    # the assert below and the template task see the same value.
    - name: Compute the effective KEX allowlist
      ansible.builtin.set_fact:
        __common_sshd_kex_effective: >-
          {{ __common_sshd_kex_preferred
             | select('in', __common_sshd_supported_kex.stdout_lines)
             | list }}

    # Empty intersection means none of our preferred algorithms are in
    # the running OpenSSH. The template would render `KexAlgorithms `
    # (empty value) and `sshd -t` would reject it during validate, but
    # the failure message would be terse. Fail here with a clear pointer
    # back to vars/main.yml instead.
    - name: Assert at least one preferred KEX algorithm is supported
      ansible.builtin.assert:
        that:
          - __common_sshd_kex_effective | length > 0
        fail_msg: >-
          None of the algorithms in __common_sshd_kex_preferred
          (roles/common/vars/main.yml) are supported by this host's
          OpenSSH build. Widen the allowlist or update the host.

    # Named 00-* so it sorts first in sshd_config.d/ and wins under sshd's
    # first-match-wins rule — otherwise a cloud-init drop-in
    # (50-cloud-init.conf, sorts before 50-*) would set PermitRootLogin /
    # PasswordAuthentication ahead of us and our hardening would silently
    # lose. validate runs `sshd -t -f` against the candidate file before
    # ansible swaps it into place, so a typo or unknown algo fails the task
    # without ever touching the live config.
    - name: Install hardened sshd drop-in
      ansible.builtin.template:
        src: 00-lex-hardening.conf.j2
        dest: /etc/ssh/sshd_config.d/00-lex-hardening.conf
        owner: root
        group: root
        mode: '0644'
        validate: 'sshd -t -f %s'
      notify: Reload sshd

    # `sshd -t` accepted the file in isolation, but that does not prove the
    # drop-in is actually winning. `sshd -T` re-resolves the whole Include
    # chain (from /etc and /usr/etc) and prints the effective directives, so
    # we assert that our load-bearing values are the ones in force.
    - name: Capture the resolved sshd config to confirm the drop-in is loaded
      ansible.builtin.command: sshd -T
      register: __common_sshd_resolved
      changed_when: false
      check_mode: false

    # Assert on the values the drop-in is meant to enforce — not a passive
    # canary. This fails loudly in both silent-failure modes: no file in the
    # chain Includes /etc/ssh/sshd_config.d/ (the values fall back to sshd
    # defaults), or a higher-precedence directive shadows the drop-in (the
    # main file set these before our Include is read). Comparing the full
    # KexAlgorithms list to the computed allowlist catches a reordered or
    # truncated negotiation that a substring check would miss.
    - name: Assert the hardening drop-in is the effective sshd config
      ansible.builtin.assert:
        that:
          # sshd -T renders prohibit-password as its deprecated-but-identical
          # alias 'without-password' on some builds (e.g. Leap 16) and as
          # 'prohibit-password' on newer ones (Tumbleweed); accept either.
          - __common_sshd_resolved_lines | select('match', '^permitrootlogin (prohibit-password|without-password)$') | list | length > 0
          - "'passwordauthentication no' in __common_sshd_resolved_lines"
          - "'kbdinteractiveauthentication no' in __common_sshd_resolved_lines"
          - __common_sshd_resolved_kex == __common_sshd_kex_effective
        fail_msg: >-
          Installed /etc/ssh/sshd_config.d/00-lex-hardening.conf but the
          effective sshd config does not reflect it. Either no file in the
          sshd_config chain Includes /etc/ssh/sshd_config.d/, or a
          higher-precedence directive shadows the drop-in (an earlier-sorting
          file in sshd_config.d/, or a directive ahead of the Include in the
          main config). Resolved load-bearing values were:
          {{ __common_sshd_resolved_lines
             | select('match', '^(permitrootlogin|passwordauthentication|kbdinteractiveauthentication|kexalgorithms) ')
             | list }}
      vars:
        __common_sshd_resolved_lines: >-
          {{ __common_sshd_resolved.stdout_lines | map('lower') | list }}
        __common_sshd_resolved_kex_line: >-
          {{ __common_sshd_resolved_lines
             | select('match', '^kexalgorithms ') | list | first | default('') }}
        __common_sshd_resolved_kex: >-
          {{ __common_sshd_resolved_kex_line.split(' ', 1)[1].split(',')
             if __common_sshd_resolved_kex_line else [] }}

- name: Configure dotfiles for operators
  when: common_stow_users | length > 0
  block:
    # common_dots_repo has no default — a default would silently install
    # the maintainer's dotfiles on any consumer that opts into stow
    # without setting the repo. Fail loudly here instead.
    - name: Assert common_dots_repo is set when stowing
      ansible.builtin.assert:
        that:
          - common_dots_repo is string
          - common_dots_repo | length > 0
        fail_msg: >-
          common_dots_repo must be set to a clone URL when
          common_stow_users is non-empty.

    - name: Install git for cloning the dots repo
      community.general.zypper:
        name: git
        state: present

    # Resolve each stow user's real home from passwd rather than assuming
    # /home/<user>. root's home is /root, and any operator with a
    # non-standard home would otherwise have ~/dots and the stowed
    # symlinks land in the wrong tree. `fail_key: true` turns a typo'd
    # username into an immediate, loud failure. The resolved homes are
    # cached in common_stow_user_homes so the dev role (which depends on
    # common via meta) can reuse them without re-querying.
    - name: Resolve home directory for each stow user
      ansible.builtin.getent:
        database: passwd
        key: "{{ item }}"
        fail_key: true
      loop: "{{ common_stow_users }}"
      loop_control:
        label: "{{ item }}"
      register: __common_stow_user_passwd

    - name: Cache resolved home directories for reuse
      ansible.builtin.set_fact:
        common_stow_user_homes: >-
          {{ common_stow_user_homes | default({})
             | combine({item.item:
                        item.ansible_facts.getent_passwd[item.item][4]}) }}
      loop: "{{ __common_stow_user_passwd.results }}"
      loop_control:
        label: "{{ item.item }}"

    # noqa: latest[git] — dotfiles intentionally track upstream HEAD.
    # `update: false` is deliberate: don't clobber local dotfile changes on
    # re-runs. Operators pull updates manually with `cd ~/dots && git pull`.
    - name: Clone the dots repository for each user
      ansible.builtin.git:  # noqa: latest[git]
        repo: "{{ common_dots_repo }}"
        dest: "{{ common_stow_user_homes[item] }}/dots"
        version: HEAD
        update: false
      become: true
      become_user: "{{ item }}"
      loop: "{{ common_stow_users }}"
      loop_control:
        label: "{{ item }}"

    # stow refuses to clobber real files (`--override` only re-takes
    # already-stow-managed links). `--adopt` is load-bearing: it absorbs
    # any pre-existing target file (e.g. an /etc/skel-seeded ~/.bashrc)
    # into the stow package, which the `git restore` task below then
    # reverts to upstream HEAD — leaving the target as a symlink
    # pointing at the upstream content. With --adopt, stow's only
    # change-signalling lines are `LINK: ...` and `UNLINK: ...`; the
    # `* existing target` warning only fires when --adopt is absent.
    # `-v` makes stow emit those lines on stderr, LC_ALL=C pins the
    # locale, and the match is anchored on line-leading shape so a
    # future stow that emits e.g. `LINK:` mid-message doesn't trip a
    # spurious change.
    - name: Stow common dotfile packages
      ansible.builtin.command:
        cmd: "stow -v --adopt {{ item.1 }}"
        chdir: "{{ common_stow_user_homes[item.0] }}/dots"
      environment:
        LC_ALL: C
      register: __common_stow_result
      changed_when: >-
        __common_stow_result.stderr_lines
        | select('match', '^(LINK|UNLINK): ')
        | list | length > 0
      become: true
      become_user: "{{ item.0 }}"
      loop: "{{ common_stow_users | product(common_stow_packages) | list }}"
      loop_control:
        label: "{{ item.0 }}/{{ item.1 }}"

    # Revert any files `stow --adopt` moved into ~/dots above, so the
    # package mirrors upstream HEAD and the symlinks resolve to upstream
    # content. ansible.builtin.git can't `restore` an already-cloned repo;
    # the command module is the right fit here. The packages gate is
    # load-bearing: with common_stow_packages == [], the stow loop above
    # was empty and `--adopt` absorbed nothing, so a `git restore .`
    # here would only discard uncommitted edits an operator made by
    # hand to ~/dots.
    - name: Restore the dots repo to upstream HEAD
      ansible.builtin.command:  # noqa: command-instead-of-module
        cmd: git restore .
        chdir: "{{ common_stow_user_homes[item] }}/dots"
      become: true
      become_user: "{{ item }}"
      loop: "{{ common_stow_users }}"
      loop_control:
        label: "{{ item }}"
      changed_when: false
      when: common_stow_packages | length > 0
