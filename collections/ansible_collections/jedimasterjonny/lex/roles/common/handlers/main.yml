---
# `reloaded`, not `restarted`: reload re-reads config without dropping
# live sessions. Important because we may well be applying this over the
# very ssh connection we're hardening.
- name: Reload sshd
  ansible.builtin.systemd_service:
    name: sshd
    state: reloaded

# `-f` forces resolv.conf regeneration so the new searchlist takes effect the
# moment the static config changes. Only fires when the lineinfile reported a
# change, so re-runs stay quiet; a triggered run is, by definition, applying a
# change, hence changed_when: true.
- name: Apply netconfig
  ansible.builtin.command:
    cmd: netconfig update -f
  changed_when: true
