---
- name: Verify — assert on common role outcome
  hosts: all
  gather_facts: false
  vars_files:
    - ../defaults/main.yml
    # Loaded after the role defaults so its common_users value wins
    # — see the file header for the precedence rationale.
    - users-vars.yml
  tasks:
    # Verify by re-applying state in check mode and asserting nothing would
    # change. The zypper module resolves virtual provides (e.g. python3 →
    # python313) natively, which package_facts' actual-name keys do not.
    - name: Verify baseline packages are installed
      community.general.zypper:
        name: "{{ common_packages }}"
        state: present
      check_mode: true
      register: __common_packages_check
      failed_when: __common_packages_check.changed

    - name: Verify sshd is enabled and started
      ansible.builtin.systemd_service:
        name: sshd
        state: started
        enabled: true
      check_mode: true
      register: __common_sshd_check
      failed_when: __common_sshd_check.changed

    # Same pattern as the package and sshd checks: re-apply state in
    # check mode and treat any reported change as a verification
    # failure. ansible.builtin.user returns changed=True when the
    # account is missing or any of the requested attributes diverge,
    # so this catches both "user never created" and "uid/group/shell
    # silently differ" regressions.
    - name: Verify configured users exist with the requested attributes
      ansible.builtin.user:
        name: "{{ item.name }}"
        uid: "{{ item.uid | default(omit) }}"
        group: "{{ item.group | default(omit) }}"
        shell: "{{ item.shell | default(omit) }}"
        state: present
      check_mode: true
      register: __common_users_check
      failed_when: __common_users_check.changed
      loop: "{{ common_users }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Capture effective sshd config
      ansible.builtin.command: sshd -T
      register: __common_sshd_effective
      changed_when: false

    # sshd -T lower-cases its output, so the assertions normalise on lower.
    # KEX is checked against the parsed algorithm list rather than the
    # raw line so a future false-positive substring collision can't mask
    # a regression.
    - name: Assert effective sshd settings match the hardening profile
      ansible.builtin.assert:
        that:
          # sshd -T renders prohibit-password as its deprecated alias
          # 'without-password' on some builds (Leap 16); accept either.
          - __common_sshd_lines | select('match', '^permitrootlogin (prohibit-password|without-password)$') | list | length > 0
          - "'passwordauthentication no' in __common_sshd_lines"
          - "'kbdinteractiveauthentication no' in __common_sshd_lines"
          - "'authenticationmethods publickey' in __common_sshd_lines"
          - "'permitemptypasswords no' in __common_sshd_lines"
          - "'loglevel verbose' in __common_sshd_lines"
          # At least one post-quantum hybrid is offered. The exact list
          # differs per distro (Tumbleweed has both mlkem spellings; Leap
          # may have only sntrup761), so we check the family.
          - __common_sshd_kex_algs | select('match', '^(mlkem768|sntrup761)') | list | length > 0
          # Family match so we accept both curve25519-sha256 and its
          # @libssh.org-suffixed sibling.
          - __common_sshd_kex_algs | select('match', '^curve25519-sha256') | list | length > 0
          # Classical DH must be absent.
          - __common_sshd_kex_algs | select('match', '^diffie-hellman-group') | list | length == 0
          - >-
            'ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com'
            in __common_sshd_lines
          - >-
            'macs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com'
            in __common_sshd_lines
          - "'hostkeyalgorithms ssh-ed25519,rsa-sha2-512,rsa-sha2-256' in __common_sshd_lines"
      vars:
        __common_sshd_lines: "{{ __common_sshd_effective.stdout_lines | map('lower') | list }}"
        __common_sshd_kex_line: >-
          {{ __common_sshd_lines | select('match', '^kexalgorithms ') | first }}
        __common_sshd_kex_algs: "{{ __common_sshd_kex_line.split(' ', 1)[1].split(',') }}"

    # ssh-audit exits non-zero when any finding is warn-tier or worse.
    # Captured rather than gated via failed_when so the failure message
    # carries the full report.
    - name: Run ssh-audit against loopback sshd
      ansible.builtin.command: ssh-audit --skip-rate-test 127.0.0.1
      register: __common_ssh_audit
      changed_when: false
      failed_when: false

    - name: Assert ssh-audit reports no fail/warn-tier findings
      ansible.builtin.assert:
        that:
          - __common_ssh_audit.rc == 0
        fail_msg: |
          ssh-audit reported issues:
          {{ __common_ssh_audit.stdout }}

    - name: Verify dotfiles for operators
      when: common_stow_users | length > 0
      block:
        # verify runs as a separate play from converge, so the converge-time
        # common_stow_user_homes fact is gone — re-resolve from passwd.
        - name: Resolve home directory for each stow user
          ansible.builtin.getent:
            database: passwd
            key: "{{ item }}"
            fail_key: true
          loop: "{{ common_stow_users }}"
          loop_control:
            label: "{{ item }}"
          register: __common_stow_user_passwd

        - name: Cache resolved home directories for verification
          ansible.builtin.set_fact:
            common_stow_user_homes: >-
              {{ common_stow_user_homes | default({})
                 | combine({item.item:
                            item.ansible_facts.getent_passwd[item.item][4]}) }}
          loop: "{{ __common_stow_user_passwd.results }}"
          loop_control:
            label: "{{ item.item }}"

        - name: Stat the dots repo for each user
          ansible.builtin.stat:
            path: "{{ common_stow_user_homes[item] }}/dots/.git"
          register: __common_dots_stat
          loop: "{{ common_stow_users }}"
          loop_control:
            label: "{{ item }}"

        - name: Assert the dots repo is present for each user
          ansible.builtin.assert:
            that:
              - item.stat.exists
            fail_msg: "dots repo missing at {{ common_stow_user_homes[item.item] }}/dots"
          loop: "{{ __common_dots_stat.results }}"
          loop_control:
            label: "{{ item.item }}"

        # The whole point of the stow path is to replace any pre-existing
        # ~/.bashrc (e.g. one seeded from /etc/skel) with a symlink into
        # ~/dots/bash-suse. Checking the dots clone exists is necessary
        # but not sufficient — a regression in the `--adopt` + `git
        # restore` sequence (or a future stow that no-ops because
        # changed_when misfired) would still leave a real file in place.
        - name: Stat ~/.bashrc for each stow user
          ansible.builtin.stat:
            path: "{{ common_stow_user_homes[item] }}/.bashrc"
          register: __common_bashrc_stat
          loop: "{{ common_stow_users }}"
          loop_control:
            label: "{{ item }}"

        - name: Assert ~/.bashrc is a symlink into ~/dots/bash-suse
          ansible.builtin.assert:
            that:
              - item.stat.islnk
              - "'dots/bash-suse/.bashrc' in item.stat.lnk_target"
            fail_msg: >-
              ~/.bashrc for
              {{ item.item }} is not a stow-managed symlink into
              ~/dots/bash-suse (target:
              {{ item.stat.lnk_target | default('<not a symlink>') }})
          loop: "{{ __common_bashrc_stat.results }}"
          loop_control:
            label: "{{ item.item }}"
