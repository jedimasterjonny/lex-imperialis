---
- name: Verify — assert on common role outcome
  hosts: all
  gather_facts: false
  vars_files:
    - ../defaults/main.yml
    # Loaded after the role defaults so their values win over the empty
    # defaults — see each file's header for the precedence rationale.
    - users-vars.yml
    - dns-vars.yml
  tasks:
    # Verify by re-applying state in check mode and asserting nothing would
    # change. The zypper module resolves virtual provides (e.g. python3 →
    # python313) natively, which package_facts' actual-name keys do not.
    - name: Verify baseline packages are installed
      community.general.zypper:
        name: "{{ common_packages }}"
        state: present
      check_mode: true
      register: __common_packages_check
      failed_when: __common_packages_check.changed

    - name: Verify sshd is enabled and started
      ansible.builtin.systemd_service:
        name: sshd
        state: started
        enabled: true
      check_mode: true
      register: __common_sshd_check
      failed_when: __common_sshd_check.changed

    # Same pattern as the package and sshd checks: re-apply state in
    # check mode and treat any reported change as a verification
    # failure. ansible.builtin.user returns changed=True when the
    # account is missing or any of the requested attributes diverge,
    # so this catches both "user never created" and "uid/group/shell
    # silently differ" regressions.
    - name: Verify configured users exist with the requested attributes
      ansible.builtin.user:
        name: "{{ item.name }}"
        uid: "{{ item.uid | default(omit) }}"
        group: "{{ item.group | default(omit) }}"
        shell: "{{ item.shell | default(omit) }}"
        state: present
      check_mode: true
      register: __common_users_check
      failed_when: __common_users_check.changed
      loop: "{{ common_users }}"
      loop_control:
        label: "{{ item.name }}"

    # Same check-mode idiom as the package/sshd/user checks above: re-apply
    # the hostname in check mode and treat a reported change as "the live
    # hostname does not match common_hostname".
    - name: Verify the hostname matches common_hostname
      ansible.builtin.hostname:
        name: "{{ common_hostname }}"
      check_mode: true
      register: __common_hostname_check
      failed_when: __common_hostname_check.changed

    - name: Verify DNS search domains are in effect
      when: common_search_domains | length > 0
      block:
        # Assert the rendered effect in /etc/resolv.conf, not just the
        # netconfig input — a regression in `netconfig update` would leave the
        # static config correct but resolv.conf stale. slurp rather than
        # `command: cat` keeps the read idempotent.
        - name: Read /etc/resolv.conf
          ansible.builtin.slurp:
            src: /etc/resolv.conf
          register: __common_resolv_conf

        # Subset check: every configured domain must appear in the resolved
        # search line, but netconfig may also merge interface-provided domains,
        # so exact equality would be too strict. The search line lists domains
        # space-separated after the `search` keyword.
        - name: Assert each configured search domain is present
          ansible.builtin.assert:
            that:
              - common_search_domains | difference(__common_resolv_search) | length == 0
            fail_msg: >-
              /etc/resolv.conf search list {{ __common_resolv_search }} is
              missing one or more configured domains {{ common_search_domains }}.
          vars:
            __common_resolv_search_line: >-
              {{ (__common_resolv_conf.content | b64decode).splitlines()
                 | map('trim') | select('match', '^search ')
                 | list | first | default('') }}
            __common_resolv_search: >-
              {{ __common_resolv_search_line.split()[1:]
                 if __common_resolv_search_line else [] }}

    - name: Capture effective sshd config
      ansible.builtin.command: sshd -T
      register: __common_sshd_effective
      changed_when: false

    # Re-discover what this OpenSSH build supports so the post-quantum
    # assertions can be capability-gated rather than distro-guessed: if the
    # build offers a PQ family, the hardened config must offer it too.
    - name: Discover OpenSSH-supported KEX algorithms
      ansible.builtin.command: ssh -Q kex
      register: __common_supported_kex
      changed_when: false

    # sshd -T lower-cases its output, so the assertions normalise on lower.
    # Crypto lists are parsed into ordered lists and compared element-wise:
    # a reorder or truncation surfaces as a list diff rather than a bare
    # "string not found", while order — which is negotiation preference —
    # stays load-bearing.
    - name: Assert effective sshd settings match the hardening profile
      ansible.builtin.assert:
        that:
          # sshd -T renders prohibit-password as its deprecated alias
          # 'without-password' on some builds (Leap 16); accept either.
          - __common_sshd_lines | select('match', '^permitrootlogin (prohibit-password|without-password)$') | list | length > 0
          - "'passwordauthentication no' in __common_sshd_lines"
          - "'kbdinteractiveauthentication no' in __common_sshd_lines"
          - "'authenticationmethods publickey' in __common_sshd_lines"
          - "'permitemptypasswords no' in __common_sshd_lines"
          - "'loglevel verbose' in __common_sshd_lines"
          # Capability-gated: if the build supports a PQ family it must be
          # offered (catches a regression that stops offering a still-
          # supported algorithm), but a build that genuinely lacks one (an
          # older Leap OpenSSH without mlkem) is not penalised.
          - >-
            ('mlkem768x25519-sha256' not in __common_supported_kex.stdout_lines)
            or ('mlkem768x25519-sha256' in __common_sshd_kex_algs)
          - >-
            (__common_supported_kex.stdout_lines | select('match', '^sntrup761') | list | length == 0)
            or (__common_sshd_kex_algs | select('match', '^sntrup761') | list | length > 0)
          # ...and at least one PQ hybrid is actually in force.
          - __common_sshd_kex_algs | select('match', '^(mlkem768|sntrup761)') | list | length > 0
          # curve25519 (either spelling) present; classical DH absent.
          - __common_sshd_kex_algs | select('match', '^curve25519-sha256') | list | length > 0
          - __common_sshd_kex_algs | select('match', '^diffie-hellman-group') | list | length == 0
          - __common_sshd_ciphers == ['chacha20-poly1305@openssh.com', 'aes256-gcm@openssh.com', 'aes128-gcm@openssh.com']
          - >-
            __common_sshd_macs == ['hmac-sha2-512-etm@openssh.com', 'hmac-sha2-256-etm@openssh.com',
                                   'umac-128-etm@openssh.com']
          - __common_sshd_hostkeyalgs == ['ssh-ed25519', 'rsa-sha2-512', 'rsa-sha2-256']
      vars:
        __common_sshd_lines: "{{ __common_sshd_effective.stdout_lines | map('lower') | list }}"
        # Each crypto list is parsed from its sshd -T line; `| list | first
        # | default('')` keeps a missing line from raising "sequence was
        # empty" before the assert can report it cleanly.
        __common_sshd_kex_line: >-
          {{ __common_sshd_lines | select('match', '^kexalgorithms ') | list | first | default('') }}
        __common_sshd_kex_algs: >-
          {{ __common_sshd_kex_line.split(' ', 1)[1].split(',') if __common_sshd_kex_line else [] }}
        __common_sshd_ciphers_line: >-
          {{ __common_sshd_lines | select('match', '^ciphers ') | list | first | default('') }}
        __common_sshd_ciphers: >-
          {{ __common_sshd_ciphers_line.split(' ', 1)[1].split(',') if __common_sshd_ciphers_line else [] }}
        __common_sshd_macs_line: >-
          {{ __common_sshd_lines | select('match', '^macs ') | list | first | default('') }}
        __common_sshd_macs: >-
          {{ __common_sshd_macs_line.split(' ', 1)[1].split(',') if __common_sshd_macs_line else [] }}
        __common_sshd_hostkeyalgs_line: >-
          {{ __common_sshd_lines | select('match', '^hostkeyalgorithms ') | list | first | default('') }}
        __common_sshd_hostkeyalgs: >-
          {{ __common_sshd_hostkeyalgs_line.split(' ', 1)[1].split(',') if __common_sshd_hostkeyalgs_line else [] }}

    # ssh-audit exit codes: 0 good, 2 warning, 3 failure (1 is a connection
    # error). Warn-tier findings flag properties this role does not manage —
    # RSA host-key bit-size, /etc/ssh/moduli age — so an otherwise-clean
    # image with, say, a 2048-bit host key would trip a strict rc == 0 gate
    # for reasons outside the hardening profile. Gate on FAILURE-tier only:
    # rc 0 or 2 passes, a broken algorithm (rc 3) or a connection error
    # fails. The explicit sshd -T assertions above already pin the managed
    # algorithm policy precisely. Captured rather than gated via failed_when
    # so the message carries the full report.
    - name: Run ssh-audit against loopback sshd
      ansible.builtin.command: ssh-audit --skip-rate-test 127.0.0.1
      register: __common_ssh_audit
      changed_when: false
      failed_when: false

    - name: Assert ssh-audit reports no failure-tier findings
      ansible.builtin.assert:
        that:
          - __common_ssh_audit.rc in [0, 2]
        fail_msg: |
          ssh-audit reported a failure-tier finding (rc={{ __common_ssh_audit.rc }}):
          {{ __common_ssh_audit.stdout }}

    - name: Verify dotfiles for operators
      when: common_stow_users | length > 0
      block:
        # verify runs as a separate play from converge, so the converge-time
        # common_stow_user_homes fact is gone — re-resolve from passwd.
        - name: Resolve home directory for each stow user
          ansible.builtin.getent:
            database: passwd
            key: "{{ item }}"
            fail_key: true
          loop: "{{ common_stow_users }}"
          loop_control:
            label: "{{ item }}"
          register: __common_stow_user_passwd

        - name: Cache resolved home directories for verification
          ansible.builtin.set_fact:
            common_stow_user_homes: >-
              {{ common_stow_user_homes | default({})
                 | combine({item.item:
                            item.ansible_facts.getent_passwd[item.item][4]}) }}
          loop: "{{ __common_stow_user_passwd.results }}"
          loop_control:
            label: "{{ item.item }}"

        - name: Stat the dots repo for each user
          ansible.builtin.stat:
            path: "{{ common_stow_user_homes[item] }}/dots/.git"
          register: __common_dots_stat
          loop: "{{ common_stow_users }}"
          loop_control:
            label: "{{ item }}"

        - name: Assert the dots repo is present for each user
          ansible.builtin.assert:
            that:
              - item.stat.exists
            fail_msg: "dots repo missing at {{ common_stow_user_homes[item.item] }}/dots"
          loop: "{{ __common_dots_stat.results }}"
          loop_control:
            label: "{{ item.item }}"

        # The whole point of the stow path is to replace any pre-existing
        # ~/.bashrc (e.g. one seeded from /etc/skel) with a symlink into
        # ~/dots/bash-suse. Checking the dots clone exists is necessary
        # but not sufficient — a regression in the `--adopt` + `git
        # restore` sequence (or a future stow that no-ops because
        # changed_when misfired) would still leave a real file in place.
        - name: Stat ~/.bashrc for each stow user
          ansible.builtin.stat:
            path: "{{ common_stow_user_homes[item] }}/.bashrc"
          register: __common_bashrc_stat
          loop: "{{ common_stow_users }}"
          loop_control:
            label: "{{ item }}"

        - name: Assert ~/.bashrc is a symlink into ~/dots/bash-suse
          ansible.builtin.assert:
            that:
              - item.stat.islnk
              - "'dots/bash-suse/.bashrc' in item.stat.lnk_target"
            fail_msg: >-
              ~/.bashrc for
              {{ item.item }} is not a stow-managed symlink into
              ~/dots/bash-suse (target:
              {{ item.stat.lnk_target | default('<not a symlink>') }})
          loop: "{{ __common_bashrc_stat.results }}"
          loop_control:
            label: "{{ item.item }}"
