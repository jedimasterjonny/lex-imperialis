---
driver:
  name: default

platforms:
  - name: lex-ci-common-${GITHUB_RUN_ID:-local}
    server_type: cx23
    image: opensuse-16
    location: nbg1

provisioner:
  name: ansible
  playbooks:
    create: ../../../../molecule/shared/hetzner/create.yml
    destroy: ../../../../molecule/shared/hetzner/destroy.yml
    # converge.yml and verify.yml live one level up, at roles/<role>/molecule/,
    # shared across all scenarios (default, full, ci, …) for this role.
    converge: ../converge.yml
    verify: ../verify.yml

verifier:
  name: ansible

scenario:
  create_sequence:
    - create
  converge_sequence:
    - create
    - converge
  destroy_sequence:
    - destroy
  test_sequence:
    - destroy
    - syntax
    - create
    - converge
    - idempotence
    - verify
    - destroy
