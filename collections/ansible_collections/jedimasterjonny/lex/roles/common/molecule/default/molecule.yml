---
# Collections are installed by `make setup` into ~/.ansible/collections, so we
# omit molecule's `dependency:` stage to avoid the "Missing requirements file"
# noise. The sequence overrides below list only the phases we ship playbooks
# for — preventing molecule from warning about missing prepare/cleanup hooks.

driver:
  name: default

platforms:
  - name: molecule-lex-common-default
    image: tumbleweed

provisioner:
  name: ansible
  playbooks:
    create: ../../../../molecule/shared/incus/create.yml
    destroy: ../../../../molecule/shared/incus/destroy.yml
    # converge.yml and verify.yml live one level up, at roles/<role>/molecule/,
    # shared across all scenarios (default, full, ci, …) for this role.
    converge: ../converge.yml
    verify: ../verify.yml
  inventory:
    host_vars:
      molecule-lex-common-default:
        ansible_connection: community.general.incus
        ansible_user: root
    group_vars:
      all:
        # Exercise the dotfile stow path in CI. The role's
        # /home/{{ user }}/dots layout doesn't match root's real $HOME
        # (/root), so the symlinks land where verify expects them but
        # bash won't read them — fine for path coverage, separate from
        # the home-resolution bug.
        common_stow_users:
          - root

verifier:
  name: ansible

scenario:
  create_sequence:
    - create
  converge_sequence:
    - create
    - converge
  destroy_sequence:
    - destroy
  test_sequence:
    - destroy
    - syntax
    - create
    - converge
    - idempotence
    - verify
    - destroy
