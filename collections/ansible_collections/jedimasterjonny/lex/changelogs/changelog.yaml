    - pre-warm-incus-images.yml
    release_date: '2026-05-25'
  0.3.1:
    changes:
      bugfixes:
      - common, dev - add ``-v`` to ``stow`` invocations so the ``changed_when`` substring
        match on stderr actually fires. Without verbose output stow emits nothing
        on a successful link, so the stow tasks were always reporting ``changed=0``
        even when they created symlinks.
      - common, dev - replace ``stow --override='.*'`` with ``stow --adopt`` followed
        by ``git restore`` in the package directory. ``--override`` only re-takes
        already-stow-managed symlinks; a real file at the target (e.g. an ``/etc/skel``-seeded
        ``~/.bashrc``) made stow exit non-zero and aborted the first apply. ``--adopt``
        absorbs the existing file and the restore reverts the package back to upstream
        HEAD, leaving the target as a symlink to upstream content.
      - common, dev - resolve stow user home directories via ``getent`` so users with
        non-``/home/<user>`` home paths (most notably ``root``) are configured correctly.
      - "dev - assert ``dev_incus_admin_users`` and ``dev_libvirt_users`` already
        exist before granting group membership. ``ansible.builtin.user`` defaults
        to ``state: present`` and silently creates missing accounts, contradicting
        the documented contract that the role does not create users \u2014 a typo
        in either list would otherwise produce a phantom account with privileged-group
        membership."
      - dev - assert ``dev_stow_users`` is a subset of ``common_stow_users``. The
        common role owns the ``~/dots`` clone for each user in ``common_stow_users``;
        dev's stow loop ``chdir``s into ``~/dots``, so explicit overrides that named
        extra users (without adding them to ``common_stow_users``) failed with a confusing
        ``No such file or directory``. The assertion now spells out the contract.
      - dev - gate the distribution-specific zypper repository task behind ``dev_configure_incus_host``.
        The two OBS projects in ``dev_extra_repos`` on Leap (``Virtualization:containers``
        and ``network:utilities``) exist only to source incus and its ``lego`` dependency;
        a Leap workstation that adopts the role for general dev tooling and leaves
        the Incus gate off no longer picks them up.
      - dev - move ``firewalld`` and ``python3-firewall`` out of ``dev_incus_packages``
        into a new ``dev_incus_firewalld_packages`` list installed only when ``dev_incus_firewalld_trusted_interfaces``
        is non-empty. nftables hosts that opt out of firewalld via the empty list
        no longer get firewalld installed as a dormant artefact.
      - 'dev - move ``python3-libvirt-python`` and ``python3-lxml`` from ``dev_ansible_dev_packages``
        into ``dev_libvirt_packages``. The bindings are imported by ``community.libvirt.virt_net``
        (which this role uses), so they belong on the same gate as libvirt itself.
        Setting ``dev_install_ansible_dev: false`` together with ``dev_configure_libvirt_host:
        true`` previously failed with ``ModuleNotFoundError: No module named ''libvirt''``;
        the same default combination also dragged ``libvirt-libs`` onto every plain
        dev workstation. ``dev_ansible_dev_packages`` now defaults to ``[]`` and exists
        for consumers to add their own controller-side packages.'
      - 'dev - narrow the pre-warm trigger for ``dev_incus_images`` to the ``not found``
        error shape. The upstream ``incus image show`` check had ``failed_when: false``,
        so a bare ``rc != 0`` previously matched transient daemon errors (e.g. ``EOF``
        from a briefly-unreachable socket) and would re-copy a cached image.'
      - galaxy.yml - declare ``community.general`` as a collection dependency. Both
        shipped roles use ``community.general.zypper`` and ``community.general.zypper_repository``;
        galaxy-installed consumers without ``community.general`` already present would
        otherwise fail at the first role task.
      release_summary: 'Patch release driven by code-review findings against 0.3.0.
        Fixes the

        stow workflow (use ``--adopt`` + ``git restore`` so ``/etc/skel``-seeded

        files are absorbed; ``-v`` so changes register; resolve user home

        directories via ``getent`` so ``root`` and other non-``/home/<user>``

        operators work), declares the missing ``community.general`` galaxy

        dependency, narrows the firewalld and OBS-repo installs to the gates

        that actually consume them, hardens the Incus image pre-warm against

        transient daemon errors, and asserts that configured operators exist

        before granting privileged groups.

        '
    fragments:
    - 0.3.1-release-summary.yml
    - assert-operators-exist.yml
    - assert-stow-users-subset.yml
    - declare-community-general-dependency.yml
    - gate-firewalld-install-on-trusted-interfaces.yml
    - gate-leap-obs-repos.yml
    - move-libvirt-bindings-to-libvirt-packages.yml
    - pre-warm-only-on-image-not-found.yml
    - resolve-stow-user-homes.yml
    - stow-adopt-restore.yml
    release_date: '2026-05-25'
  0.4.0:
    changes:
      bugfixes:
      - common, dev - anchor the stow ``changed_when`` on stderr lines that *start*
        with ``LINK:`` / ``UNLINK:`` rather than substring-matching anywhere in stderr,
        and drop the dead ``* existing target`` disjunct (stow with ``--adopt`` absorbs
        unmanaged targets silently and never emits that warning). A future stow release
        that prints the ``LINK:`` keyword in a different position no longer trips
        a spurious change.
      - "common, dev - assert that the stow targets (``~/.bashrc`` for bash-suse,
        ``~/.config/nvim`` for nvim) are symlinks pointing into ``~/dots`` rather
        than just checking they exist. A regression in the ``--adopt`` + ``git restore``
        sequence \u2014 or a future stow that silently no-ops because ``changed_when``
        misfired \u2014 would have left a real file or directory in place and still
        passed the prior existence-only assertion."
      - common, dev - move the molecule ``common_stow_users`` / ``dev_stow_users``
        overrides for the default and ci scenarios from ``inventory.group_vars.all``
        to ``options.extra-vars`` so they beat the role-defaults ``vars_files`` load
        in the verify play. Previously converge stowed against root (group_vars in
        scope) but verify saw ``common_stow_users == []`` (defaults shadowing group_vars),
        the ``when:`` gate on the dotfile assertion block was false, and the dots-repo
        / symlink assertions silently skipped.
      - dev - derive the storage pool name in the ``Check whether Incus is already
        initialised`` probe from ``dev_incus_preseed.storage_pools[0].name`` rather
        than hardcoding ``default``; overrides that rename the pool no longer make
        the probe permanently report ``not initialised`` and re-apply the preseed
        on every play.
      - dev - drop the explicit ``chown root:root`` in tumbleweed-image-refresh so
        the qcow2 inherits ``root:libvirt`` from the parent dir's setgid bit; qemu
        now reads the image via group membership rather than the world-read bit, which
        keeps it accessible if ``/var/lib/libvirt/images`` is ever hardened to mode
        2770.
      - dev - pin ``LC_ALL=C`` on the Incus init probe and the image-cache probe so
        their stderr substring matches are stable on non-English hosts, and gate the
        preseed re-apply on ``'not found' in stderr`` rather than bare ``rc != 0``;
        the previous gate could re-run ``incus admin init --preseed`` against a partially-initialised
        daemon during a startup race against ``incus.socket``.
      - dev - resolve the expected bridge and storage pool from ``dev_incus_preseed.profiles[0].devices``
        by device type (``nic`` / ``disk``) rather than by hardcoded device keys ``eth0``
        / ``root``; a profile that names its NIC ``enp0s3`` or its disk ``rootfs``
        no longer crashes the molecule verify play with ``'dict object' has no attribute
        'eth0'``.
      - 'dev - set ``overwrite_multiple: true`` on the Leap OBS repositories so an
        in-place distribution upgrade (e.g. Leap 16.0 to 16.1) updates the repo URL
        in place instead of leaving the repo pinned to the previous release''s URL,
        which made the next ``zypper refresh`` 404 and broke the role''s subsequent
        ``Install Incus packages`` task.'
      minor_changes:
      - 'dev - document the always-quote-strings rule on ``dev_incus_preseed`` so
        overrides like ``ipv4.dhcp: yes`` don''t get silently bool-coerced by ``to_nice_yaml``
        and rejected (or misinterpreted) by ``incus admin init --preseed``.'
      release_summary: 'Robustness pass on the common and dev roles, addressing follow-up
        review

        findings on the host-config and stow paths. The Incus init probe now

        derives its pool name from the preseed and gates on locale-pinned

        "not found" stderr, sidestepping a daemon-startup race against

        ``incus.socket`` and overrides that rename the storage pool. The

        molecule verify plays gain a real symlink-contract check on the stow

        targets, iterate Incus devices by type rather than by hardcoded keys,

        and reliably exercise the dotfile path by pinning stow-user overrides

        at extra-vars precedence. Plus bugfixes for Leap OBS repo URL refresh

        across distribution upgrades, the Tumbleweed qcow2 inheriting

        ``root:libvirt`` from its parent dir''s setgid, and ``stow``''s

        ``changed_when`` anchored on stderr line shape.

        '
    fragments:
    - 0.4.0-release-summary.yml
    - dev-document-preseed-quote-rule.yml
    - dev-incus-probes-lc-all-not-found.yml
    - dev-init-probe-derive-pool-name.yml
    - dev-tumbleweed-helper-drop-chown.yml
    - dev-verify-iterate-incus-devices-by-type.yml
    - dev-zypper-repo-overwrite-multiple.yml
    - molecule-assert-stow-symlinks.yml
    - molecule-stow-vars-extra-vars-precedence.yml
    - stow-changed-when-anchor.yml
    release_date: '2026-05-25'
