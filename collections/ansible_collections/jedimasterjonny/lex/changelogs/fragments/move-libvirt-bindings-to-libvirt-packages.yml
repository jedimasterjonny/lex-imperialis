---
bugfixes:
  - "dev - move ``python3-libvirt-python`` and ``python3-lxml`` from
    ``dev_ansible_dev_packages`` into ``dev_libvirt_packages``. The bindings
    are imported by ``community.libvirt.virt_net`` (which this role uses),
    so they belong on the same gate as libvirt itself. Setting
    ``dev_install_ansible_dev: false`` together with
    ``dev_configure_libvirt_host: true`` previously failed with
    ``ModuleNotFoundError: No module named 'libvirt'``; the same default
    combination also dragged ``libvirt-libs`` onto every plain dev
    workstation. ``dev_ansible_dev_packages`` now defaults to ``[]`` and
    exists for consumers to add their own controller-side packages."
