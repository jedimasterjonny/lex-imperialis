---
minor_changes:
  - "common - enforce the system hostname via the new ``common_hostname``
    variable, defaulting to the inventory hostname; the role now manages the
    hostname where it previously left it untouched."
  - "common - configure DNS search domains through openSUSE netconfig
    (``NETCONFIG_DNS_STATIC_SEARCHLIST``) via the new ``common_search_domains``
    variable, empty by default which skips the path."
