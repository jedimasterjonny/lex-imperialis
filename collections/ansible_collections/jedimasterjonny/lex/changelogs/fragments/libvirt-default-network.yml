---
minor_changes:
  - >-
    dev - add ``dev_libvirt_manage_default_network`` flag (default
    ``true``). When ``dev_configure_libvirt_host`` is true and the new
    flag is on, ensures libvirt's ``default`` network is active and
    autostarts on boot. Set the flag to false on hosts where the default
    subnet (``192.168.122.0/24``) conflicts with the host's primary
    interface. Pulls in ``community.libvirt`` as a collection
    dependency.
