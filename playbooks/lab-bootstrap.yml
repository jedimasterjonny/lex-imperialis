---
- name: Lab box bootstrap
  hosts: scholam
  become: true
  gather_facts: true

  vars:
    lab_incus_images:
      - alias: tumbleweed
        source: images:opensuse/tumbleweed
    incus_preseed:
      config: {}
      networks:
        - name: incusbr0
          type: bridge
          config:
            ipv4.address: auto
            ipv4.nat: "true"
            ipv6.address: none
      storage_pools:
        - name: default
          driver: btrfs
          config:
            source: /var/lib/incus/storage-pools/default
      profiles:
        - name: default
          description: Default profile for Molecule containers
          devices:
            eth0:
              name: eth0
              nictype: bridged
              parent: incusbr0
              type: nic
            root:
              path: /
              pool: default
              type: disk
      projects: []
      cluster: null

  pre_tasks:
    - name: Sanity — we're running on openSUSE
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] == 'openSUSE Tumbleweed'
        fail_msg: "This playbook only supports openSUSE Tumbleweed."

  tasks:
    - name: Install Incus packages
      community.general.zypper:
        name:
          - incus
          - incus-tools
        state: present

    - name: Enable and start the incus socket
      ansible.builtin.systemd_service:
        name: incus.socket
        enabled: true
        state: started

    - name: Grant operator access to the incus socket
      ansible.builtin.user:
        name: "{{ item }}"
        groups: incus-admin
        append: true
      loop:
        - jonny
        - ansible

    # Proxy for "preseed ran"; a partial init leaves the 'default' pool and fools this — re-init by hand.
    - name: Check whether Incus is already initialised
      ansible.builtin.command: incus storage show default
      register: incus_init_check
      changed_when: false
      failed_when: false

    - name: Apply Incus preseed config (first init only)
      ansible.builtin.command:
        cmd: incus admin init --preseed
        stdin: "{{ incus_preseed | to_nice_yaml }}"
      when: incus_init_check.rc != 0
      changed_when: true

    - name: Trust the incus bridge in firewalld
      ansible.posix.firewalld:
        zone: trusted
        interface: incusbr0
        permanent: true
        immediate: true
        state: enabled

    - name: Check which Incus images are already cached
      ansible.builtin.command: "incus image show local:{{ item.alias }}"
      register: incus_image_checks
      loop: "{{ lab_incus_images }}"
      loop_control:
        label: "{{ item.alias }}"
      changed_when: false
      failed_when: false

    - name: Pre-warm missing Incus images
      ansible.builtin.command: >
        incus image copy {{ item.item.source }} local:
        --alias {{ item.item.alias }}
      loop: "{{ incus_image_checks.results }}"
      loop_control:
        label: "{{ item.item.alias }}"
      when: item.rc != 0
      changed_when: true

    - name: Install incus-image-refresh.service unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/incus-image-refresh.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Refresh cached Incus images
          After=network-online.target incus.socket
          Wants=network-online.target incus.socket

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/incus image refresh{% for img in lab_incus_images %} local:{{ img.alias }}{% endfor %}
      notify: Reload systemd

    - name: Install incus-image-refresh.timer unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/incus-image-refresh.timer
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Weekly refresh of cached Incus images

          [Timer]
          OnCalendar=Sun *-*-* 03:00:00
          Persistent=true

          [Install]
          WantedBy=timers.target
      notify: Reload systemd

    - name: Flush handlers so systemd loads the new units
      ansible.builtin.meta: flush_handlers

    - name: Enable and start incus-image-refresh.timer
      ansible.builtin.systemd_service:
        name: incus-image-refresh.timer
        enabled: true
        state: started

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true
