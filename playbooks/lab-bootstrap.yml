---
# The `ansible` account is assumed pre-existing (provisioned out of
# band); `jonny` is created by the common role via common_users below
# — see the role's defaults/main.yml for the contract.
- name: Lab box bootstrap
  hosts: scholam
  become: true
  gather_facts: true

  vars:
    dev_configure_incus_host: true
    dev_configure_libvirt_host: true
    dev_incus_admin_users:
      - jonny
      - ansible
    dev_libvirt_users:
      - jonny
      - ansible
    dev_incus_images:
      - alias: tumbleweed
        source: images:opensuse/tumbleweed
    # dev_stow_users tracks common_stow_users by default — just jonny
    # gets bash-suse + git + nvim dotfiles; ansible is a service account.
    # common_dots_repo has no role default (would otherwise silently
    # install the maintainer's dotfiles on every consumer) — pin it here.
    common_dots_repo: https://github.com/jedimasterjonny/dots
    common_stow_users:
      - jonny
    # uid/group/shell are pinned so re-imaging the lab box always
    # lands on the same identity. Without that, a post-install
    # scriptlet from some other package could race in and take uid
    # 1000 first, leaving jonny at 1001 — and any btrfs snapshot or
    # NFS-mounted home restored later would then show files owned by
    # an orphan uid. Group memberships granted by the dev role's
    # Incus/libvirt blocks land on this account in the same play
    # (append: true, so they're additive).
    common_users:
      - name: jonny
        uid: 1000
        group: users
        shell: /bin/bash

  pre_tasks:
    - name: Sanity — we're running on openSUSE
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] == 'openSUSE Tumbleweed'
        fail_msg: "This playbook only supports openSUSE Tumbleweed."

    # The incus-image-refresh.service ExecStart below interpolates each
    # alias into a systemd unit literal. systemd's exec parser splits
    # ExecStart on whitespace (no shell) and expands `%X` specifiers and
    # `${VAR}` env refs unconditionally — so an alias containing any of
    # those would silently produce the wrong arg list. Reject up front.
    - name: Sanity — Incus image aliases are systemd-ExecStart-safe
      ansible.builtin.assert:
        that:
          - item.alias is match('^[A-Za-z0-9._:-]+$')
        fail_msg: >-
          dev_incus_images entry "{{ item.alias }}" contains a character
          systemd's ExecStart parser treats specially (whitespace, %, $);
          restrict aliases to [A-Za-z0-9._:-].
      loop: "{{ dev_incus_images | default([]) }}"
      loop_control:
        label: "{{ item.alias }}"

  roles:
    - jedimasterjonny.lex.dev

  # post_tasks run after the role completes, so the helper script the role
  # ships at /usr/local/sbin/tumbleweed-image-refresh is in place before the
  # one-shot invocation below.
  post_tasks:
    # Skip the entire unit pair when no images are pre-warmed: a bare
    # `incus image refresh` (the template's degenerate case) refreshes every
    # cached image, which broadens the unit's effect beyond the curated set.
    - name: Schedule weekly refresh of pre-warmed Incus images
      when: dev_incus_images | length > 0
      block:
        - name: Install incus-image-refresh.service unit
          ansible.builtin.copy:
            dest: /etc/systemd/system/incus-image-refresh.service
            owner: root
            group: root
            mode: "0644"
            content: |
              [Unit]
              Description=Refresh cached Incus images
              After=network-online.target incus.socket
              Wants=network-online.target incus.socket

              [Service]
              Type=oneshot
              ExecStart=/usr/bin/incus image refresh{% for img in dev_incus_images %} local:{{ img.alias }}{% endfor %}
          notify: Reload systemd

        - name: Install incus-image-refresh.timer unit
          ansible.builtin.copy:
            dest: /etc/systemd/system/incus-image-refresh.timer
            owner: root
            group: root
            mode: "0644"
            content: |
              [Unit]
              Description=Weekly refresh of cached Incus images

              [Timer]
              OnCalendar=Sun *-*-* 03:00:00
              Persistent=true

              [Install]
              WantedBy=timers.target
          notify: Reload systemd

        - name: Flush handlers so systemd loads the incus-image-refresh units
          ansible.builtin.meta: flush_handlers

        - name: Enable and start incus-image-refresh.timer
          ansible.builtin.systemd_service:
            name: incus-image-refresh.timer
            enabled: true
            state: started

    # The tumbleweed-image-refresh helper at /usr/local/sbin/ is dropped
    # by the dev role only when dev_configure_libvirt_host is true. The
    # playbook's vars (at the top of this file) hardcode that gate true
    # today, but gate the post_tasks defensively so a temporary
    # `-e dev_configure_libvirt_host=false` doesn't try to invoke a
    # helper the role just decided not to install.
    - name: Schedule weekly refresh of the Tumbleweed qcow2 base image
      when: dev_configure_libvirt_host | bool
      block:
        - name: Ensure Tumbleweed qcow2 base image is present and up to date
          ansible.builtin.command: /usr/local/sbin/tumbleweed-image-refresh
          register: tumbleweed_refresh
          changed_when: "'Image refreshed' in tumbleweed_refresh.stdout"

        - name: Install tumbleweed-image-refresh.service unit
          ansible.builtin.copy:
            dest: /etc/systemd/system/tumbleweed-image-refresh.service
            owner: root
            group: root
            mode: "0644"
            content: |
              [Unit]
              Description=Refresh Tumbleweed qcow2 base image
              After=network-online.target
              Wants=network-online.target

              [Service]
              Type=oneshot
              ExecStart=/usr/local/sbin/tumbleweed-image-refresh
          notify: Reload systemd

        - name: Install tumbleweed-image-refresh.timer unit
          ansible.builtin.copy:
            dest: /etc/systemd/system/tumbleweed-image-refresh.timer
            owner: root
            group: root
            mode: "0644"
            content: |
              [Unit]
              Description=Weekly refresh of Tumbleweed qcow2 base image

              [Timer]
              OnCalendar=Sun *-*-* 03:30:00
              Persistent=true

              [Install]
              WantedBy=timers.target
          notify: Reload systemd

        - name: Flush handlers so systemd loads the tumbleweed-image-refresh units
          ansible.builtin.meta: flush_handlers

        - name: Enable and start tumbleweed-image-refresh.timer
          ansible.builtin.systemd_service:
            name: tumbleweed-image-refresh.timer
            enabled: true
            state: started

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true
