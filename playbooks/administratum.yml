---
- name: Configure administratum
  hosts: administratum
  # The NAS isn't a fleet openSUSE host, so it gets none of the common/sshd/zypper
  # roles, and sudo needs a password — the deploy runs unprivileged as the
  # docker-group user.
  become: false
  vars:
    # blackbox_exporter and prometheus each get a compose project on a subdir of
    # the NAS's own astropath volume, beside the TSDB data (a local bind mount, not
    # NFS).
    blackbox_exporter_project_dir: /volume2/astropath/blackbox_exporter
    prometheus_project_dir: /volume2/astropath/prometheus
    prometheus_data_dir: /volume2/astropath/prometheus/data
    # Scrape three node_exporters: solar and scholam over the LAN, rogue-trader
    # over WireGuard (the NAS can't resolve its name, so use the WG address
    # already in the repo).
    prometheus_node_targets:
      - solar:9100
      - scholam:9100
      - 192.168.3.3:9100
    # cadvisor on solar and rogue-trader, scraped the same way.
    prometheus_cadvisor_targets:
      - solar:8080
      - 192.168.3.3:8080
    # Route alerts to Alertmanager on solar over the LAN.
    prometheus_alertmanager_targets:
      - solar:9093
    # Blackbox-probe the public sites end-to-end via the co-located exporter: each
    # a 2xx through the Cloudflare/Firebase edge (redirect zones answer 3xx first,
    # which http_2xx follows), plus per-site TLS expiry.
    prometheus_probe_targets:
      - https://jonnyoc.uk
      - https://www.jonnyoc.uk
      - https://emmasedit.com
      - https://www.emmasedit.com
      - https://jonnyoc.co.uk
      - https://www.jonnyoc.co.uk
  roles:
    # blackbox_exporter before prometheus so the exporter is up when prometheus's
    # blackbox job first scrapes it — prometheus tolerates a briefly-down target,
    # so this is ordering for tidiness, not a hard dependency.
    - blackbox_exporter
    - prometheus
