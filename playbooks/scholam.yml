---
- name: Configure this host
  hosts: this_host
  vars:
    common_hostname: scholam
    # Match jonny's uid on the NAS (administratum: 1026; gid 100/users already
    # matches) so NFS ownership reconciles — the v4 mounts use numeric sec=sys,
    # which carries raw uids and bypasses name-based idmapping.
    common_user_uid: 1026
    # Wired box: the Intel wifi radio is dead weight. iwlmvm holds iwlwifi, so
    # it unloads first.
    common_blacklisted_modules:
      - iwlmvm
      - iwlwifi
    # Staggered autoupdate: the control host updates last, after the other hosts
    # have taken the week's snapshots, so a brick surfaces before scholam reboots.
    autoupdate_oncalendar: "Fri *-*-* 03:00:00"
    # NFS exports from the NAS (administratum), each mounted at /nfs/<name>.
    # astropath is the home_backup restic target; the NAS must export it to this
    # host (it already exports it to solar and rogue-trader).
    nfs_shares:
      - name: scriptorum
        server: administratum
        export: /volume1/scriptorum
      - name: astropath
        server: administratum
        export: /volume2/astropath
    # An hour after solar's home backup (the role default, Thu 01:00), so the two
    # hosts don't snapshot to the same astropath export at once and contend on the
    # mount that already blips under load (the engine's retry() exists for that).
    home_backup_oncalendar: "Thu *-*-* 02:00:00"
    # node_exporter, scraped by Prometheus on administratum over the LAN.
    firewalld_ports:
      - 9100/tcp
    # Bind node_exporter to the LAN interface only, so it isn't exposed on
    # the incus and libvirt bridges.
    node_exporter_listen_address: "{{ ansible_facts['default_ipv4']['address'] }}:9100"
  roles:
    - common
    - sshd
    - firewalld
    - podman
    - autoupdate
    - nfs
    - incus
    - libvirt
    - dev
    - home_backup
    - node_exporter
    - gitops_reconcile
