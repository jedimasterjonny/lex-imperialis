---
platforms:
  - name: "lex-libvirt-libvirt-${MOLECULE_RUN_ID:-local}"
    image: https://download.opensuse.org/tumbleweed/appliances/openSUSE-Tumbleweed-Minimal-VM.x86_64-Cloud.qcow2
    image_checksum: sha256:https://download.opensuse.org/tumbleweed/appliances/openSUSE-Tumbleweed-Minimal-VM.x86_64-Cloud.qcow2.sha256
provisioner:
  # This tier's minimal-VM kernel can't start a libvirt network (no htb qdisc),
  # so it defines + autostarts the default network but leaves activation to the
  # full-kernel hetzner VM.
  inventory:
    group_vars:
      all:
        libvirt_default_network_active: false
