---
# Libvirt virtualisation host: the daemon, CLI and image tooling, and the python
# bindings community.libvirt needs to manage the default network.
libvirt_packages:
  - curl
  - guestfs-tools
  - libguestfs
  - libvirt
  - mkisofs
  - python3-libvirt-python
  - python3-lxml
  - virt-install

# Modular libvirt daemons, socket-activated (the monolithic libvirtd is
# deprecated). qemu drives qemu:///system; network manages the default NAT
# network; storage, nodedev, and secret round out a VM host. Daemons don't
# socket-activate each other, so each the host uses is enabled explicitly.
libvirt_daemons:
  - virtqemud
  - virtnetworkd
  - virtstoraged
  - virtnodedevd
  - virtsecretd

# Owner account added to the libvirt group so it drives VMs without sudo; the
# common role creates it.
libvirt_user: jonny

# Start (activate) the default NAT network now, on top of autostarting it. The
# molecule libvirt tier overrides this to false: its minimal-VM kernel can't
# start a libvirt network (no htb qdisc), so that tier leaves activation to the
# full-kernel hetzner VM.
libvirt_default_network_active: true

# Tumbleweed rolls, so the host keeps a fresh copy of the cloud qcow2 in the
# image store to build VMs from. tumbleweed-image-refresh.sh (curl, above)
# re-fetches it only when the published sha256 changes; the systemd timer runs
# it weekly, at 03:30 on Sundays.
libvirt_image_url: https://download.opensuse.org/tumbleweed/appliances/openSUSE-Tumbleweed-Minimal-VM.x86_64-Cloud.qcow2
libvirt_image_dir: /var/lib/libvirt/images
libvirt_image_refresh_script: /usr/local/sbin/tumbleweed-image-refresh.sh
libvirt_image_refresh_oncalendar: "Sun *-*-* 03:30:00"
