# Ansible-managed (role: sshd). No algorithm pinning: every peer runs Leap 16
# or newer, whose OpenSSH defaults already exclude weak crypto.

PasswordAuthentication no
KbdInteractiveAuthentication no
# prohibit-password, not no: provisioning and the molecule full-VM tiers reach
# fresh hosts as root with keys; passwords are already refused above.
PermitRootLogin prohibit-password
X11Forwarding no
# Logs the key fingerprint used for each login.
LogLevel VERBOSE
