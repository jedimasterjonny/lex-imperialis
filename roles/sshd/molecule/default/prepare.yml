---
# The container image ships sshd inactive with no host keys; first start
# generates the keys the role's validate loads. Test-only — Ansible reaches
# fleet hosts over SSH, so sshd is already running there.
- name: Prepare
  hosts: all
  become: true
  tasks:
    - name: Start sshd
      ansible.builtin.systemd_service:
        name: sshd
        state: started

    # verify probes the live daemon with the ssh client, which openSUSE splits
    # into its own package the server image may not carry; without it the probe
    # would silently fail rather than test the daemon.
    - name: Install the ssh client for the verify probe
      community.general.zypper:
        name: openssh-clients
        state: present
