---
- name: Install the update service and timer
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/systemd/system/{{ item }}
    owner: root
    group: root
    mode: "0644"
  loop:
    - autoupdate.service
    - autoupdate.timer
  become: true

# daemon_reload picks up unit changes before enabling; it does not itself report
# changed, so the task stays idempotent.
- name: Enable and start the update timer
  ansible.builtin.systemd_service:
    name: autoupdate.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true
