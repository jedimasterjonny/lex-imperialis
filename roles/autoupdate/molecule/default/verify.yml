---
- name: Verify
  hosts: all
  vars_files:
    - ../../defaults/main.yml
  tasks:
    - name: Determine the upgrade command expected for this distribution
      ansible.builtin.set_fact:
        autoupdate_expected_command: "{{ 'dup' if ansible_facts['distribution'] == 'openSUSE Tumbleweed' else 'patch' }}"

    # daemon_reload is a no-op that just makes the module gather and return the
    # timer's systemctl-show properties to assert against; it reads, not mutates.
    - name: Read the update timer's state
      ansible.builtin.systemd_service:
        name: autoupdate.timer
        daemon_reload: true
      register: autoupdate_timer
      become: true

    - name: The timer is enabled and fires on the configured schedule
      ansible.builtin.assert:
        that:
          - autoupdate_timer.status.ActiveState == 'active'
          - autoupdate_timer.status.UnitFileState == 'enabled'
          # converge sets a non-default autoupdate_oncalendar, so matching it here
          # proves the variable drives the rendered timer.
          - "'Wed *-*-* 04:00:00' in autoupdate_timer.status.TimersCalendar"
        fail_msg: "the update timer is not enabled for the configured schedule"
        quiet: true

    - name: Read the update service definition
      ansible.builtin.systemd_service:
        name: autoupdate.service
      register: autoupdate_service
      become: true

    - name: The service runs the distro's zypper command then reboots
      ansible.builtin.assert:
        that:
          - "'zypper' in autoupdate_service.status.ExecStart"
          - autoupdate_expected_command in autoupdate_service.status.ExecStart
          # The reboot only fires because 102/103 count as success; drop this and
          # a reboot-recommended run exits non-zero and ExecStartPost is skipped.
          - autoupdate_service.status.SuccessExitStatus == '102 103'
          - "'reboot' in autoupdate_service.status.ExecStartPost"
          - "'autoupdate-metric.sh' in autoupdate_service.status.ExecStopPost"
        fail_msg: "the service does not run zypper {{ autoupdate_expected_command }}, accept 102/103, reboot, then record the outcome"
        quiet: true

    # Starting the service would reboot the host (ExecStartPost), so drive the
    # ExecStopPost writer directly the way systemd would — with SERVICE_RESULT set
    # — to prove it records each outcome as the metric node_exporter scrapes.
    - name: Record a successful run via the metric hook
      ansible.builtin.command: /usr/local/sbin/autoupdate-metric.sh
      environment:
        SERVICE_RESULT: success
      changed_when: false
      become: true

    - name: Read the update outcome metric after the successful run
      ansible.builtin.slurp:
        src: "{{ autoupdate_textfile_dir }}/autoupdate.prom"
      register: autoupdate_metric_ok
      become: true

    - name: A successful run records autoupdate_success 1
      ansible.builtin.assert:
        that:
          - "'autoupdate_success 1' in (autoupdate_metric_ok.content | b64decode)"
          - "'autoupdate_last_run_timestamp_seconds ' in (autoupdate_metric_ok.content | b64decode)"
        fail_msg: "the update outcome metric did not report a successful run"
        quiet: true

    - name: Record a failed run via the metric hook
      ansible.builtin.command: /usr/local/sbin/autoupdate-metric.sh
      environment:
        SERVICE_RESULT: exit-code
      changed_when: false
      become: true

    - name: Read the update outcome metric after the failed run
      ansible.builtin.slurp:
        src: "{{ autoupdate_textfile_dir }}/autoupdate.prom"
      register: autoupdate_metric_fail
      become: true

    - name: A failed run records autoupdate_success 0
      ansible.builtin.assert:
        that:
          - "'autoupdate_success 0' in (autoupdate_metric_fail.content | b64decode)"
        fail_msg: "the update outcome metric did not report a failed run"
        quiet: true
