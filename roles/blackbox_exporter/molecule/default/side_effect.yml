---
# Regression guard for the single-file bind-mount trap (mechanism in the role's
# tasks): a config change on an already-running container must recreate it, or the
# stale inode mount keeps the old config. verify asserts the new module took effect.
- name: Change the blackbox config on the running exporter
  hosts: all
  tasks:
    - name: Re-apply blackbox_exporter with an added sentinel module
      ansible.builtin.include_role:
        name: blackbox_exporter
      # The added sentinel module is the change under test; http_2xx and the
      # apparmor=unconfined the nested incus container needs to start both mirror
      # converge and must stay — defaults would drop http_2xx, which verify probes
      # through, and the apparmor exception the container needs to start.
      vars:
        blackbox_exporter_modules:
          http_2xx:
            prober: http
            timeout: 5s
            http:
              follow_redirects: true
              preferred_ip_protocol: ip4
          # Exists only to be a detectable delta in the loaded config; verify
          # checks its name appears in /config. It just has to be a valid module,
          # so no http block.
          http_2xx_sentinel:
            prober: http
        blackbox_exporter_security_opt_extra:
          - apparmor=unconfined
