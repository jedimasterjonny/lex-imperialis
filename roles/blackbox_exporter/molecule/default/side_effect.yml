---
# Regression guard for the single-file bind-mount trap (mechanism in the role's
# tasks): a config change on an already-running container must recreate it, or the
# stale inode mount keeps the old config. verify asserts the new module took effect.
- name: Change the blackbox config on the running exporter
  hosts: all
  tasks:
    # include_role vars replace rather than merge, so the sentinel has to be added
    # to the real module set, not stated instead of it. Load the defaults and
    # combine, rather than restating them: verify runs after this side effect and
    # asserts the real modules are loaded, and a hand-copy would drift silently the
    # first time a module is added to the role.
    - name: Load the role's real module set
      ansible.builtin.include_vars:
        file: ../../defaults/main.yml
        name: blackbox_exporter_real

    - name: Re-apply blackbox_exporter with an added sentinel module
      ansible.builtin.include_role:
        name: blackbox_exporter
      vars:
        # The sentinel is the change under test — verify checks its name reached the
        # loaded config. It only has to be a valid module, so no http block.
        blackbox_exporter_modules: >-
          {{ blackbox_exporter_real.blackbox_exporter_modules
             | combine({'http_2xx_sentinel': {'prober': 'http'}}) }}
        # The nested incus container cannot load an AppArmor profile.
        blackbox_exporter_security_opt_extra:
          - apparmor=unconfined
