---
- name: Create the textfile collector directory
  ansible.builtin.file:
    path: "{{ node_exporter_textfile_directory }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Install the node-exporter container unit
  ansible.builtin.template:
    src: node-exporter.container.j2
    dest: /etc/containers/systemd/node-exporter.container
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart node-exporter

# The quadlet unit only exists after the daemon reload, so apply pending
# restarts before asserting the service is up.
- name: Apply pending unit changes
  ansible.builtin.meta: flush_handlers

- name: Start node-exporter
  ansible.builtin.systemd_service:
    name: node-exporter
    state: started
  become: true
