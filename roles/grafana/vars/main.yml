---
# renovate's image manager bumps the tag.
grafana_image: docker.io/grafana/grafana-oss:12.1.0@sha256:6ac590e7cabc2fbe8d7b8fc1ce9c9f0582177b334e0df9c927ebd9670469440f

# Dashboards fetched from grafana.com at each pinned revision rather than
# vendored; a custom renovate manager bumps the revisions (see renovate.json).
# id is the grafana.com dashboard id; file is the local name under
# /etc/grafana/dashboards.
grafana_dashboards:
  - id: 1860
    # renovate: datasource=custom.grafana-dashboards depName=node-exporter-full packageName=1860
    revision: 45
    file: node-exporter-full.json
  - id: 19792
    # renovate: datasource=custom.grafana-dashboards depName=cadvisor packageName=19792
    revision: 6
    file: cadvisor.json
