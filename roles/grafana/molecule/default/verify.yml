---
- name: Verify
  hosts: all
  gather_facts: false
  vars_files:
    - ../../defaults/main.yml
  tasks:
    # Everything is reached through caddy with the vhost Host header: grafana
    # has no published port, only the caddy network.
    - name: Wait for grafana to answer through the proxy
      ansible.builtin.uri:
        url: http://127.0.0.1/api/health
        headers:
          Host: "grafana.{{ grafana_domain }}"
        return_content: true
      register: grafana_health
      until: grafana_health.status == 200 and grafana_health.json.database == 'ok'
      retries: 30
      delay: 2

    - name: Read the provisioned datasources
      ansible.builtin.uri:
        url: http://127.0.0.1/api/datasources
        headers:
          Host: "grafana.{{ grafana_domain }}"
        url_username: admin
        url_password: admin
        force_basic_auth: true
      register: grafana_datasources

    - name: The default prometheus datasource is provisioned
      ansible.builtin.assert:
        that:
          - >-
            grafana_datasources.json
            | selectattr('type', 'eq', 'prometheus')
            | selectattr('isDefault')
            | list | length > 0
        fail_msg: No default prometheus datasource is provisioned

    - name: Search the provisioned dashboards
      ansible.builtin.uri:
        url: http://127.0.0.1/api/search?type=dash-db
        headers:
          Host: "grafana.{{ grafana_domain }}"
        url_username: admin
        url_password: admin
        force_basic_auth: true
      register: grafana_dashboards

    - name: The canned dashboards are provisioned
      ansible.builtin.assert:
        that:
          - >-
            grafana_dashboards.json
            | selectattr('title', 'eq', 'Node Exporter Full')
            | list | length > 0
          - >-
            grafana_dashboards.json
            | selectattr('title', 'eq', 'cadvisor dashboard')
            | list | length > 0
          - >-
            grafana_dashboards.json
            | selectattr('title', 'eq', 'Blackbox Exporter')
            | list | length > 0
        fail_msg: The Node Exporter Full, cadvisor, and Blackbox Exporter dashboards are not all provisioned

    # A non-zero exit fails the task, proving curl resolves in the image and the
    # health endpoint reports ok.
    - name: The healthcheck passes
      ansible.builtin.command: podman healthcheck run grafana
      become: true
      changed_when: false

    # The checks above prove grafana works; they can't prove its capability set
    # is minimal. Assert the posture directly so a regression that widens the
    # caps or drops the restriction fails here, not silently in production.
    - name: Read grafana's security posture
      ansible.builtin.command: podman inspect grafana
      become: true
      register: grafana_inspect
      changed_when: false

    # grafana runs non-root (uid 472), so EffectiveCaps is always empty — only
    # BoundingCaps reflects DropCapability=all. Assert the bounding set.
    - name: Grafana keeps no capabilities and bars privilege escalation
      vars:
        grafana: "{{ grafana_inspect.stdout | from_json | first }}"
      ansible.builtin.assert:
        that:
          - "grafana.BoundingCaps | default([], true) | sort == []"
          - "'no-new-privileges' in (grafana.HostConfig.SecurityOpt | default([], true))"
        fail_msg: "grafana's capability or no-new-privileges posture has regressed"
        quiet: true
