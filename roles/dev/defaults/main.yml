---
# Developer tooling for the workstation.
dev_packages:
  - direnv
  - gh
  - git
  - make
  - neovim
  - python3
  - python3-pip

# npm ships with the role; disable on hosts that do no Node work.
dev_npm: true

# Claude Code installs per-user via the native installer; the owner is the
# target and the binary lands under their ~/.local.
dev_user: jonny
dev_user_home: "/home/{{ dev_user }}"
dev_claude_bin: "{{ dev_user_home }}/.local/bin/claude"

# Install the owner's passwordless-sudo drop-in on the workstation; set false on
# a host that should keep common's own-password %wheel policy instead.
dev_passwordless_sudo: true

# A boot-start Claude Code Remote Control session under the owner's own lingering
# `systemd --user` manager, so the workstation is remotely steerable from
# claude.ai/code or the Claude app the moment it is up. A system unit can't host
# it — on the SELinux-enforcing fleet PID 1 cannot exec the owner's home-installed
# binary. The role pre-seeds workspace trust for the workdir; the one remaining
# manual step is a one-time interactive `claude` /login (claude.ai OAuth, Pro/Max —
# API keys and CLAUDE_CODE_OAUTH_TOKEN are rejected) — see README.
dev_remote_control: true
dev_remote_control_workdir: "{{ dev_user_home }}"

# The owner's Claude Code config; the role seeds workspace trust into its projects
# map so the boot session clears the trust gate instead of crash-looping.
dev_claude_config: "{{ dev_user_home }}/.claude.json"
