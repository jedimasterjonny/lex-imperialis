---
- name: Install developer tooling
  community.general.zypper:
    name: "{{ dev_packages }}"
    state: present
  become: true

- name: Install npm
  community.general.zypper:
    name: npm
    state: present
  become: true
  when: dev_npm | bool

- name: Ensure curl is present for the Claude Code installer
  community.general.zypper:
    name: curl
    state: present
  become: true

# sudoers.d loads in sorted lexical order and the last match wins, so this
# drop-in must sort after common's `wheel` file for its NOPASSWD to override that
# file's own-password `%wheel` rule — `wheel-<owner>-` sorts after `wheel`.
# validate keeps a broken policy from ever reaching disk and locking out sudo.
- name: Grant the owner passwordless sudo on the workstation
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/wheel-{{ dev_user }}-nopasswd"
    content: |
      ## The workstation owner runs any command without a password, overriding
      ## common's own-password %wheel rule (this file sorts after wheel).
      {{ dev_user }} ALL=(ALL:ALL) NOPASSWD: ALL
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
  become: true
  when: dev_passwordless_sudo | bool

# Retire the hand-rolled %wheel NOPASSWD drop-in this supersedes; a no-op on any
# host that never carried it.
- name: Remove the superseded wheel-wide passwordless sudo drop-in
  ansible.builtin.file:
    path: /etc/sudoers.d/wheel-nopasswd
    state: absent
  become: true

# The native installer self-updates in the background, so it runs once and
# never again — creates guards re-runs. HOME is set explicitly because
# become_user does not reliably export it for the script.
- name: Install Claude Code with the native installer
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://claude.ai/install.sh | bash
    creates: "{{ dev_claude_bin }}"
  become: true
  become_user: "{{ dev_user }}"
  environment:
    HOME: "{{ dev_user_home }}"

- name: Deploy the owner's git and nvim dotfiles
  ansible.builtin.include_role:
    name: stow
  vars:
    stow_user: "{{ dev_user }}"
    stow_user_home: "{{ dev_user_home }}"
    stow_packages:
      - git
      - nvim

# Remote Control runs under the owner's own `systemd --user` manager, not a
# system unit: on the SELinux-enforcing fleet PID 1 (init_t) cannot read or exec
# the claude binary under the owner's home (home_bin_t), so a system service
# restart-storms with 203/EXEC. The user manager runs in the owner's unconfined
# domain, where the binary execs.
- name: Configure the Claude Code Remote Control session
  when: dev_remote_control | bool
  become: true
  become_user: "{{ dev_user }}"
  block:
    - name: Enable lingering so the owner's user manager runs at boot
      ansible.builtin.command:
        cmd: loginctl enable-linger {{ dev_user }}
        creates: "/var/lib/systemd/linger/{{ dev_user }}"
      become: true
      become_user: root

    - name: Create the owner's user systemd unit directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ dev_user }}"
        group: users
        mode: "0755"
      loop:
        - "{{ dev_user_home }}/.config/systemd/user"
        - "{{ dev_user_home }}/.config/systemd/user/default.target.wants"

    - name: Render the Claude Code Remote Control user unit
      ansible.builtin.template:
        src: claude-remote-control.service.j2
        dest: "{{ dev_user_home }}/.config/systemd/user/claude-remote-control.service"
        owner: "{{ dev_user }}"
        group: users
        mode: "0644"

    # Enabled only, never started here: enablement is just the
    # default.target.wants symlink the lingering user manager pulls in at boot.
    # Dropping it in directly rather than via `systemctl --user enable` means the
    # role needs no running user manager at converge — nothing to race, no bus to
    # reach. The session needs the owner's claude.ai credentials from a one-time
    # interactive /login (absent in molecule), so the role never starts it;
    # starting it credential-less would crash-loop. There is deliberately no
    # restart handler, so applying a change never tears down a live remote session
    # — edits take effect at the next restart or boot.
    - name: Enable the Claude Code Remote Control user service for boot
      ansible.builtin.file:
        src: ../claude-remote-control.service
        dest: "{{ dev_user_home }}/.config/systemd/user/default.target.wants/claude-remote-control.service"
        state: link

    # Claude refuses to run in an untrusted directory, so without this the boot
    # session exits "Workspace not trusted" and Restart=always crash-loops the
    # unit. Seed the per-directory trust keys (an interactively trusted project
    # carries both) into the owner's app-managed ~/.claude.json for the workdir.
    # The when-guard writes only when a key is missing, so once seeded a converge
    # skips it — no churn, no clobber of Claude's live writes; an absent file is
    # created minimal and Claude merges its own state on first run. no_log keeps
    # the owner's stored OAuth token (same file) out of --diff.
    - name: Stat the owner's Claude Code config
      ansible.builtin.stat:
        path: "{{ dev_claude_config }}"
      register: dev_claude_config_stat

    - name: Read the owner's Claude Code config when present
      ansible.builtin.slurp:
        src: "{{ dev_claude_config }}"
      register: dev_claude_config_slurp
      when: dev_claude_config_stat.stat.exists
      no_log: true

    - name: Trust the Remote Control workspace in the owner's Claude config
      ansible.builtin.copy:
        dest: "{{ dev_claude_config }}"
        content: "{{ dev_claude_config_existing | combine(dev_claude_trust_patch, recursive=true) | to_nice_json }}\n"
        mode: "0600"
      vars:
        dev_claude_config_existing: >-
          {{ (dev_claude_config_slurp.content | b64decode | from_json)
             if dev_claude_config_stat.stat.exists else {} }}
        dev_claude_config_project: "{{ dev_claude_config_existing.projects[dev_remote_control_workdir] | default({}) }}"
        # A templated YAML key is not rendered, so build the patch as a Jinja
        # literal where the workdir is the key expression.
        dev_claude_trust_patch: >-
          {{ {'projects': {dev_remote_control_workdir: {'hasTrustDialogAccepted': true,
             'hasCompletedProjectOnboarding': true}}} }}
      when: >-
        not (dev_claude_config_project.hasTrustDialogAccepted | default(false) | bool
             and dev_claude_config_project.hasCompletedProjectOnboarding | default(false) | bool)
      no_log: true
