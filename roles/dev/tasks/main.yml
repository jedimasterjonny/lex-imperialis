---
- name: Install developer tooling
  community.general.zypper:
    name: "{{ dev_packages }}"
    state: present
  become: true

- name: Install npm
  community.general.zypper:
    name: npm
    state: present
  become: true
  when: dev_npm | bool

- name: Ensure curl is present for the Claude Code installer
  community.general.zypper:
    name: curl
    state: present
  become: true

# The native installer self-updates in the background, so it runs once and
# never again — creates guards re-runs. HOME is set explicitly because
# become_user does not reliably export it for the script.
- name: Install Claude Code with the native installer
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://claude.ai/install.sh | bash
    creates: "{{ dev_claude_bin }}"
  become: true
  become_user: "{{ dev_user }}"
  environment:
    HOME: "{{ dev_user_home }}"

- name: Deploy the owner's git and nvim dotfiles
  ansible.builtin.include_role:
    name: stow
  vars:
    stow_user: "{{ dev_user }}"
    stow_user_home: "{{ dev_user_home }}"
    stow_packages:
      - git
      - nvim

- name: Install the Claude Code Remote Control service
  ansible.builtin.template:
    src: claude-remote-control.service.j2
    dest: /etc/systemd/system/claude-remote-control.service
    owner: root
    group: root
    mode: "0644"
  become: true
  when: dev_remote_control | bool

# Enabled only, never started here: the session needs the owner's claude.ai
# credentials, which only exist on the real host after a one-time interactive
# /login. WantedBy=multi-user.target brings it up at the next boot; starting it
# in molecule (no credentials) would crash-loop. Unit edits take effect at the
# next restart or boot — there is deliberately no restart handler, so applying a
# change never tears down a live remote session.
- name: Enable the Claude Code Remote Control service for boot
  ansible.builtin.systemd_service:
    name: claude-remote-control.service
    enabled: true
    daemon_reload: true
  become: true
  when: dev_remote_control | bool
