---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Query the podman runtime
      ansible.builtin.command: podman info
      become: true
      register: podman_info
      changed_when: false

    - name: The netavark network backend is active
      ansible.builtin.assert:
        that:
          - "'netavark' in podman_info.stdout"
        fail_msg: "podman is not using the netavark network backend"
        quiet: true

    # podman info is YAML, so read the name out of it rather than
    # substring-matching the whole report.
    - name: The configured OCI runtime is the expected one
      ansible.builtin.assert:
        that:
          - (podman_info.stdout | from_yaml)['host']['ociRuntime']['name'] == podman_expected_runtime
        fail_msg: "podman is not configured for the {{ podman_expected_runtime }} OCI runtime"
        quiet: true

    # podman info reports only what is *configured* — a container records the
    # runtime it was created under, so nothing but starting one proves the runtime
    # works. The host filesystem is the rootfs, overlaid so the container cannot
    # write to it, which leaves the probe with no image to pull and renovate-pin.
    # --replace, as quadlet's own ExecStart does, so verify can be re-run.
    - name: Start a container under the configured runtime
      ansible.builtin.command: podman run --replace --name podman-runtime-probe --network=none --rootfs /:O /bin/true
      become: true
      changed_when: false

    - name: Read the runtime the probe container recorded
      ansible.builtin.command: podman inspect podman-runtime-probe
      become: true
      register: podman_probe_inspect
      changed_when: false

    - name: The container ran under the expected runtime
      ansible.builtin.assert:
        that:
          - (podman_probe_inspect.stdout | from_json)[0]['OCIRuntime'] == podman_expected_runtime
        fail_msg: "the probe container did not run under {{ podman_expected_runtime }}"
        quiet: true

    # aardvark-dns is only *recommended* by the podman package, so the role
    # installs it explicitly; podman info lists it under the backend's dns only
    # when present. netavark ships regardless, so it cannot stand in for this.
    - name: The aardvark-dns resolver is present for the network backend
      ansible.builtin.assert:
        that:
          - "'aardvark' in podman_info.stdout"
        fail_msg: "aardvark-dns is not present for the netavark backend"
        quiet: true

    # daemon_reload is a no-op that just makes the module gather and return the
    # timer's systemctl-show properties to assert against; it reads, not mutates.
    - name: Read the prune timer's state
      ansible.builtin.systemd_service:
        name: podman-image-prune.timer
        daemon_reload: true
      register: podman_prune_timer
      become: true

    - name: The timer is enabled and fires at 06:00 on Saturdays
      ansible.builtin.assert:
        that:
          - podman_prune_timer.status.ActiveState == 'active'
          - podman_prune_timer.status.UnitFileState == 'enabled'
          - "'Sat' in podman_prune_timer.status.TimersCalendar"
          - "'06:00:00' in podman_prune_timer.status.TimersCalendar"
        fail_msg: "the prune timer is not enabled for Sat 06:00"
        quiet: true

    - name: Stage a probe build context
      ansible.builtin.file:
        path: /tmp/podman-prune-probe
        state: directory
        mode: "0755"

    # COPY only: the prune needs the image to exist, never to run.
    - name: Write the probe Containerfile
      ansible.builtin.copy:
        content: |
          FROM scratch
          COPY Containerfile /
        dest: /tmp/podman-prune-probe/Containerfile
        mode: "0644"

    # Tagged, so not dangling: only --all reclaims it, since no container uses
    # it. This is the regression guard the old dangling-only prune would fail.
    - name: Build a tagged image that no container uses
      ansible.builtin.command: podman build --tag podman-prune-probe:local /tmp/podman-prune-probe
      become: true
      changed_when: false

    - name: List the probe image before the prune
      ansible.builtin.command: podman images --quiet podman-prune-probe:local
      become: true
      register: podman_probe_before
      changed_when: false

    # Starting a oneshot unit blocks until it exits, so success means the
    # prune ran clean.
    - name: Fire the prune service
      ansible.builtin.systemd_service:
        name: podman-image-prune.service
        state: started
      become: true

    - name: List the probe image after the prune
      ansible.builtin.command: podman images --quiet podman-prune-probe:local
      become: true
      register: podman_probe_after
      changed_when: false

    - name: The prune reclaimed the unused tagged image
      ansible.builtin.assert:
        that:
          - podman_probe_before.stdout_lines | length > 0
          - podman_probe_after.stdout_lines | length == 0
        quiet: true
