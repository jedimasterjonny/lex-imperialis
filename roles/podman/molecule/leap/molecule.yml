---
platforms:
  - name: "lex-podman-leap-${MOLECULE_RUN_ID:-local}"
    image: images:opensuse/16.0/cloud
    # podman mounts overlays for its storage, which incus only permits in a
    # nested-container-capable instance. verify starts a container to prove the
    # OCI runtime works, and the CI runner's AppArmor denies a nested runtime's
    # sysctl fd-reopen, so drop the profile — the instance is throwaway.
    config:
      security.nesting: "true"
      raw.lxc: lxc.apparmor.profile=unconfined
provisioner:
  name: ansible
  # Provisioning is role-agnostic and shared at the repo root; ../../../.. is
  # the repo root relative to this scenario dir.
  playbooks:
    create: "${MOLECULE_SCENARIO_DIRECTORY}/../../../../molecule/incus/create.yml"
    destroy: "${MOLECULE_SCENARIO_DIRECTORY}/../../../../molecule/incus/destroy.yml"
  config_options:
    defaults:
      roles_path: "${MOLECULE_SCENARIO_DIRECTORY}/../../.."
  inventory:
    group_vars:
      all:
        ansible_connection: community.general.incus
        ansible_incus_remote: local
        # Leap packages no crun, so this image must end up on runc.
        podman_expected_runtime: runc
