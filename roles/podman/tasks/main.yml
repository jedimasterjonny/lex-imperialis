---
- name: Install podman
  community.general.zypper:
    name: "{{ podman_packages }}"
    state: present
  become: true

# netavark reapplies its rules when firewalld reloads, so published ports and
# container networking survive a reload; the shipped unit is disabled.
- name: Enable the netavark firewalld-reload listener
  ansible.builtin.systemd_service:
    name: netavark-firewalld-reload.service
    enabled: true
    state: started
  become: true

- name: Create the quadlet directory
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Install the prune service and timer
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/systemd/system/{{ item }}
    owner: root
    group: root
    mode: "0644"
  loop:
    - podman-image-prune.service
    - podman-image-prune.timer
  become: true

# daemon_reload picks up unit changes before enabling; it does not itself report
# changed, so the task stays idempotent.
- name: Enable and start the prune timer
  ansible.builtin.systemd_service:
    name: podman-image-prune.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true
