---
- name: Install podman
  community.general.zypper:
    name: "{{ podman_packages }}"
    state: present
  become: true

# netavark reapplies its rules when firewalld reloads, so published ports and
# container networking survive a reload; the shipped unit is disabled.
- name: Enable the netavark firewalld-reload listener
  ansible.builtin.systemd_service:
    name: netavark-firewalld-reload.service
    enabled: true
    state: started
  become: true

# podman/netavark manage the container bridges themselves; NetworkManager must
# not. Otherwise deleting the last bridge — a run that stops every container, as
# podman_backup does — fires an NM event that unmounts the _netdev NFS shares
# mid-run. Skipped where NetworkManager is absent (the molecule containers).
- name: Detect NetworkManager
  ansible.builtin.stat:
    path: /etc/NetworkManager/conf.d
  register: podman_nm_confd

- name: Leave podman's bridges unmanaged by NetworkManager
  ansible.builtin.template:
    src: networkmanager-podman.conf.j2
    dest: /etc/NetworkManager/conf.d/podman.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  when: podman_nm_confd.stat.exists
  notify: Reload NetworkManager for podman

- name: Create the quadlet directory
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

# Tumbleweed gets this directory from libcontainers-common; Leap 16 ships no such
# thing, so create it.
- name: Detect the containers.conf drop-in directory
  ansible.builtin.stat:
    path: /etc/containers/containers.conf.d
  register: podman_confd

- name: Create the containers.conf drop-in directory
  ansible.builtin.file:
    path: /etc/containers/containers.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

# Must outrank libcontainers-common's 00-suse-containers.conf, which pins
# runtime = "runc": podman reads the directory in lexical order, last write wins.
#
# A dry run creates nothing, so on a host that has no drop-in directory yet
# template would fatal rather than render — taking the rest of the play's --check
# with it. Skip it there; the task above has already reported the directory.
- name: Set podman's OCI runtime
  ansible.builtin.template:
    src: containers-runtime.conf.j2
    dest: /etc/containers/containers.conf.d/10-runtime.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  when: podman_confd.stat.exists or not ansible_check_mode

- name: Install the prune service and timer
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/systemd/system/{{ item }}
    owner: root
    group: root
    mode: "0644"
  loop:
    - podman-image-prune.service
    - podman-image-prune.timer
  become: true

# daemon_reload picks up unit changes before enabling; it does not itself report
# changed, so the task stays idempotent.
- name: Enable and start the prune timer
  ansible.builtin.systemd_service:
    name: podman-image-prune.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true
