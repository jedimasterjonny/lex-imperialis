---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    # Matches restic_backup_root in converge.yml.
    podman_backup_repo_root: /var/tmp/backup
    # Paths the engine derives from name=podman, asserted against here.
    podman_backup_script: /usr/local/sbin/podman-backup.sh
    podman_backup_restore_script: /usr/local/sbin/podman-restore.sh
    podman_backup_metric_script: /usr/local/sbin/podman-backup-metric.sh
    # The engine's default textfile dir (podman_backup inherits it); the outcome
    # metric lands here.
    podman_backup_textfile_dir: /var/lib/node_exporter/textfile_collector
    podman_backup_probe_content: "lex-imperialis podman backup probe\n"
  tasks:
    - name: Confirm restic is installed and runnable
      ansible.builtin.command: restic version
      register: podman_backup_restic
      changed_when: false

    # side_effect ran podman-restore.sh, which quiesced (stopped) the probe unit
    # and must have restarted it via its EXIT trap. If the trap were broken the
    # unit would still be down here, before verify fires anything.
    - name: Read the probe unit's state after the side-effect restore
      ansible.builtin.systemd_service:
        name: lex-probe
      register: podman_backup_probe_after_restore
      become: true

    - name: The restore restarted the quiesced probe unit
      ansible.builtin.assert:
        that:
          - podman_backup_probe_after_restore.status.ActiveState == 'active'
        fail_msg: "the restore did not restart the quiesced probe unit"
        quiet: true

    - name: Stat the backup script
      ansible.builtin.stat:
        path: "{{ podman_backup_script }}"
      register: podman_backup_script_stat

    - name: The backup script is installed and executable
      ansible.builtin.assert:
        that:
          - podman_backup_script_stat.stat.exists
          - podman_backup_script_stat.stat.executable
        fail_msg: "{{ podman_backup_script }} is missing or not executable"
        quiet: true

    - name: Stat the restore script
      ansible.builtin.stat:
        path: "{{ podman_backup_restore_script }}"
      register: podman_backup_restore_script_stat

    - name: The restore script is installed and executable
      ansible.builtin.assert:
        that:
          - podman_backup_restore_script_stat.stat.exists
          - podman_backup_restore_script_stat.stat.executable
        fail_msg: "{{ podman_backup_restore_script }} is missing or not executable"
        quiet: true

    # daemon_reload is a no-op that just makes the module gather and return the
    # timer's systemctl-show properties to assert against; it reads, not mutates.
    - name: Read the backup timer's state
      ansible.builtin.systemd_service:
        name: podman-backup.timer
        daemon_reload: true
      register: podman_backup_timer
      become: true

    - name: The timer is enabled and fires at 01:00 on Wednesdays
      ansible.builtin.assert:
        that:
          - podman_backup_timer.status.ActiveState == 'active'
          - podman_backup_timer.status.UnitFileState == 'enabled'
          - "'Wed' in podman_backup_timer.status.TimersCalendar"
          - "'01:00:00' in podman_backup_timer.status.TimersCalendar"
        fail_msg: "the backup timer is not enabled for Wed 01:00"
        quiet: true

    # The script derives the repo from $(hostname); match it the same way.
    - name: Determine the host's repo path
      ansible.builtin.command: hostname
      register: podman_backup_hostname
      changed_when: false

    - name: Set the repo path
      ansible.builtin.set_fact:
        podman_backup_repo: "{{ podman_backup_repo_root }}/{{ podman_backup_hostname.stdout }}-podman-backup"

    # Starting a oneshot unit blocks until it exits, so success means the
    # backup ran clean.
    - name: Fire the backup service
      ansible.builtin.systemd_service:
        name: podman-backup.service
        state: started
      become: true

    # The backup quiesced (stopped) the probe unit and must have restarted it via
    # its EXIT trap; a broken trap would leave the container down after the run.
    - name: Read the probe unit's state after the backup
      ansible.builtin.systemd_service:
        name: lex-probe
      register: podman_backup_probe_after_backup
      become: true

    - name: The backup restarted the quiesced probe unit
      ansible.builtin.assert:
        that:
          - podman_backup_probe_after_backup.status.ActiveState == 'active'
        fail_msg: "the backup did not restart the quiesced probe unit"
        quiet: true

    - name: Restore the latest snapshot to a scratch directory
      ansible.builtin.command: "restic --insecure-no-password --repo {{ podman_backup_repo }} restore latest --target /var/tmp/restore"
      changed_when: false
      become: true

    - name: Read the probe file back from the restore
      ansible.builtin.slurp:
        src: /var/tmp/restore/var/lib/containers/storage/volumes/lex-probe/_data/probe.txt
      register: podman_backup_restored
      become: true

    - name: The probe data round-trips through restic
      ansible.builtin.assert:
        that:
          - (podman_backup_restored.content | b64decode) == podman_backup_probe_content
        fail_msg: "the probe data did not round-trip through the backup"
        quiet: true

    # The successful run above triggered ExecStopPost, which should have recorded
    # the outcome metric node_exporter scrapes.
    - name: Read the outcome metric after the successful run
      ansible.builtin.slurp:
        src: "{{ podman_backup_textfile_dir }}/podman-backup.prom"
      register: podman_backup_metric_ok
      become: true

    - name: A successful run records podman_backup_success 1
      ansible.builtin.assert:
        that:
          - "'podman_backup_success 1' in (podman_backup_metric_ok.content | b64decode)"
          - "'podman_backup_last_run_timestamp_seconds ' in (podman_backup_metric_ok.content | b64decode)"
        fail_msg: "the outcome metric did not report a successful run"
        quiet: true

    # Drive the writer the way systemd would on a failed run; ExecStart failure
    # can't be forced in a container, so invoke the hook with SERVICE_RESULT set.
    - name: Simulate a failed run's ExecStopPost
      ansible.builtin.command: "{{ podman_backup_metric_script }}"
      environment:
        SERVICE_RESULT: exit-code
      changed_when: false
      become: true

    - name: Read the outcome metric after the simulated failure
      ansible.builtin.slurp:
        src: "{{ podman_backup_textfile_dir }}/podman-backup.prom"
      register: podman_backup_metric_fail
      become: true

    - name: A failed run records podman_backup_success 0
      ansible.builtin.assert:
        that:
          - "'podman_backup_success 0' in (podman_backup_metric_fail.content | b64decode)"
        fail_msg: "the outcome metric did not report a failed run"
        quiet: true

    # side_effect ran podman-restore.sh after tampering with the live volume; the
    # probe should be back to its original content in the volume itself, not just
    # a scratch restore.
    - name: Read the probe file from the live volume after the restore
      ansible.builtin.slurp:
        src: /var/lib/containers/storage/volumes/lex-probe/_data/probe.txt
      register: podman_backup_live_probe
      become: true

    - name: The restore returned the original probe data to the volume
      ansible.builtin.assert:
        that:
          - (podman_backup_live_probe.content | b64decode) == podman_backup_probe_content
        fail_msg: "the restore did not return the original probe data to the volume"
        quiet: true

    - name: Stat the stray file the restore should have removed
      ansible.builtin.stat:
        path: /var/lib/containers/storage/volumes/lex-probe/_data/stray.txt
      register: podman_backup_stray
      become: true

    - name: The restore is an exact mirror, not an overlay
      ansible.builtin.assert:
        that:
          - not podman_backup_stray.stat.exists
        fail_msg: "the restore left a stray file the snapshot did not contain"
        quiet: true

    # The green backup run above ended in restic check, so the service already
    # exercises the check on a sound repo. Assert it is wired into the installed
    # script, then that the role's invocation is a real gate, not a no-op: the
    # same check must reject a repo whose data is gone. Corrupt a copy, not the
    # live repo, so a standalone `make verify` re-run still starts sound.
    - name: Read the installed backup script
      ansible.builtin.slurp:
        src: "{{ podman_backup_script }}"
      register: podman_backup_script_content
      become: true

    - name: The backup script runs a restic check with a read-data slice
      ansible.builtin.assert:
        that:
          - "'restic check' in (podman_backup_script_content.content | b64decode)"
          - "'--read-data-subset' in (podman_backup_script_content.content | b64decode)"
        fail_msg: "the backup script does not run restic check with a read-data slice"
        quiet: true

    - name: Discard any prior corrupt copy
      ansible.builtin.file:
        path: "{{ podman_backup_repo }}-corrupt"
        state: absent
      become: true

    - name: Copy the scratch repo to corrupt in isolation
      ansible.builtin.command: "cp -a {{ podman_backup_repo }} {{ podman_backup_repo }}-corrupt"
      changed_when: true
      become: true

    - name: Remove the copy's data to corrupt it
      ansible.builtin.file:
        path: "{{ podman_backup_repo }}-corrupt/data"
        state: absent
      become: true

    - name: Run the integrity check against the corrupt copy
      ansible.builtin.command: "restic --insecure-no-password --repo {{ podman_backup_repo }}-corrupt check"
      register: podman_backup_corrupt_check
      changed_when: false
      failed_when: false
      become: true

    - name: A corrupt repo fails the integrity check
      ansible.builtin.assert:
        that:
          - podman_backup_corrupt_check.rc != 0
        fail_msg: "restic check passed a repo with its data removed"
        quiet: true

    # The check above deletes whole packs, which a metadata check already catches
    # — so it does not prove the newly-defaulted read-data slice earns its keep.
    # Bit-rot is a flipped byte *inside* an otherwise-intact pack. A plain check
    # reads and MAC-verifies tree packs but not data packs, so the corruption must
    # land in a data pack: pick the largest, which the incompressible payload
    # seeded in converge makes unambiguously a data pack. Then assert the
    # distinction — a plain check passes, a --read-data check fails (full, not the
    # rotating subset, so the tampered pack is always read whatever week it is).
    - name: Discard any prior bit-rot copy
      ansible.builtin.file:
        path: "{{ podman_backup_repo }}-bitrot"
        state: absent
      become: true

    - name: Copy the scratch repo to flip a pack byte in isolation
      ansible.builtin.command: "cp -a {{ podman_backup_repo }} {{ podman_backup_repo }}-bitrot"
      changed_when: true
      become: true

    - name: Flip one byte inside the largest (data) pack
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import glob, os, sys
            packs = glob.glob(sys.argv[1] + "/data/*/*")
            if not packs:
                sys.exit("no data packs found to corrupt")
            target = max(packs, key=os.path.getsize)
            with open(target, "r+b") as f:
                first = f.read(1)
                f.seek(0)
                f.write(bytes([first[0] ^ 0xff]))
          - "{{ podman_backup_repo }}-bitrot"
      changed_when: true
      become: true

    - name: A metadata-only check does not notice the flipped byte
      ansible.builtin.command: "restic --insecure-no-password --repo {{ podman_backup_repo }}-bitrot check"
      register: podman_backup_bitrot_meta
      changed_when: false
      failed_when: false
      become: true

    - name: A read-data check catches the flipped byte
      ansible.builtin.command: "restic --insecure-no-password --repo {{ podman_backup_repo }}-bitrot check --read-data"
      register: podman_backup_bitrot_read
      changed_when: false
      failed_when: false
      become: true

    - name: Only the read-data check detects intra-pack bit-rot
      ansible.builtin.assert:
        that:
          - podman_backup_bitrot_meta.rc == 0
          - podman_backup_bitrot_read.rc != 0
        fail_msg: >-
          metadata rc={{ podman_backup_bitrot_meta.rc }} (want 0),
          read-data rc={{ podman_backup_bitrot_read.rc }} (want non-zero)
        quiet: true
