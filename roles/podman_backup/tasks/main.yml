---
# podman_backup is a thin consumer of the restic_backup engine in podman-volumes
# mode: it backs up this host's podman named volumes (quiescing their quadlet
# units for a consistent snapshot) and installs the matching restore script. The
# engine owns restic, the backup/metric scripts, and the service and timer, and
# supplies the retention, check-cadence, root, and textfile-dir defaults.
- name: Back up podman volumes with restic
  ansible.builtin.include_role:
    name: restic_backup
  vars:
    restic_backup_name: podman
    restic_backup_description: podman volumes
    restic_backup_tag: podman-volumes
    restic_backup_podman_volumes: true
    restic_backup_oncalendar: "{{ podman_backup_oncalendar }}"
