---
# podman_backup drives the restic_backup engine in podman-volumes mode. It sets
# only what differs from the engine defaults; retention, the check cadence, the
# textfile dir, and the astropath root all inherit from restic_backup. The repo,
# unit, script, and metric names derive from the engine's name=podman, giving
# <hostname>-podman-backup, podman-backup.service/.timer, and the
# podman_backup_success metric.

# Weekly, on a slot no other scheduled job uses — autoupdate (Mon 03:00-05:00),
# podman image-prune (Sat 06:00), incus (Sun 03:00) and libvirt (Sun 03:30)
# refreshes all sit elsewhere.
podman_backup_oncalendar: "Wed *-*-* 01:00:00"
