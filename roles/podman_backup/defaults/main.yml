---
# restic is the backup engine and its own rotation tool (restic forget --prune).
podman_backup_package: restic

# The repo lives at <root>/<hostname>-podman-backup; the script appends the
# hostname at run time. Default root is the astropath NFS share solar mounts.
podman_backup_root: /nfs/astropath

# Installed backup script. /usr/local/sbin: root-only, like incus-image-refresh.
podman_backup_script: /usr/local/sbin/podman-backup.sh

# Installed restore script — the inverse of the backup, for disaster recovery
# (docs/disaster-recovery.md). Same root-only /usr/local/sbin home; run by hand,
# not on a timer.
podman_backup_restore_script: /usr/local/sbin/podman-restore.sh

# ExecStopPost hook that records each run's outcome as a node_exporter textfile
# metric. Same /usr/local/sbin home as the backup script.
podman_backup_metric_script: /usr/local/sbin/podman-backup-metric.sh

# node_exporter textfile-collector directory the outcome metric is written to
# (podman-backup.prom). Must match the node_exporter role's
# node_exporter_textfile_directory so Prometheus scrapes what this writes.
podman_backup_textfile_dir: /var/lib/node_exporter/textfile_collector

# Weekly, on a slot no other scheduled job uses — autoupdate (Mon 03:00-05:00),
# podman image-prune (Sat 06:00), incus (Sun 03:00) and libvirt (Sun 03:30)
# refreshes all sit elsewhere.
podman_backup_oncalendar: "Wed *-*-* 01:00:00"

# restic retention: weeks then months of history kept, older snapshots pruned.
podman_backup_keep_weekly: 8
podman_backup_keep_monthly: 6
