---
# The verification lives in pytest (roles/caddy/tests/), run on the controller
# against the converged instance; VERIFY_TARGET names it and the repo-root
# conftest turns that into `incus exec`. playbook_dir/../../tests resolves to
# the role's tests dir from either incus scenario's directory, so the leap
# symlink needs no change.
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Run the pytest verification suite against the instance
      ansible.builtin.command: python -m pytest {{ playbook_dir }}/../../tests -q
      environment:
        VERIFY_TARGET: "{{ inventory_hostname }}"
      delegate_to: localhost
      changed_when: false
