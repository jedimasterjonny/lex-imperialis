---
# NFS client package; provides mount.nfs / mount.nfs4.
nfs_package: nfs-client

# Every share mounts under here, as /nfs/<name>.
nfs_mount_root: /nfs

# Mount options, tuned for the link to the NAS. The NAS serves over 1 GbE
# (~117 MB/s usable) and that link is the ceiling: the client's 2.5 GbE and the
# 10 GbE switch cannot lift a single flow past the slowest hop. NFSv4.2's default
# 1 MiB rsize/wsize already saturate gigabit, so they are pinned at 1 MiB rather
# than inflated for the faster switch, which a single flow can't use.
#   _netdev   order the mount after the network is online
#   hard      retry indefinitely rather than return I/O errors and risk data loss
#   noatime   drop atime write-backs: fewer round trips, less load on the NAS
nfs_mount_options: "_netdev,noatime,nfsvers=4.2,hard,rsize=1048576,wsize=1048576"

# Shares to mount, set per host. Each item: name (mounts at /nfs/<name>), server,
# export. Empty by default, so the role is a no-op until a host defines shares.
nfs_shares: []
