---
# common_hostname has no default — each play sets it per host, since the
# inventory name isn't always the real one (this_host is the alias for scholam).

# Owner account: the identity mirrors the local Tumbleweed install. wheel is
# added for sudo; no password is managed.
common_user_name: jonny
# Every play overrides this to 1026 (NAS uid alignment); the 1000 default is
# exercised only by molecule, whose prepare frees uid 1000 on the image.
common_user_uid: 1000
common_user_group: users
common_user_groups:
  - wheel
common_user_shell: /bin/bash
common_user_comment: "Jonny O'Connell"
common_user_home: "/home/{{ common_user_name }}"

# SELinux mode for every host, declared rather than left to the OS default.
# enforcing no-ops where the OS already enforces (Tumbleweed) and flips the hosts
# defaulting permissive (Leap). Applied only where SELinux is manageable, so the
# molecule containers (no SELinux) skip it.
common_selinux_mode: enforcing

# Kernel modules barred from loading, in unload order — a holder must be listed
# before the module it holds.
common_blacklisted_modules: []

# Base tools for every host.
common_packages:
  - vim
  - tmux
  - htop
  - sudo
  - git
