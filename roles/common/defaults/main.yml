---
# Owner account: the identity mirrors the local Tumbleweed install. wheel is
# added for sudo; no password is managed.
common_user_name: jonny
common_user_uid: 1000
common_user_group: users
common_user_groups:
  - wheel
common_user_shell: /bin/bash
common_user_comment: "Jonny O'Connell"
common_user_home: "/home/{{ common_user_name }}"

# git backs the dotfiles checkout; the rest are the requested base tools.
common_packages:
  - vim
  - tmux
  - htop
  - stow
  - sudo
  - git

common_dots_dir: "{{ common_user_home }}/dots"
common_dots_repo: "https://github.com/jedimasterjonny/dots.git"
common_dots_version: main
common_dots_stow_package: bash-suse
common_dots_stow_dir: "{{ common_dots_dir }}/{{ common_dots_stow_package }}"
