---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    # Mirror converge: the molecule instance name is the container's hostname.
    common_hostname: "{{ inventory_hostname }}"
  vars_files:
    - ../../defaults/main.yml
  tasks:
    - name: Look up the owner account
      ansible.builtin.getent:
        database: passwd
        key: "{{ common_user_name }}"

    - name: Read the group database
      ansible.builtin.getent:
        database: group

    - name: Owner account mirrors the configured identity
      ansible.builtin.assert:
        that:
          - ansible_facts['getent_passwd'][common_user_name][1] | int == common_user_uid
          - ansible_facts['getent_passwd'][common_user_name][2] == ansible_facts['getent_group'][common_user_group][1]
          - ansible_facts['getent_passwd'][common_user_name][4] == common_user_home
          - ansible_facts['getent_passwd'][common_user_name][5] == common_user_shell
        fail_msg: "owner account does not match the configured uid/group/home/shell"

    - name: Owner belongs to the configured supplementary groups
      ansible.builtin.assert:
        that:
          - common_user_name in ansible_facts['getent_group'][item][2].split(',')
        fail_msg: "owner is not a member of the {{ item }} group"
        quiet: true
      loop: "{{ common_user_groups }}"

    - name: Stat the wheel sudoers drop-in
      ansible.builtin.stat:
        path: /etc/sudoers.d/wheel
      register: common_sudoers_wheel

    - name: Wheel sudoers drop-in is installed and sudo-readable
      ansible.builtin.assert:
        that:
          - common_sudoers_wheel.stat.exists
          - common_sudoers_wheel.stat.mode == '0440'
          - common_sudoers_wheel.stat.pw_name == 'root'
          - common_sudoers_wheel.stat.gr_name == 'root'
        fail_msg: "/etc/sudoers.d/wheel is missing or not owned root:root mode 0440"

    # The stat proves the file exists and is sudo-readable; slurp it to prove the
    # policy itself — wheel gets full sudo and authenticates with its own password
    # (targetpw off), the two lines that make the drop-in load-bearing.
    - name: Read the wheel sudoers drop-in
      ansible.builtin.slurp:
        src: /etc/sudoers.d/wheel
      register: common_sudoers_wheel_content
      become: true

    - name: Wheel sudoers grants own-password sudo
      ansible.builtin.assert:
        that:
          - "'%wheel ALL=(ALL:ALL) ALL' in (common_sudoers_wheel_content.content | b64decode)"
          - "'Defaults:%wheel !targetpw' in (common_sudoers_wheel_content.content | b64decode)"
        fail_msg: "the wheel sudoers drop-in does not grant own-password sudo"
        quiet: true

    - name: Gather installed package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Base packages are installed
      ansible.builtin.assert:
        that:
          - item in ansible_facts.packages
        fail_msg: "package {{ item }} is not installed"
        quiet: true
      loop: "{{ common_packages }}"

    - name: Stat the stowed bashrc
      ansible.builtin.stat:
        path: "{{ common_user_home }}/.bashrc"
      register: common_bashrc

    - name: Owner bashrc is a stow symlink
      ansible.builtin.assert:
        that:
          - common_bashrc.stat.exists
          - common_bashrc.stat.islnk
        fail_msg: "bash-suse dotfiles are not stowed for the owner"

    - name: Read the system hostname
      ansible.builtin.command: hostname
      register: common_hostname_cmd
      changed_when: false

    - name: System hostname matches the configured name
      ansible.builtin.assert:
        that:
          - common_hostname_cmd.stdout == common_hostname
        fail_msg: "hostname is {{ common_hostname_cmd.stdout }}, expected {{ common_hostname }}"
