---
- name: Set the system hostname
  ansible.builtin.hostname:
    name: "{{ common_hostname }}"
  become: true

# blacklist alone only stops the udev/modalias autoload, so pair it with an
# install line that sends an explicit modprobe — or a load pulled in as another
# module's dependency — to /bin/false. Rendered unconditionally: an empty list
# yields an inert file, so emptying it reclaims the modules rather than leaving
# a stale drop-in barring them forever.
- name: Bar the blacklisted kernel modules from loading
  ansible.builtin.template:
    src: blacklist.conf.j2
    dest: /etc/modprobe.d/common-blacklist.conf
    owner: root
    group: root
    mode: "0644"
  become: true

# modprobe's own loaded-check reads modules.builtin under the running kernel's
# /lib/modules, absent from a container rootfs — it fails outright rather than
# skipping. /sys/module is the kernel's own answer, and it spells a module with
# underscores however modprobe was given it.
- name: Probe for the blacklisted kernel modules
  ansible.builtin.stat:
    path: "/sys/module/{{ item | replace('-', '_') }}"
  loop: "{{ common_blacklisted_modules }}"
  register: common_module_probe

# The drop-in only bites at the next boot, so unload what is already live.
# Skipped under --check: nothing is really removed there, so a holder still
# holds, and modprobe's own dry run (-n) refuses with "Module is in use" —
# failing the check gate for the whole host on a first deploy.
- name: Unload the blacklisted kernel modules
  community.general.modprobe:
    name: "{{ item.item }}"
    state: absent
  loop: "{{ common_module_probe.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - item.stat.exists
    - not ansible_check_mode
  become: true

- name: Ensure the owner's supplementary groups exist
  ansible.builtin.group:
    name: "{{ item }}"
    system: true
  loop: "{{ common_user_groups }}"
  become: true

- name: Ensure the owner account exists
  ansible.builtin.user:
    name: "{{ common_user_name }}"
    uid: "{{ common_user_uid }}"
    group: "{{ common_user_group }}"
    groups: "{{ common_user_groups }}"
    append: true
    shell: "{{ common_user_shell }}"
    comment: "{{ common_user_comment }}"
    create_home: true
  become: true

- name: Install base packages
  community.general.zypper:
    name: "{{ common_packages }}"
    state: present
  become: true

# validate keeps a broken policy from ever reaching disk and locking out sudo.
- name: Grant the wheel group own-password sudo
  ansible.builtin.copy:
    dest: /etc/sudoers.d/wheel
    content: |
      ## wheel members may run any command, authenticating with their own
      ## password rather than root's (overriding the vendor-default targetpw).
      %wheel ALL=(ALL:ALL) ALL
      Defaults:%wheel !targetpw
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
  become: true

- name: Deploy the owner's dotfiles
  ansible.builtin.include_role:
    name: stow
  vars:
    stow_user: "{{ common_user_name }}"
    stow_user_home: "{{ common_user_home }}"
    stow_packages:
      - bash-suse
