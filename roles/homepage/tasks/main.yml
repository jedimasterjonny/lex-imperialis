---
# Holds only the managed settings.yaml, mounted read-only on top of the
# homepage-config volume; the container seeds the skeleton services/widgets/
# bookmarks into the volume for the operator to fill in (kept out of this
# public repo). Owned by root, not the container's PUID: the mode-0644 file is
# world-readable, so the container reads it over the :ro bind regardless of host
# owner (as sibling wordpress mounts its config-as-code).
- name: Create the config directory
  ansible.builtin.file:
    path: /etc/homepage
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Provision the settings
  ansible.builtin.template:
    src: settings.yaml.j2
    dest: /etc/homepage/settings.yaml
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart homepage

# A full public site block (not a sites/ wildcard snippet), imported as a
# top-level site and certified through the global acme_dns.
- name: Register the caddy public site block
  ansible.builtin.template:
    src: homepage.caddy.j2
    dest: /etc/caddy/sites-public/homepage.caddy
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart caddy for homepage

- name: Install the homepage container unit
  ansible.builtin.template:
    src: homepage.container.j2
    dest: /etc/containers/systemd/homepage.container
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart homepage

# Restart-on-change runs at flush; this generates the quadlet unit and asserts it
# is up even on a converge where nothing changed and no handler fired.
- name: Apply pending unit changes
  ansible.builtin.meta: flush_handlers

- name: Start homepage
  ansible.builtin.systemd_service:
    name: homepage
    state: started
  become: true
