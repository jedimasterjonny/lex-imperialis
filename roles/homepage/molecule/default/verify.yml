---
- name: Verify
  hosts: all
  gather_facts: false
  vars_files:
    - ../../defaults/main.yml
  tasks:
    # Reached through caddy with the apex Host header: homepage has no published
    # port, only the caddy network. A 200 also proves v1 host validation accepts
    # the proxy vhost.
    - name: Wait for homepage to answer through the proxy
      ansible.builtin.uri:
        url: http://127.0.0.1/
        headers:
          Host: "{{ homepage_domain }}"
        return_content: true
      register: homepage_page
      until: homepage_page.status == 200
      retries: 30
      delay: 2

    # The configured title reaches the rendered page, proving the managed
    # settings.yaml is mounted and read.
    - name: The provisioned title is served
      ansible.builtin.assert:
        that: homepage_title in homepage_page.content
        fail_msg: The configured title is not in the served page

    # A non-zero exit fails the task, proving the health endpoint answers and its
    # loopback Host is allowed.
    - name: The healthcheck passes
      ansible.builtin.command: podman healthcheck run homepage
      become: true
      changed_when: false
