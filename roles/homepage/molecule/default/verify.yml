---
- name: Verify
  hosts: all
  gather_facts: false
  vars_files:
    - ../../defaults/main.yml
  tasks:
    # Reached through caddy with the apex Host header: homepage has no published
    # port, only the caddy network. A 200 also proves v1 host validation accepts
    # the proxy vhost.
    - name: Wait for homepage to answer through the proxy
      ansible.builtin.uri:
        url: http://127.0.0.1/
        headers:
          Host: "{{ homepage_domain }}"
        return_content: true
      register: homepage_page
      until: homepage_page.status == 200
      retries: 30
      delay: 2

    # caddy stamps these on every response. molecule runs homepage_tls:false, so
    # HSTS is not asserted.
    - name: The security headers are set on the proxied response
      ansible.builtin.assert:
        that:
          - homepage_page.x_content_type_options | default('') == 'nosniff'
          - homepage_page.referrer_policy | default('') == 'strict-origin-when-cross-origin'
        fail_msg: "a security header is missing from the proxied response"
        quiet: true

    # The single-file settings.yaml mount is the config-as-code contract: Ansible
    # renders it and podman mounts it read-only on top of the seeded config volume.
    # The title is applied client-side, so it never reaches the served HTML — read
    # the file from inside the container instead. The distinctive title is present
    # only if the mount landed at /app/config/settings.yaml over the volume rather
    # than being shadowed by the container's own seeded skeleton.
    - name: Read the mounted settings from inside the container
      ansible.builtin.command: podman exec homepage cat /app/config/settings.yaml
      become: true
      register: homepage_settings
      changed_when: false

    - name: The provisioned settings.yaml is mounted over the config volume
      ansible.builtin.assert:
        that:
          - "'Adeptus Molecularum' in homepage_settings.stdout"
        fail_msg: the managed settings.yaml is not mounted at /app/config/settings.yaml
        quiet: true

    # A non-zero exit fails the task, proving the health endpoint answers and its
    # loopback Host is allowed.
    - name: The healthcheck passes
      ansible.builtin.command: podman healthcheck run homepage
      become: true
      changed_when: false

    # The healthcheck proves the cap set is sufficient; it can't prove it is
    # minimal. Assert the posture directly so a regression that re-widens the
    # caps or drops the restriction fails here, not silently in production.
    - name: Read the container's security posture
      ansible.builtin.command: podman inspect homepage
      register: homepage_posture
      changed_when: false
      become: true

    - name: The container keeps only its required capabilities and bars privilege escalation
      vars:
        container: "{{ homepage_posture.stdout | from_json | first }}"
      ansible.builtin.assert:
        that:
          - "container.EffectiveCaps | default([], true) | sort == ['CAP_CHOWN', 'CAP_SETGID', 'CAP_SETUID']"
          - "'no-new-privileges' in (container.HostConfig.SecurityOpt | default([], true))"
        fail_msg: "homepage's capability or no-new-privileges posture has regressed"
        quiet: true
