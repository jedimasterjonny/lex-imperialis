---
- name: Converge
  hosts: all
  vars:
    # No real domain or ACME in the container: serve the apex over plain HTTP.
    homepage_tls: false
    # A distinctive title so "the title is served" proves the mounted settings.yaml
    # is read: the default "Homepage" is also the app's built-in fallback, so it
    # matches even when the single-file mount is broken.
    homepage_title: Adeptus Molecularum
  tasks:
    - name: Apply the podman role
      ansible.builtin.include_role:
        name: podman

    # Homepage sits behind caddy on its network and registers a public site
    # block, so caddy must be up first to own the network and serve the proxy.
    - name: Apply the caddy role
      ansible.builtin.include_role:
        name: caddy

    - name: Apply the homepage role
      ansible.builtin.include_role:
        name: homepage
