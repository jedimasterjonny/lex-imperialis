---
# Where the compose project (compose.yaml + prometheus.yml) is written.
prometheus_project_dir: /opt/prometheus

# Host path bind-mounted as the TSDB data dir (/prometheus in the container).
prometheus_data_dir: /var/lib/prometheus

# node_exporter scrape targets, each "host:9100". Empty by default, so the node
# job carries no targets until a host sets them.
prometheus_node_targets: []

# cadvisor scrape targets, each "host:8080". Empty by default, so the cadvisor
# job carries no targets until a host sets them.
prometheus_cadvisor_targets: []

# Alertmanager targets alerts are routed to, each "host:9093". Empty by default,
# so no alerting block or rule files are configured until a host sets them.
prometheus_alertmanager_targets: []

# Blackbox probe targets, each a full URL the blackbox_exporter probes for a 2xx
# (following redirects). Empty by default, so the blackbox job carries no targets
# until a host sets them.
prometheus_probe_targets: []

# host:port of the blackbox_exporter the blackbox job scrapes. Must match the
# blackbox_exporter role's blackbox_exporter_listen_address — two independent
# defaults on the co-located roles, agreeing here at the exporter's loopback bind.
prometheus_blackbox_address: 127.0.0.1:9115

# Extra compose security_opt entries, appended to the no-new-privileges the
# template hardcodes (alongside cap_drop: ALL). Empty in production; the molecule
# scenario sets apparmor=unconfined because its nested CI container cannot load an
# AppArmor profile.
prometheus_security_opt_extra: []
