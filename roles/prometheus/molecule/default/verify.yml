---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Wait for prometheus to be ready
      ansible.builtin.uri:
        url: http://127.0.0.1:9090/-/ready
        status_code: 200
      register: prometheus_ready
      until: prometheus_ready.status == 200
      retries: 30
      delay: 2

    # Poll, not a one-shot read: verify runs right after side_effect recreates the
    # container, and /-/ready goes green before the scrape pools register their
    # targets.
    - name: Wait for the node and cadvisor scrape jobs to register
      ansible.builtin.uri:
        url: http://127.0.0.1:9090/api/v1/targets
        return_content: true
      register: prometheus_targets
      until:
        - >-
          prometheus_targets.json.data.activeTargets
          | selectattr('labels.job', 'eq', 'node') | list | length > 0
        - >-
          prometheus_targets.json.data.activeTargets
          | selectattr('labels.job', 'eq', 'cadvisor') | list | length > 0
      retries: 30
      delay: 2

    # Polled like the scrape jobs: the static alertmanager target is discovered
    # shortly after /-/ready, even though nothing is listening on 9093.
    - name: Wait for the alertmanager to register
      ansible.builtin.uri:
        url: http://127.0.0.1:9090/api/v1/alertmanagers
        return_content: true
      register: prometheus_alertmanagers
      until:
        - >-
          prometheus_alertmanagers.json.data.activeAlertmanagers
          | selectattr('url', 'search', 'localhost:9093') | list | length > 0
      retries: 30
      delay: 2

    - name: Read the loaded alert rules
      ansible.builtin.uri:
        url: http://127.0.0.1:9090/api/v1/rules
        return_content: true
      register: prometheus_loaded_rules

    # The rule_files glob and its mounted rule both have to take effect for these
    # rules to appear.
    - name: The shipped alert rules are loaded
      ansible.builtin.assert:
        that:
          - >-
            prometheus_loaded_rules.json.data.groups
            | map(attribute='rules') | flatten
            | selectattr('name', 'in', ['InstanceDown', 'PodmanBackupFailed', 'PodmanBackupOverdue',
                                        'WordpressDbDumpFailed', 'WordpressDbDumpOverdue',
                                        'FilesystemSpaceLow', 'ServiceRestartStorm'])
            | list | length == 7
        fail_msg: not all shipped alert rules are loaded

    - name: Read the loaded runtime config
      ansible.builtin.uri:
        url: http://127.0.0.1:9090/api/v1/status/config
        return_content: true
      register: prometheus_loaded_config

    # side_effect added this target; finding it in the LOADED config proves the
    # recreate applied the change — a stale single-file mount + reload would not.
    - name: The side-effect config change reached the running container
      ansible.builtin.assert:
        that:
          - "'sentinel-regression:9100' in prometheus_loaded_config.json.data.yaml"
        fail_msg: >-
          The running prometheus did not pick up the config change — the container
          was not recreated (stale single-file bind mount).
