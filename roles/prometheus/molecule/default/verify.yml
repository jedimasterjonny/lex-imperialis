---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Wait for prometheus to be ready
      ansible.builtin.uri:
        url: http://127.0.0.1:9090/-/ready
        status_code: 200
      register: prometheus_ready
      until: prometheus_ready.status == 200
      retries: 30
      delay: 2

    # Poll, not a one-shot read: verify runs right after side_effect recreates the
    # container, and /-/ready goes green before the scrape pools register their
    # targets.
    - name: Wait for the node, cadvisor, blackbox and alertmanager scrape jobs to register
      ansible.builtin.uri:
        url: http://127.0.0.1:9090/api/v1/targets
        return_content: true
      register: prometheus_targets
      until:
        - >-
          prometheus_targets.json.data.activeTargets
          | selectattr('labels.job', 'eq', 'node') | list | length > 0
        - >-
          prometheus_targets.json.data.activeTargets
          | selectattr('labels.job', 'eq', 'cadvisor') | list | length > 0
        - >-
          prometheus_targets.json.data.activeTargets
          | selectattr('labels.job', 'eq', 'blackbox') | list | length > 0
        - >-
          prometheus_targets.json.data.activeTargets
          | selectattr('labels.job', 'eq', 'alertmanager') | list | length > 0
      retries: 30
      delay: 2

    # The group's module has to survive as __param_module into the URL Prometheus
    # actually scrapes, or a target silently falls back to the exporter's default
    # module. scrapeUrl is that constructed URL. Anchor the match on the parameter
    # boundary: a bare 'module=http_2xx' is also satisfied by 'module=http_2xx_or_401'.
    - name: The blackbox target is scraped with its group's prober module
      ansible.builtin.assert:
        that:
          - blackbox_scrape_urls | select('search', 'module=http_2xx(&|$)') | list | length > 0
        fail_msg: >-
          the blackbox target's scrapeUrl did not carry its group's module=, so
          __param_module is not reaching the scrape URL
      vars:
        blackbox_scrape_urls: >-
          {{ prometheus_targets.json.data.activeTargets
             | selectattr('labels.job', 'eq', 'blackbox')
             | map(attribute='scrapeUrl') | list }}

    # Polled like the scrape jobs: the static alertmanager target is discovered
    # shortly after /-/ready, even though nothing is listening on 9093.
    - name: Wait for the alertmanager to register
      ansible.builtin.uri:
        url: http://127.0.0.1:9090/api/v1/alertmanagers
        return_content: true
      register: prometheus_alertmanagers
      until:
        - >-
          prometheus_alertmanagers.json.data.activeAlertmanagers
          | selectattr('url', 'search', 'localhost:9093') | list | length > 0
      retries: 30
      delay: 2

    - name: Read the loaded alert rules
      ansible.builtin.uri:
        url: http://127.0.0.1:9090/api/v1/rules
        return_content: true
      register: prometheus_loaded_rules

    # The rule_files glob and its mounted rule both have to take effect for these
    # rules to appear.
    - name: The shipped alert rules are loaded
      ansible.builtin.assert:
        that:
          - >-
            prometheus_loaded_rules.json.data.groups
            | map(attribute='rules') | flatten
            | selectattr('name', 'in', ['InstanceDown', 'BlackboxExporterDown', 'ProbeDown',
                                        'ProbeSSLCertExpiringSoon',
                                        'PodmanBackupFailed', 'PodmanBackupOverdue',
                                        'WordpressDbDumpFailed', 'WordpressDbDumpOverdue',
                                        'FilesystemSpaceLow', 'ServiceRestartStorm',
                                        'WireguardTunnelDown',
                                        'AutoupdateFailed', 'AutoupdateOverdue',
                                        'WordpressUpdateAvailable', 'WordpressUpdateCheckFailed',
                                        'WordpressUpdateCheckOverdue', 'WordpressCronFailed',
                                        'WordpressCronOverdue', 'GitopsReconcileFailed',
                                        'GitopsReconcileStale', 'BeetsPipelineLidarrRejected',
                                        'BeetsPipelineQuarantineBacklog', 'Watchdog'])
            | list | length == 23
          - >-
            prometheus_loaded_rules.json.data.groups
            | map(attribute='rules') | flatten | list | length == 23
        fail_msg: the loaded alert rules don't match those shipped in alerts.yml

    - name: Read the loaded runtime config
      ansible.builtin.uri:
        url: http://127.0.0.1:9090/api/v1/status/config
        return_content: true
      register: prometheus_loaded_config

    # side_effect added this target; finding it in the LOADED config proves the
    # recreate applied the change — a stale single-file mount + reload would not.
    - name: The side-effect config change reached the running container
      ansible.builtin.assert:
        that:
          - "'sentinel-regression:9100' in prometheus_loaded_config.json.data.yaml"
        fail_msg: >-
          The running prometheus did not pick up the config change — the container
          was not recreated (stale single-file bind mount).

    # The checks above prove prometheus works; they can't prove its capability set
    # is minimal. Assert the posture directly so a regression that widens the caps
    # or drops the restriction fails here, not silently in production.
    - name: Read prometheus's security posture
      ansible.builtin.command: docker inspect prometheus
      register: prometheus_inspect
      changed_when: false

    # docker inspect exposes the request (HostConfig), not podman's EffectiveCaps/
    # BoundingCaps: CapDrop == [ALL] with an empty CapAdd is the docker equivalent
    # of "no capabilities" (either half missing widens them). Match no-new-privileges
    # as a substring — docker's rendering of the :true suffix is not guaranteed
    # (podman drops it, docker may not).
    - name: Prometheus keeps no capabilities and bars privilege escalation
      vars:
        prometheus: "{{ prometheus_inspect.stdout | from_json | first }}"
      ansible.builtin.assert:
        that:
          - "prometheus.HostConfig.CapDrop | default([], true) | sort == ['ALL']"
          - "prometheus.HostConfig.CapAdd | default([], true) == []"
          - >-
            prometheus.HostConfig.SecurityOpt | default([], true)
            | select('search', 'no-new-privileges') | list | length > 0
        fail_msg: "prometheus's capability or no-new-privileges posture has regressed"
        quiet: true
