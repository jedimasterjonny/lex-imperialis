# Managed by Ansible (prometheus role).
groups:
  - name: availability
    rules:
      # Excludes the blackbox job: its targets are probe URLs that all scrape the
      # one co-located exporter, so up==0 there means the exporter is unreachable,
      # not that the targets are down. BlackboxExporterDown catches that once, and
      # ProbeDown catches an actually-failing target.
      - alert: InstanceDown
        expr: up{job != "blackbox"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} ({{ $labels.job }}) is down"
          description: "{{ $labels.instance }} has been unreachable for over 5 minutes."

  - name: probes
    rules:
      # The probe targets all scrape the one co-located exporter, so up==0 across
      # them means the exporter is unreachable, not the targets. Aggregate to a
      # single alert (InstanceDown skips this job). A dead exporter blinds all
      # probing — not just the public sites, but the fleet's containerised services,
      # whose only liveness alert this is — so it is critical.
      - alert: BlackboxExporterDown
        expr: max(up{job="blackbox"}) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "the blackbox exporter is unreachable — all probing is blind"
          description: "Prometheus cannot scrape the blackbox exporter, so nothing is being probed — not the public sites, not the containerised services."
      # Blackbox probe of a target: probe_success == 0 means it did not answer with a
      # status its prober module accepts — down, DNS broken, or TLS failed. Not just
      # a 2xx: a module may accept others (an auth-walled target answers 401), so key
      # off probe_success, which is the module's own verdict. 5m rides out a transient
      # blip or a deploy.
      - alert: ProbeDown
        expr: probe_success == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "probe of {{ $labels.instance }} is failing"
          description: "The blackbox probe of {{ $labels.instance }} has not answered with an accepted status for over 5 minutes."
      # Every cert here auto-renews well before expiry — the edge ones (Cloudflare,
      # Firebase) and caddy's own DNS-01 wildcard, now that the internal services are
      # probed too. 14 days left means a renewal has silently stalled, with time to
      # intervene by hand. Guarded on the expiry being > 0: blackbox exports 0 both
      # for a failed probe and for a successful non-TLS one (plex is probed over
      # plain HTTP), and 0 - time() is hugely negative — it would satisfy the
      # threshold and fire spuriously. Only warn when a real cert was measured.
      - alert: ProbeSSLCertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 14 * 86400 and probe_ssl_earliest_cert_expiry > 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "TLS certificate for {{ $labels.instance }} expiring soon"
          description: "The TLS certificate served by {{ $labels.instance }} expires in under 14 days — auto-renewal may have stalled."

  - name: backups
    rules:
      - alert: PodmanBackupFailed
        expr: podman_backup_success == 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "podman backup failed on {{ $labels.instance }}"
          description: "The last podman volume backup run on {{ $labels.instance }} failed."
      # The weekly timer caps a healthy run at ~7 days old; 8 gives a day's grace
      # before flagging a run that never fired (the metric stops advancing).
      - alert: PodmanBackupOverdue
        expr: time() - podman_backup_last_run_timestamp_seconds > 8 * 86400
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "podman backup overdue on {{ $labels.instance }}"
          description: "{{ $labels.instance }} has not run a podman volume backup in over 8 days."

      - alert: WordpressDbDumpFailed
        expr: wordpress_db_dump_success == 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "WordPress database dump failed on {{ $labels.instance }}"
          description: "The last WordPress database dump on {{ $labels.instance }} failed — the DR fallback for a broken in-place upgrade is now stale."
      # The daily timer caps a healthy dump at ~1 day old; 2 gives a day's grace
      # before flagging a dump that stopped advancing.
      - alert: WordpressDbDumpOverdue
        expr: time() - wordpress_db_dump_last_run_timestamp_seconds > 2 * 86400
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "WordPress database dump overdue on {{ $labels.instance }}"
          description: "{{ $labels.instance }} has not produced a WordPress database dump in over 2 days."

  - name: filesystem
    rules:
      - alert: FilesystemSpaceLow
        expr: node_filesystem_avail_bytes{fstype!~"tmpfs|squashfs|overlay|ramfs"} / node_filesystem_size_bytes * 100 < 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "low disk space on {{ $labels.instance }}:{{ $labels.mountpoint }}"
          description: "{{ $labels.mountpoint }} on {{ $labels.instance }} has under 10% free."

  - name: services
    rules:
      # node_exporter's systemd collector exposes a true per-unit restart counter,
      # robust to the cgroup-id churn that defeats a cadvisor start-time proxy.
      # The counter zeroes on boot and dependency-ordered units restart a few times
      # during startup; gate on uptime past the 15m window so that churn stays out of
      # the increase.
      - alert: ServiceRestartStorm
        expr: increase(node_systemd_service_restart_total[15m]) > 3 and on(instance) time() - node_boot_time_seconds > 15 * 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.name }} is restarting repeatedly on {{ $labels.instance }}"
          description: "{{ $labels.name }} on {{ $labels.instance }} auto-restarted more than 3 times in 15 minutes."

  - name: maintenance
    rules:
      - alert: AutoupdateFailed
        expr: autoupdate_success == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "unattended update failed on {{ $labels.instance }}"
          description: "The last unattended zypper update on {{ $labels.instance }} failed — the host may be unpatched or did not reboot."
      # The weekly timer has no Persistent=, so a healthy run lands near 7 days
      # apart; 9 gives grace over the cadence and jitter before flagging a stalled
      # updater or a cycle the host slept through.
      - alert: AutoupdateOverdue
        expr: time() - autoupdate_last_run_timestamp_seconds > 9 * 86400
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "unattended update overdue on {{ $labels.instance }}"
          description: "{{ $labels.instance }} has not completed an unattended update in over 9 days."

      # WordPress auto-applies minor core releases (and any plugins or themes the
      # operator opted into) on its own twice-daily cadence; the 24h for: plus the
      # six-hourly check keeps the gauge fresh enough that those clear first, so
      # only updates actually awaiting a hand — majors, and anything not opted into
      # auto-update — ever alert.
      - alert: WordpressUpdateAvailable
        expr: wordpress_updates_available > 0
        for: 24h
        labels:
          severity: warning
        annotations:
          summary: "WordPress {{ $labels.type }} update available on {{ $labels.instance }}"
          description: "{{ $value }} {{ $labels.type }} update(s) are pending on {{ $labels.instance }} — apply via wp-cli or wp-admin."

      # The six-hourly metric holds success=0 constant until the next run, so a
      # single transient wp-cli or wordpress.org blip would satisfy a short for:;
      # 12h (over two checks) fires only on a sustained failure, not a self-healing
      # one-off.
      - alert: WordpressUpdateCheckFailed
        expr: wordpress_update_check_success == 0
        for: 12h
        labels:
          severity: warning
        annotations:
          summary: "WordPress update check failed on {{ $labels.instance }}"
          description: "The last WordPress update check on {{ $labels.instance }} errored — pending core, plugin, theme, or translation updates may be missed."
      # The six-hourly timer caps a healthy check at ~6h old; over a day (four
      # missed runs) gives ample grace before flagging a stalled checker whose
      # metric has stopped advancing.
      - alert: WordpressUpdateCheckOverdue
        expr: time() - wordpress_update_check_last_run_timestamp_seconds > 1 * 86400
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "WordPress update check overdue on {{ $labels.instance }}"
          description: "{{ $labels.instance }} has not completed a WordPress update check in over a day."

      # wp-cron overwrites the metric every 5 minutes, so a one-off failure clears
      # on the next run; 15m (three cycles) fires only on a sustained failure — the
      # run reached wp-cli but errored (the database unreachable), since an
      # individual scheduled hook failing still exits the run 0. A wholly down stack
      # never runs the job (Requires=/After=wordpress.service), freezing the metric
      # for WordpressCronOverdue to catch instead.
      - alert: WordpressCronFailed
        expr: wordpress_cron_success == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "WordPress cron failed on {{ $labels.instance }}"
          description: "The last WordPress cron run on {{ $labels.instance }} errored — the database is unreachable or wp-cli otherwise failed."
      # The 5-minute timer caps a healthy run at minutes old; an hour (twelve
      # missed fires) gives ample grace before flagging a timer that has stopped —
      # a stopped timer silently stalls every scheduled post and task, and its
      # still-firing-but-failing counterpart is caught by WordpressCronFailed.
      - alert: WordpressCronOverdue
        expr: time() - wordpress_cron_last_run_timestamp_seconds > 1 * 3600
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "WordPress cron overdue on {{ $labels.instance }}"
          description: "{{ $labels.instance }} has not run WordPress cron in over an hour — scheduled posts and tasks have stalled."

  - name: gitops
    rules:
      - alert: GitopsReconcileFailed
        expr: gitops_reconcile_success == 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "fleet reconcile failed on {{ $labels.instance }}"
          description: "The last unattended fleet reconcile on {{ $labels.instance }} failed — main is no longer reaching the fleet."
      # The 15-minute timer caps a healthy run at well under an hour old; 2 hours
      # gives ample grace over a reboot or brief outage before flagging a timer
      # that has stopped firing (a hard-stopped reconciler).
      - alert: GitopsReconcileStale
        expr: time() - gitops_reconcile_last_run_timestamp_seconds > 2 * 3600
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "fleet reconcile stale on {{ $labels.instance }}"
          description: "{{ $labels.instance }} has not completed a fleet reconcile in over 2 hours."

  - name: music
    rules:
      # lidarr-rejected only fills after the ~1h poke cap of a matched album lidarr
      # will not take (unmonitored artist, quality-profile mismatch), so the
      # rejection is already definitive when it appears — alert on the *Failed 15m
      # cadence, not a longer grace. The original download still seeds.
      - alert: BeetsPipelineLidarrRejected
        expr: beets_pipeline_lidarr_rejected_albums > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "beets pipeline imports rejected by lidarr on {{ $labels.instance }}"
          description: "Albums on {{ $labels.instance }} matched but lidarr refused them; they sit in quarantine/lidarr-rejected and need a look."
      # No-match albums are normal (new releases, patchy AcoustID) and cleared by
      # hand; a large standing pile signals a mass-quarantine event or an unworked
      # backlog. Threshold tuned to the operator's processing cadence.
      - alert: BeetsPipelineQuarantineBacklog
        expr: beets_pipeline_quarantine_albums > 10
        for: 6h
        labels:
          severity: warning
        annotations:
          summary: "beets pipeline quarantine backlog on {{ $labels.instance }}"
          description: "Unmatched albums on {{ $labels.instance }} have been awaiting hand-processing for over 6 hours."

  - name: watchdog
    rules:
      # Always-firing heartbeat: its arrival at the deadman receiver proves the
      # whole alerting path (Prometheus -> Alertmanager -> heartbeat) is live, so
      # its ABSENCE is the signal — a missed beat means the pipeline is broken,
      # not that anything here is wrong. No for:, so it fires on the first
      # evaluation; severity none, as a firing Watchdog is never itself a problem.
      - alert: Watchdog
        expr: vector(1)
        labels:
          severity: none
        annotations:
          summary: "alerting pipeline heartbeat"
          description: "This alert always fires; if it stops reaching the deadman receiver, the Prometheus -> Alertmanager -> heartbeat pipeline is broken."
