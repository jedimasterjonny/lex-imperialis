# Managed by Ansible (prometheus role).
groups:
  - name: availability
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} ({{ $labels.job }}) is down"
          description: "{{ $labels.instance }} has been unreachable for over 5 minutes."

  - name: backups
    rules:
      - alert: PodmanBackupFailed
        expr: podman_backup_success == 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "podman backup failed on {{ $labels.instance }}"
          description: "The last podman volume backup run on {{ $labels.instance }} failed."
      # The weekly timer caps a healthy run at ~7 days old; 8 gives a day's grace
      # before flagging a run that never fired (the metric stops advancing).
      - alert: PodmanBackupOverdue
        expr: time() - podman_backup_last_run_timestamp_seconds > 8 * 86400
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "podman backup overdue on {{ $labels.instance }}"
          description: "{{ $labels.instance }} has not run a podman volume backup in over 8 days."

      - alert: WordpressDbDumpFailed
        expr: wordpress_db_dump_success == 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "WordPress database dump failed on {{ $labels.instance }}"
          description: "The last WordPress database dump on {{ $labels.instance }} failed — the DR fallback for a broken in-place upgrade is now stale."
      # The daily timer caps a healthy dump at ~1 day old; 2 gives a day's grace
      # before flagging a dump that stopped advancing.
      - alert: WordpressDbDumpOverdue
        expr: time() - wordpress_db_dump_last_run_timestamp_seconds > 2 * 86400
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "WordPress database dump overdue on {{ $labels.instance }}"
          description: "{{ $labels.instance }} has not produced a WordPress database dump in over 2 days."

  - name: filesystem
    rules:
      - alert: FilesystemSpaceLow
        expr: node_filesystem_avail_bytes{fstype!~"tmpfs|squashfs|overlay|ramfs"} / node_filesystem_size_bytes * 100 < 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "low disk space on {{ $labels.instance }}:{{ $labels.mountpoint }}"
          description: "{{ $labels.mountpoint }} on {{ $labels.instance }} has under 10% free."

  - name: services
    rules:
      # node_exporter's systemd collector exposes a true per-unit restart counter,
      # robust to the cgroup-id churn that defeats a cadvisor start-time proxy.
      - alert: ServiceRestartStorm
        expr: increase(node_systemd_service_restart_total[15m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.name }} is restarting repeatedly on {{ $labels.instance }}"
          description: "{{ $labels.name }} on {{ $labels.instance }} auto-restarted more than 3 times in 15 minutes."
