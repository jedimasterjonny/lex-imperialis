---
- name: Create the project directory
  ansible.builtin.file:
    path: "{{ prometheus_project_dir }}"
    state: directory
    mode: "0755"

- name: Create the data directory
  ansible.builtin.file:
    path: "{{ prometheus_data_dir }}"
    state: directory
    # World-writable: the container runs as nobody (65534), and there is no sudo
    # on the NAS to chown the bind mount to it.
    mode: "0777"

- name: Deploy the prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_project_dir }}/prometheus.yml"
    mode: "0644"
  notify: Reload prometheus

- name: Deploy the compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ prometheus_project_dir }}/compose.yaml"
    mode: "0644"

# No become: on the NAS sudo needs a password, so the deploy runs as the
# docker-group user. PATH carries /usr/local/bin, where the DSM docker CLI lives
# off the non-interactive PATH; harmless on a host where docker is already found.
- name: Bring the prometheus stack up
  community.docker.docker_compose_v2:
    project_src: "{{ prometheus_project_dir }}"
    state: present
  environment:
    PATH: "/usr/local/bin:{{ ansible_facts.env.PATH }}"
