---
- name: Create the config directory
  ansible.builtin.file:
    path: /etc/wordpress
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

# Both quadlets read the database credentials via EnvironmentFile=, so the
# passwords never land in the world-readable unit files.
- name: Deploy the database credentials
  ansible.builtin.template:
    src: wordpress.env.j2
    dest: /etc/wordpress/wordpress.env
    owner: root
    group: root
    mode: "0600"
  become: true
  no_log: true
  notify:
    - Restart the database
    - Restart wordpress

- name: Install the database container unit
  ansible.builtin.template:
    src: mariadb.container.j2
    dest: /etc/containers/systemd/wordpress-db.container
    owner: root
    group: root
    mode: "0644"
  become: true
  notify:
    - Reload systemd
    - Restart the database

- name: Install the cache container unit
  ansible.builtin.template:
    src: redis.container.j2
    dest: /etc/containers/systemd/wordpress-redis.container
    owner: root
    group: root
    mode: "0644"
  become: true
  notify:
    - Reload systemd
    - Restart the cache

- name: Install the wordpress container unit
  ansible.builtin.template:
    src: wordpress.container.j2
    dest: /etc/containers/systemd/wordpress.container
    owner: root
    group: root
    mode: "0644"
  become: true
  notify:
    - Reload systemd
    - Restart wordpress

# WordPress is public — it serves its own domains, not a wildcard subdomain —
# so it registers a full site block in /etc/caddy/sites-public, which the caddy
# role imports at the top level.
- name: Register wordpress with the reverse proxy
  ansible.builtin.template:
    src: wordpress.caddy.j2
    dest: /etc/caddy/sites-public/wordpress.caddy
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart caddy

# Wrapper over the official cli image, so `wp <command>` manages the live site.
- name: Install the wp-cli wrapper
  ansible.builtin.template:
    src: wp.j2
    dest: /usr/local/bin/wp
    owner: root
    group: root
    mode: "0755"
  become: true

# Quadlet units only exist after the daemon reload, so apply pending restarts
# before asserting the services are up.
- name: Apply pending unit changes
  ansible.builtin.meta: flush_handlers

- name: Start the containers
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
  loop:
    - wordpress-redis
    - wordpress-db
    - wordpress
  become: true
