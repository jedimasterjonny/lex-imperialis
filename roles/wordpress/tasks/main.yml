---
- name: Create the config directory
  ansible.builtin.file:
    path: /etc/wordpress
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Create the must-use plugin directory
  ansible.builtin.file:
    path: /etc/wordpress/mu-plugins
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

# Mounted read-only into the container's mu-plugins; a restart recreates the
# container, so an edited plugin is picked up off the fresh bind mount.
- name: Deploy the hardening must-use plugin
  ansible.builtin.copy:
    src: wordpress-hardening.php
    dest: /etc/wordpress/mu-plugins/wordpress-hardening.php
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart wordpress

# Both quadlets read the database credentials via EnvironmentFile=, so the
# passwords never land in the world-readable unit files.
- name: Deploy the database credentials
  ansible.builtin.template:
    src: wordpress.env.j2
    dest: /etc/wordpress/wordpress.env
    owner: root
    group: root
    mode: "0600"
  become: true
  no_log: true
  notify:
    - Restart the database
    - Restart wordpress

- name: Install the database container unit
  ansible.builtin.template:
    src: mariadb.container.j2
    dest: /etc/containers/systemd/wordpress-db.container
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart the database

- name: Install the cache container unit
  ansible.builtin.template:
    src: redis.container.j2
    dest: /etc/containers/systemd/wordpress-redis.container
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart the cache

- name: Install the wordpress container unit
  ansible.builtin.template:
    src: wordpress.container.j2
    dest: /etc/containers/systemd/wordpress.container
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart wordpress

# WordPress is public — it serves its own domains, not a wildcard subdomain —
# so it registers a full site block in /etc/caddy/sites-public, which the caddy
# role imports at the top level.
- name: Register wordpress with the reverse proxy
  ansible.builtin.template:
    src: wordpress.caddy.j2
    dest: /etc/caddy/sites-public/wordpress.caddy
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart caddy for wordpress

# Wrapper over the official cli image, so `wp <command>` manages the live site.
- name: Install the wp-cli wrapper
  ansible.builtin.template:
    src: wp.j2
    dest: /usr/local/bin/wp
    owner: root
    group: root
    mode: "0755"
  become: true

# A portable logical dump of the database, recoverable after a failed in-place
# MARIADB_AUTO_UPGRADE — restic otherwise only sweeps the cold raw datadir, which
# a newer engine may refuse to mount. Runs via the db-dump timer below.
- name: Install the database backup wrapper
  ansible.builtin.template:
    src: wp-db-dump.j2
    dest: /usr/local/bin/wp-db-dump
    owner: root
    group: root
    mode: "0755"
  become: true

# Static units for the role's two timers: wp-cron takes scheduled tasks off
# visitor page-loads (DISABLE_WP_CRON in the env), and the daily db-dump writes a
# logical backup podman_backup's restic sweep then captures alongside the datadir.
- name: Install the wp-cron and database-backup units
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - wordpress-cron.service
    - wordpress-cron.timer
    - wordpress-db-dump.service
    - wordpress-db-dump.timer
  become: true

# Quadlet units only exist after the daemon reload, so apply pending restarts
# before asserting the services are up.
- name: Apply pending unit changes
  ansible.builtin.meta: flush_handlers

- name: Start the containers
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
  loop:
    - wordpress-redis
    - wordpress-db
    - wordpress
  become: true

# daemon_reload picks up the new units before enabling; it does not report
# changed, so the task stays idempotent.
- name: Enable the wp-cron timer
  ansible.builtin.systemd_service:
    name: wordpress-cron.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true

# The reload above registered this unit too, so enabling it needs no second one.
- name: Enable the database-backup timer
  ansible.builtin.systemd_service:
    name: wordpress-db-dump.timer
    enabled: true
    state: started
  become: true
