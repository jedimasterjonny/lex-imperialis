---
- name: Verify
  hosts: all
  gather_facts: false
  vars_files:
    - ../../defaults/main.yml
  tasks:
    - name: Wait for wordpress to answer through the proxy
      ansible.builtin.uri:
        url: http://127.0.0.1/
        headers:
          Host: "{{ wordpress_domains[0] }}"
        follow_redirects: none
        status_code: [200, 301, 302]
      register: wordpress_proxied
      until: wordpress_proxied.status in [200, 301, 302]
      retries: 60
      delay: 5

    # caddy emits these headers on every response, so they ride the install
    # redirect too. molecule runs wordpress_tls:false, so HSTS is not asserted.
    - name: The security headers are set on the proxied response
      ansible.builtin.assert:
        that:
          - wordpress_proxied.x_content_type_options | default('') == 'nosniff'
          - wordpress_proxied.referrer_policy | default('') == 'strict-origin-when-cross-origin'
          - "'camera=()' in (wordpress_proxied.permissions_policy | default(''))"
        fail_msg: "a security header is missing from the proxied response"
        quiet: true

    # The upstream PHP tacks on its version; caddy strips it before the edge.
    - name: The PHP version banner is stripped
      ansible.builtin.assert:
        that:
          - wordpress_proxied.x_powered_by is not defined
        fail_msg: "X-Powered-By leaked through the proxy"
        quiet: true

    # readme.html and license.txt exist in core but caddy 404s them, so a
    # scanner can't read the exact version off them.
    - name: The version-disclosure files are blocked
      ansible.builtin.uri:
        url: "http://127.0.0.1{{ item }}"
        headers:
          Host: "{{ wordpress_domains[0] }}"
        status_code: [404]
      loop:
        - /readme.html
        - /license.txt

    # blank.gif is core's healthcheck target, so it is present; caddy stamps the
    # one-year immutable cache header on it as a static asset.
    - name: A static asset answers for the cache-header check
      ansible.builtin.uri:
        url: http://127.0.0.1/wp-includes/images/blank.gif
        headers:
          Host: "{{ wordpress_domains[0] }}"
        follow_redirects: none
      register: wordpress_static
      until: wordpress_static.status == 200
      retries: 30
      delay: 5

    - name: Static assets carry the one-year immutable cache header
      ansible.builtin.assert:
        that:
          - "'immutable' in (wordpress_static.cache_control | default(''))"
          - "'31536000' in (wordpress_static.cache_control | default(''))"
        fail_msg: "static assets are not cached for a year"
        quiet: true

    # The install page rendering proves the whole chain: caddy proxies the
    # request, wordpress serves PHP (so wordpress_config_extra is valid), and it
    # reached the database — a failed connection answers 500, not the form.
    - name: The install page renders through the database
      ansible.builtin.uri:
        url: http://127.0.0.1/wp-admin/install.php
        headers:
          Host: "{{ wordpress_domains[0] }}"
        return_content: true
      register: wordpress_install
      until: "'WordPress' in wordpress_install.content"
      retries: 30
      delay: 5

    # daemon_reload is a no-op that just makes the module gather and return each
    # unit's systemctl-show properties to assert against; it reads, not mutates.
    - name: Read the container units' state
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        daemon_reload: true
      loop:
        - wordpress-redis
        - wordpress-db
        - wordpress
      register: wordpress_units
      become: true

    - name: The containers are running
      ansible.builtin.assert:
        that:
          - item.status.ActiveState == 'active'
        fail_msg: "{{ item.item }} is not running"
        quiet: true
      loop: "{{ wordpress_units.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: The cache answers
      ansible.builtin.command: podman exec wordpress-redis redis-cli ping
      become: true
      register: wordpress_redis_ping
      changed_when: false
      failed_when: wordpress_redis_ping.stdout != 'PONG'

    - name: Read the WordPress extra config
      ansible.builtin.command: podman exec wordpress printenv WORDPRESS_CONFIG_EXTRA
      become: true
      register: wordpress_extra_config
      changed_when: false

    # wp-config.php eval's WORDPRESS_CONFIG_EXTRA at runtime, so the constants it
    # carries point the operator-enabled plugin at the cache with no manual step.
    - name: The redis host is wired into the config
      ansible.builtin.assert:
        that:
          - "'WP_REDIS_HOST' in wordpress_extra_config.stdout"
          - "'wordpress-redis' in wordpress_extra_config.stdout"
        fail_msg: "the redis host is not wired into WORDPRESS_CONFIG_EXTRA"
        quiet: true

    - name: WP-cron is disabled in the generated config
      ansible.builtin.assert:
        that:
          - "'DISABLE_WP_CRON' in wordpress_extra_config.stdout"
        fail_msg: "DISABLE_WP_CRON is not wired into WORDPRESS_CONFIG_EXTRA"
        quiet: true

    # The command fails on a non-zero rc, so a working run proves the wrapper
    # mounts the volume and the cli image reads the core version from it.
    - name: Run wp-cli through the wrapper
      ansible.builtin.command: /usr/local/bin/wp core version
      become: true
      register: wordpress_wp_cli
      changed_when: false

    - name: The wp-cli wrapper reports the core version
      ansible.builtin.assert:
        that:
          - wordpress_wp_cli.stdout | length > 0
        fail_msg: "wp-cli returned no WordPress version"
        quiet: true

    # daemon_reload only makes the module gather the unit's state (as the
    # container-state read above), so the assert can read ActiveState.
    - name: The wp-cron timer is active
      ansible.builtin.systemd_service:
        name: wordpress-cron.timer
        daemon_reload: true
      register: wordpress_cron_timer
      become: true
      failed_when: wordpress_cron_timer.status.ActiveState != 'active'

    # podman healthcheck run executes each container's HealthCmd; rc 0 = healthy.
    - name: Each container passes its healthcheck
      ansible.builtin.command: "podman healthcheck run {{ item }}"
      loop:
        - wordpress-redis
        - wordpress-db
        - wordpress
      register: wordpress_health
      until: wordpress_health.rc == 0
      retries: 12
      delay: 10
      changed_when: false
      become: true

    # The checks above prove each add-back set is sufficient; they can't prove it
    # is minimal. Assert the posture directly so a regression that re-widens the
    # caps or drops the restriction fails here, not silently in production.
    - name: Read each container's security posture
      ansible.builtin.command: "podman inspect {{ item.name }}"
      loop:
        - {name: wordpress-redis, caps: []}
        - {name: wordpress-db, caps: [CAP_CHOWN, CAP_DAC_OVERRIDE, CAP_SETGID, CAP_SETUID]}
        - {name: wordpress, caps: [CAP_CHOWN, CAP_DAC_OVERRIDE, CAP_FOWNER, CAP_NET_BIND_SERVICE, CAP_SETGID, CAP_SETUID]}
      register: wordpress_posture
      changed_when: false
      become: true
      loop_control:
        label: "{{ item.name }}"

    - name: Each container keeps only its required capabilities and bars privilege escalation
      vars:
        container: "{{ item.stdout | from_json | first }}"
      ansible.builtin.assert:
        that:
          - "container.EffectiveCaps | default([], true) | sort == item.item.caps | sort"
          - "'no-new-privileges' in (container.HostConfig.SecurityOpt | default([], true))"
        fail_msg: "{{ item.item.name }}'s capability or no-new-privileges posture has regressed"
        quiet: true
      loop: "{{ wordpress_posture.results }}"
      loop_control:
        label: "{{ item.item.name }}"
