---
- name: Verify
  hosts: all
  gather_facts: false
  vars_files:
    - ../../defaults/main.yml
    - ../../vars/main.yml
  tasks:
    - name: Wait for wordpress to answer through the proxy
      ansible.builtin.uri:
        url: http://127.0.0.1/
        headers:
          Host: "{{ wordpress_domains[0] }}"
        follow_redirects: none
        status_code: [200, 301, 302]
      register: wordpress_proxied
      until: wordpress_proxied.status in [200, 301, 302]
      retries: 60
      delay: 5

    # caddy emits these headers on every response, so they ride the install
    # redirect too. molecule runs wordpress_tls:false, so HSTS is not asserted.
    - name: The security headers are set on the proxied response
      ansible.builtin.assert:
        that:
          - wordpress_proxied.x_content_type_options | default('') == 'nosniff'
          - wordpress_proxied.referrer_policy | default('') == 'strict-origin-when-cross-origin'
          - "'camera=()' in (wordpress_proxied.permissions_policy | default(''))"
        fail_msg: "a security header is missing from the proxied response"
        quiet: true

    # The upstream PHP tacks on its version; caddy strips it before the edge.
    - name: The PHP version banner is stripped
      ansible.builtin.assert:
        that:
          - wordpress_proxied.x_powered_by is not defined
        fail_msg: "X-Powered-By leaked through the proxy"
        quiet: true

    # readme.html and license.txt exist in core but caddy 404s them, so a
    # scanner can't read the exact version off them.
    - name: The version-disclosure files are blocked
      ansible.builtin.uri:
        url: "http://127.0.0.1{{ item }}"
        headers:
          Host: "{{ wordpress_domains[0] }}"
        status_code: [404]
      loop:
        - /readme.html
        - /license.txt

    # blank.gif is core's healthcheck target, so it is present; caddy stamps the
    # one-year immutable cache header on it as a static asset.
    - name: A static asset answers for the cache-header check
      ansible.builtin.uri:
        url: http://127.0.0.1/wp-includes/images/blank.gif
        headers:
          Host: "{{ wordpress_domains[0] }}"
        follow_redirects: none
      register: wordpress_static
      until: wordpress_static.status == 200
      retries: 30
      delay: 5

    - name: Static assets carry the one-year immutable cache header
      ansible.builtin.assert:
        that:
          - "'immutable' in (wordpress_static.cache_control | default(''))"
          - "'31536000' in (wordpress_static.cache_control | default(''))"
        fail_msg: "static assets are not cached for a year"
        quiet: true

    # The bind mount lands the must-use plugin inside the container, so WordPress
    # loads it and drops the generator meta. rc != 0 if the mount is missing.
    - name: The hardening must-use plugin is mounted into the container
      ansible.builtin.command: >-
        podman exec wordpress test -f
        /var/www/html/wp-content/mu-plugins/wordpress-hardening.php
      become: true
      changed_when: false

    # The install page rendering proves the whole chain: caddy proxies the
    # request, wordpress serves PHP (so wordpress_config_extra is valid), and it
    # reached the database — a failed connection answers 500, not the form.
    - name: The install page renders through the database
      ansible.builtin.uri:
        url: http://127.0.0.1/wp-admin/install.php
        headers:
          Host: "{{ wordpress_domains[0] }}"
        return_content: true
      register: wordpress_install
      until: "'WordPress' in wordpress_install.content"
      retries: 30
      delay: 5

    # daemon_reload is a no-op that just makes the module gather and return each
    # unit's systemctl-show properties to assert against; it reads, not mutates.
    - name: Read the container units' state
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        daemon_reload: true
      loop:
        - wordpress-redis
        - wordpress-db
        - wordpress
      register: wordpress_units
      become: true

    - name: The containers are running
      ansible.builtin.assert:
        that:
          - item.status.ActiveState == 'active'
        fail_msg: "{{ item.item }} is not running"
        quiet: true
      loop: "{{ wordpress_units.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: The cache answers
      ansible.builtin.command: podman exec wordpress-redis redis-cli ping
      become: true
      register: wordpress_redis_ping
      changed_when: false
      failed_when: wordpress_redis_ping.stdout != 'PONG'

    - name: Read the WordPress extra config
      ansible.builtin.command: podman exec wordpress printenv WORDPRESS_CONFIG_EXTRA
      become: true
      register: wordpress_extra_config
      changed_when: false

    # wp-config.php eval's WORDPRESS_CONFIG_EXTRA at runtime, so the constants it
    # carries point the operator-enabled plugin at the cache with no manual step.
    - name: The redis host is wired into the config
      ansible.builtin.assert:
        that:
          - "'WP_REDIS_HOST' in wordpress_extra_config.stdout"
          - "'wordpress-redis' in wordpress_extra_config.stdout"
        fail_msg: "the redis host is not wired into WORDPRESS_CONFIG_EXTRA"
        quiet: true

    - name: WP-cron is disabled in the generated config
      ansible.builtin.assert:
        that:
          - "'DISABLE_WP_CRON' in wordpress_extra_config.stdout"
        fail_msg: "DISABLE_WP_CRON is not wired into WORDPRESS_CONFIG_EXTRA"
        quiet: true

    # The command fails on a non-zero rc, so a working run proves the wrapper
    # mounts the volume and the cli image reads the core version from it.
    - name: Run wp-cli through the wrapper
      ansible.builtin.command: /usr/local/bin/wp core version
      become: true
      register: wordpress_wp_cli
      changed_when: false

    - name: The wp-cli wrapper reports the core version
      ansible.builtin.assert:
        that:
          - wordpress_wp_cli.stdout | length > 0
        fail_msg: "wp-cli returned no WordPress version"
        quiet: true

    # daemon_reload only makes the module gather the unit's state (as the
    # container-state read above), so the assert can read ActiveState.
    - name: The wp-cron timer is active
      ansible.builtin.systemd_service:
        name: wordpress-cron.timer
        daemon_reload: true
      register: wordpress_cron_timer
      become: true
      failed_when: wordpress_cron_timer.status.ActiveState != 'active'

    # Verified active above; stop it now so a live 5-minute fire can't clobber the
    # .prom the metric checks below write and read back (the timer fires every
    # 5 minutes and is Persistent).
    - name: Stop the wp-cron timer for the metric checks
      ansible.builtin.systemd_service:
        name: wordpress-cron.timer
        state: stopped
      become: true

    # Start the oneshot the timer drives so this exercises the ExecStopPost metric
    # hook. wp cron event run needs an installed site, which the molecule instance
    # is not, so the ExecStart may exit non-zero — but ExecStopPost fires either
    # way, so ignore the start's result and prove the hook wrote the metric.
    - name: Run the wp-cron service
      ansible.builtin.systemd_service:
        name: wordpress-cron.service
        state: started
      failed_when: false
      become: true

    - name: Read the cron outcome metric after the service run
      ansible.builtin.slurp:
        src: "{{ wordpress_textfile_dir }}/wordpress-cron.prom"
      register: wordpress_cron_metric_run
      become: true

    # The ExecStopPost hook fired regardless of the ExecStart outcome, so assert
    # the metric's structure — the success gauge and a timestamp — not a value the
    # uninstalled site's run can't pin down.
    - name: The cron service run records the outcome metric
      vars:
        wordpress_cron_metric_text: "{{ wordpress_cron_metric_run.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "'wordpress_cron_success ' in wordpress_cron_metric_text"
          - "'wordpress_cron_last_run_timestamp_seconds ' in wordpress_cron_metric_text"
        fail_msg: "the cron service run did not record the outcome metric"
        quiet: true

    # Drive the writer the way systemd would on each outcome — the uninstalled site
    # can't force a clean ExecStart — to prove both success values.
    - name: Simulate a successful cron run's ExecStopPost
      ansible.builtin.command: /usr/local/sbin/wp-cron-metric.sh
      environment:
        SERVICE_RESULT: success
      changed_when: false
      become: true

    - name: Read the cron outcome metric after the simulated success
      ansible.builtin.slurp:
        src: "{{ wordpress_textfile_dir }}/wordpress-cron.prom"
      register: wordpress_cron_metric_ok
      become: true

    - name: A successful cron run records wordpress_cron_success 1
      ansible.builtin.assert:
        that:
          - "'wordpress_cron_success 1' in (wordpress_cron_metric_ok.content | b64decode)"
          - "'wordpress_cron_last_run_timestamp_seconds ' in (wordpress_cron_metric_ok.content | b64decode)"
        fail_msg: "the cron outcome metric did not report a successful run"
        quiet: true

    - name: Simulate a failed cron run's ExecStopPost
      ansible.builtin.command: /usr/local/sbin/wp-cron-metric.sh
      environment:
        SERVICE_RESULT: exit-code
      changed_when: false
      become: true

    - name: Read the cron outcome metric after the simulated failure
      ansible.builtin.slurp:
        src: "{{ wordpress_textfile_dir }}/wordpress-cron.prom"
      register: wordpress_cron_metric_fail
      become: true

    - name: A failed cron run records wordpress_cron_success 0
      ansible.builtin.assert:
        that:
          - "'wordpress_cron_success 0' in (wordpress_cron_metric_fail.content | b64decode)"
        fail_msg: "the cron outcome metric did not report a failed run"
        quiet: true

    - name: The database-backup timer is active
      ansible.builtin.systemd_service:
        name: wordpress-db-dump.timer
        daemon_reload: true
      register: wordpress_dump_timer
      become: true
      failed_when: wordpress_dump_timer.status.ActiveState != 'active'

    # Verified active above; stop it now so a live 00:30 fire can't clobber the
    # .prom the metric checks below write and read back (the timer is daily and
    # Persistent).
    - name: Stop the database-backup timer for the metric checks
      ansible.builtin.systemd_service:
        name: wordpress-db-dump.timer
        state: stopped
      become: true

    # Start the oneshot the timer drives — not the wrapper directly — so this also
    # exercises the ExecStopPost metric hook. Starting a oneshot blocks until it
    # exits; rc != 0 if the wrapper cannot reach the database, authenticate, or
    # write the volume, so a clean run proves the whole dump path end to end.
    - name: Run the database backup service
      ansible.builtin.systemd_service:
        name: wordpress-db-dump.service
        state: started
      become: true

    # The database has no tables until WordPress is installed, but --databases
    # still emits its CREATE DATABASE, so a dump that carries the db name proves
    # the dump landed in the volume — not the docroot — and is loadable.
    - name: The logical dump landed in the dump volume
      ansible.builtin.command: >-
        podman run --rm --volume wordpress-db-dump:/dump:ro
        {{ wordpress_db_image }}
        grep -qE 'CREATE DATABASE.*{{ wordpress_db_name }}' /dump/wordpress.sql
      become: true
      changed_when: false

    # The successful run above fired ExecStopPost, which records the outcome
    # metric node_exporter scrapes.
    - name: Read the dump outcome metric after the successful run
      ansible.builtin.slurp:
        src: "{{ wordpress_textfile_dir }}/wordpress-db-dump.prom"
      register: wordpress_dump_metric_ok
      become: true

    - name: A successful dump records wordpress_db_dump_success 1
      ansible.builtin.assert:
        that:
          - "'wordpress_db_dump_success 1' in (wordpress_dump_metric_ok.content | b64decode)"
          - "'wordpress_db_dump_last_run_timestamp_seconds ' in (wordpress_dump_metric_ok.content | b64decode)"
        fail_msg: "the dump outcome metric did not report a successful run"
        quiet: true

    # Drive the writer the way systemd would on a failed dump; an ExecStart
    # failure is awkward to force here, so invoke the hook with SERVICE_RESULT set.
    - name: Simulate a failed dump's ExecStopPost
      ansible.builtin.command: /usr/local/sbin/wp-db-dump-metric.sh
      environment:
        SERVICE_RESULT: exit-code
      changed_when: false
      become: true

    - name: Read the dump outcome metric after the simulated failure
      ansible.builtin.slurp:
        src: "{{ wordpress_textfile_dir }}/wordpress-db-dump.prom"
      register: wordpress_dump_metric_fail
      become: true

    - name: A failed dump records wordpress_db_dump_success 0
      ansible.builtin.assert:
        that:
          - "'wordpress_db_dump_success 0' in (wordpress_dump_metric_fail.content | b64decode)"
        fail_msg: "the dump outcome metric did not report a failed run"
        quiet: true

    - name: The update-check timer is active
      ansible.builtin.systemd_service:
        name: wordpress-update-check.timer
        daemon_reload: true
      register: wordpress_update_timer
      become: true
      failed_when: wordpress_update_timer.status.ActiveState != 'active'

    # Stop it so a live six-hourly fire can't clobber the .prom the metric check
    # below writes and reads back.
    - name: Stop the update-check timer for the metric check
      ansible.builtin.systemd_service:
        name: wordpress-update-check.timer
        state: stopped
      become: true

    # Start the oneshot the timer drives — not the script directly — so this also
    # exercises the unit wiring. Starting a oneshot blocks until it exits; the
    # script always exits 0, so a clean run proves only that it published.
    - name: Run the update-check service
      ansible.builtin.systemd_service:
        name: wordpress-update-check.service
        state: started
      become: true

    - name: Read the update-check metric after the run
      ansible.builtin.slurp:
        src: "{{ wordpress_textfile_dir }}/wordpress-updates.prom"
      register: wordpress_update_metric
      become: true

    # The uninstalled molecule site yields no real counts (wp-cli may not reach
    # the database or wordpress.org), so assert the metric's structure, not its
    # values: the success and timestamp lines and a gauge for every update type.
    - name: The update-check metric publishes the success, timestamp, and per-type gauges
      vars:
        wordpress_update_metric_text: "{{ wordpress_update_metric.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "'wordpress_update_check_success ' in wordpress_update_metric_text"
          - "'wordpress_update_check_last_run_timestamp_seconds ' in wordpress_update_metric_text"
          - "'wordpress_updates_available{type=\"core\"}' in wordpress_update_metric_text"
          - "'wordpress_updates_available{type=\"plugins\"}' in wordpress_update_metric_text"
          - "'wordpress_updates_available{type=\"themes\"}' in wordpress_update_metric_text"
          - "'wordpress_updates_available{type=\"translations\"}' in wordpress_update_metric_text"
        fail_msg: "the update-check metric is missing a success, timestamp, or per-type gauge line"
        quiet: true

    # podman healthcheck run executes each container's HealthCmd; rc 0 = healthy.
    - name: Each container passes its healthcheck
      ansible.builtin.command: "podman healthcheck run {{ item }}"
      loop:
        - wordpress-redis
        - wordpress-db
        - wordpress
      register: wordpress_health
      until: wordpress_health.rc == 0
      retries: 12
      delay: 10
      changed_when: false
      become: true

    # The checks above prove each add-back set is sufficient; they can't prove it
    # is minimal. Assert the posture directly so a regression that re-widens the
    # caps or drops the restriction fails here, not silently in production.
    - name: Read each container's security posture
      ansible.builtin.command: "podman inspect {{ item.name }}"
      loop:
        - {name: wordpress-redis, caps: []}
        - {name: wordpress-db, caps: [CAP_CHOWN, CAP_DAC_OVERRIDE, CAP_SETGID, CAP_SETUID]}
        - {name: wordpress, caps: [CAP_CHOWN, CAP_DAC_OVERRIDE, CAP_FOWNER, CAP_NET_BIND_SERVICE, CAP_SETGID, CAP_SETUID]}
      register: wordpress_posture
      changed_when: false
      become: true
      loop_control:
        label: "{{ item.name }}"

    - name: Each container keeps only its required capabilities and bars privilege escalation
      vars:
        container: "{{ item.stdout | from_json | first }}"
      ansible.builtin.assert:
        that:
          - "container.EffectiveCaps | default([], true) | sort == item.item.caps | sort"
          - "'no-new-privileges' in (container.HostConfig.SecurityOpt | default([], true))"
        fail_msg: "{{ item.item.name }}'s capability or no-new-privileges posture has regressed"
        quiet: true
      loop: "{{ wordpress_posture.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    # --- Enumeration and pingback hardening ---
    # This block installs the site, so it stays last: every task above asserts
    # against the uninstalled molecule instance.

    # The mu-plugin loads on every request, so a syntax error takes the whole
    # site down; lint it inside the container before trusting anything else.
    - name: The hardening plugin is valid PHP
      ansible.builtin.command: >-
        podman exec wordpress php -l
        /var/www/html/wp-content/mu-plugins/wordpress-hardening.php
      become: true
      changed_when: false

    # The enumeration checks need a real author with a published post — a fresh
    # install's admin and sample post — so install the site (guarded, so a repeat
    # verify skips it). Pretty permalinks make ?author=N resolve to the
    # /author/<slug>/ archive it leaks on the live site.
    - name: Check whether the molecule site is already installed
      ansible.builtin.command: /usr/local/bin/wp core is-installed
      register: wordpress_installed
      failed_when: false
      changed_when: false
      become: true

    - name: Install the site to exercise the enumeration hardening
      ansible.builtin.command: >-
        /usr/local/bin/wp core install
        --url=http://{{ wordpress_domains[0] }} --title=molecule
        --admin_user=molecule_admin --admin_password=molecule-admin-pw
        --admin_email=admin@wordpress.home.arpa --skip-email
      when: wordpress_installed.rc != 0
      changed_when: true
      become: true

    - name: Turn on pretty permalinks
      ansible.builtin.command: /usr/local/bin/wp rewrite structure '/%postname%/' --hard
      changed_when: true
      become: true

    # A stock install answers this 200 with the admin's login slug; the mu-plugin
    # unsets the route so it 404s. The ?rest_route form dispatches through
    # index.php, so the 404 proves the unset, not a missing rewrite rule.
    - name: The REST API denies anonymous user enumeration
      ansible.builtin.uri:
        url: http://127.0.0.1/?rest_route=/wp/v2/users
        headers:
          Host: "{{ wordpress_domains[0] }}"
        status_code: [404]

    - name: The ?author=N probe does not resolve to the author archive
      ansible.builtin.uri:
        url: http://127.0.0.1/?author=1
        headers:
          Host: "{{ wordpress_domains[0] }}"
        follow_redirects: none
        status_code: [301, 302]
      register: wordpress_author_probe

    # Stock WordPress 301s ?author=1 to /author/<slug>/, disclosing the username;
    # the mu-plugin redirects home before that, so the location leaks no slug.
    - name: The author probe redirects home, not to /author/<slug>/
      ansible.builtin.assert:
        that:
          - "'/author/' not in (wordpress_author_probe.location | default(''))"
        fail_msg: "?author=1 leaked an author-archive URL"
        quiet: true

    - name: The sample post answers for the pingback-header check
      ansible.builtin.uri:
        url: http://127.0.0.1/hello-world/
        headers:
          Host: "{{ wordpress_domains[0] }}"
        follow_redirects: none
      register: wordpress_post
      until: wordpress_post.status == 200
      retries: 10
      delay: 3

    # Stock WordPress advertises the pingback endpoint via X-Pingback on singular
    # posts; the mu-plugin strips it so the pingback vector is not advertised.
    - name: The X-Pingback advertisement is stripped from a singular post
      ansible.builtin.assert:
        that:
          - wordpress_post.x_pingback is not defined
        fail_msg: "X-Pingback leaked on a singular post"
        quiet: true
