---
# Public domains the site answers on. The caddy public-site block reverse-
# proxies them all to the wordpress container; WordPress canonicalises between
# them (e.g. www -> apex) from its own siteurl. Point DNS for each at the host.
wordpress_domains:
  - "wordpress.{{ caddy_domain | default('home.arpa') }}"

# Front the domains with TLS: the caddy global acme_dns issues the cert via
# DNS-01 before any A record points here. Molecule sets it false to stay on
# plain HTTP with no ACME.
wordpress_tls: true

wordpress_timezone: Etc/UTC

# Memory ceiling for the redis object cache; it evicts LRU keys past this and
# keeps nothing on disk.
wordpress_redis_maxmemory: 256mb

# Database the wordpress container connects to; mariadb creates the database and
# user on first init. Not secret — the passwords are.
wordpress_db_name: wordpress
wordpress_db_user: wordpress

# node_exporter textfile-collector directory the db-dump outcome metric is
# written to (wordpress-db-dump.prom). Must match the node_exporter role's
# node_exporter_textfile_directory so Prometheus scrapes what this writes.
wordpress_db_dump_textfile_dir: /var/lib/node_exporter/textfile_collector

# Database passwords (vault-sourced). Empty leaves the stack uninitialised:
# mariadb needs them to create the database on first boot. Molecule sets
# throwaway values; the fleet sources them from the vault.
wordpress_db_password: ""
wordpress_db_root_password: ""
