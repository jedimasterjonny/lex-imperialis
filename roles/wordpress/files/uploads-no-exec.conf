# Managed by Ansible (wordpress role). Disable PHP under wp-content/uploads: the
# docroot is a writable volume, so a file-upload flaw can drop a webshell there.
# engine off is admin-locked, so no attacker .htaccess re-enables PHP, and
# AllowOverride None neuters the .htaccess AddType trick that would run a .png as
# PHP. Media is served here, never executed.
<Directory /var/www/html/wp-content/uploads>
	php_admin_flag engine off
	AllowOverride None
</Directory>
