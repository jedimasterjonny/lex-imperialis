---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    # Host network, so Alertmanager answers on the instance's own :9093.
    - name: Wait for alertmanager to be ready
      ansible.builtin.uri:
        url: http://127.0.0.1:9093/-/ready
        status_code: 200
      register: alertmanager_ready
      until: alertmanager_ready.status == 200
      retries: 30
      delay: 2

    - name: Read the loaded runtime config
      ansible.builtin.uri:
        url: http://127.0.0.1:9093/api/v2/status
        return_content: true
      register: alertmanager_status

    # config.original is the raw config Alertmanager parsed; finding the templated
    # route proves the role's config loaded, not the image's baked-in example.
    - name: The templated config is loaded
      ansible.builtin.assert:
        that:
          - "'receiver: default' in alertmanager_status.json.config.original"
        fail_msg: alertmanager did not load the templated config

    # A non-zero exit fails the task, proving wget resolves in the image and the
    # health endpoint reports healthy.
    - name: The healthcheck passes
      ansible.builtin.command: podman healthcheck run alertmanager
      become: true
      changed_when: false

    # The checks above prove alertmanager works; they can't prove its capability
    # set is minimal. Assert the posture directly so a regression that widens the
    # caps or drops the restriction fails here, not silently in production.
    - name: Read alertmanager's security posture
      ansible.builtin.command: podman inspect alertmanager
      become: true
      register: alertmanager_inspect
      changed_when: false

    # alertmanager runs non-root (nobody, 65534), so EffectiveCaps is always
    # empty — only BoundingCaps reflects DropCapability=all. Assert the bounding set.
    - name: Alertmanager keeps no capabilities and bars privilege escalation
      vars:
        alertmanager: "{{ alertmanager_inspect.stdout | from_json | first }}"
      ansible.builtin.assert:
        that:
          - "alertmanager.BoundingCaps | default([], true) | sort == []"
          - "'no-new-privileges' in (alertmanager.HostConfig.SecurityOpt | default([], true))"
        fail_msg: "alertmanager's capability or no-new-privileges posture has regressed"
        quiet: true
