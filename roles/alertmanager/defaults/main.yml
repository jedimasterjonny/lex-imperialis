---
# Discord incoming-webhook URL alerts route to, vault-sourced. Empty leaves a
# null receiver — the route fires nothing — so molecule is self-contained; set it
# on the real host. Rendered no_log into a 0600 file the container reads via
# webhook_url_file, never into the world-readable config.
alertmanager_discord_webhook_url: ""

# healthchecks.io hc-ping heartbeat URL the Watchdog alert pings, vault-sourced.
# Empty leaves the deadman receiver null — the Watchdog route fires nothing — so
# molecule is self-contained; set it on the real host. Rendered no_log into a
# 0600 file the container reads via the webhook url_file, never into the
# world-readable config.
alertmanager_deadman_ping_url: ""
