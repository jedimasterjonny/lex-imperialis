---
- name: Verify
  hosts: all
  tasks:
    - name: Read the SELinux runtime mode
      ansible.builtin.command:
        cmd: cat /sys/fs/selinux/enforce
      register: wireguard_reresolve_enforce
      changed_when: false
      become: true

    - name: SELinux is enforcing
      ansible.builtin.assert:
        that:
          - wireguard_reresolve_enforce.stdout == '1'
        fail_msg: "the VM is not enforcing, so it cannot reproduce the failure"
        quiet: true

    - name: Read the loaded SELinux modules
      ansible.builtin.command:
        cmd: semodule -l
      register: wireguard_reresolve_modules
      changed_when: false
      become: true

    - name: The local policy module is loaded
      ansible.builtin.assert:
        that:
          - "'wireguard-reresolve' in wireguard_reresolve_modules.stdout"
        fail_msg: "the wireguard-reresolve SELinux module is not loaded"
        quiet: true

    # Remove the runtime dir so starting the unit must create it from scratch —
    # the boot path, where wg-quick (wireguard_t) runs openresolv's mkdir and
    # writes under enforcing. Nothing pre-creates it, so this is the whole fix:
    # systemctl start runs wg-quick in the same confined domain a boot gives it.
    - name: Remove the openresolv runtime directory
      ansible.builtin.file:
        path: /run/resolvconf
        state: absent
      become: true

    - name: Start the tunnel under enforcing, as it would at boot
      ansible.builtin.systemd_service:
        name: wg-quick@wg0.service
        state: started
      register: wireguard_reresolve_start
      failed_when: false
      become: true

    - name: Read the tunnel unit's state
      ansible.builtin.systemd_service:
        name: wg-quick@wg0.service
      register: wireguard_reresolve_wgquick
      become: true

    - name: The tunnel came up under enforcing
      ansible.builtin.assert:
        that:
          - wireguard_reresolve_wgquick.status.ActiveState == 'active'
        fail_msg: >-
          wg-quick@wg0 did not come up under enforcing SELinux — the openresolv
          denial has regressed
        quiet: true

    - name: Read the runtime directory wg-quick created
      ansible.builtin.command:
        cmd: ls -Zd /run/resolvconf
      register: wireguard_reresolve_rundir
      changed_when: false
      failed_when: false
      become: true

    - name: The runtime directory was created under enforcing
      ansible.builtin.assert:
        that:
          - "'/run/resolvconf' in wireguard_reresolve_rundir.stdout"
        fail_msg: "wg-quick did not create /run/resolvconf under enforcing"
        quiet: true
