# wg-quick's DNS= line invokes openresolv, which stores per-interface resolvers
# under /run/resolvconf. Pre-create that directory so wg-quick finds it already
# present: under enforcing SELinux the wg-quick service cannot create it itself,
# which otherwise fails the tunnel at boot. systemd-tmpfiles applies the policy
# label, so the directory is created the same way a reboot would.
d /run/resolvconf 0755 root root -
