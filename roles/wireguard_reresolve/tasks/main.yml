---
- name: Install the WireGuard and DNS tooling the re-resolve needs
  community.general.zypper:
    name:
      - wireguard-tools
      - bind-utils
    state: present
  become: true

# openSUSE's wireguard_t cannot run openresolv under enforcing; this local module
# grants it manage on var_run_t (the /run/resolvconf tree) and write on net_conf_t
# (resolv.conf). Gated on a manageable SELinux so it is a no-op on the SELinux-less
# molecule containers, whose shared kernel would otherwise take the change host-wide.
- name: Install the wireguard-resolvconf SELinux policy module
  ansible.builtin.copy:
    src: wireguard-reresolve.cil
    dest: /etc/selinux/wireguard-reresolve.cil
    owner: root
    group: root
    mode: "0644"
  become: true
  when: ansible_selinux.status == 'enabled'
  notify: Load the wireguard-reresolve SELinux module

- name: Install the re-resolve script
  ansible.builtin.copy:
    src: wireguard-reresolve
    dest: /usr/local/sbin/wireguard-reresolve
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Install the re-resolve service
  ansible.builtin.template:
    src: wireguard-reresolve.service.j2
    dest: /etc/systemd/system/wireguard-reresolve.service
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Install the re-resolve timer
  ansible.builtin.template:
    src: wireguard-reresolve.timer.j2
    dest: /etc/systemd/system/wireguard-reresolve.timer
    owner: root
    group: root
    mode: "0644"
  become: true

# daemon_reload picks up unit changes before enabling; it does not itself report
# changed, so the task stays idempotent.
- name: Enable and start the re-resolve timer
  ansible.builtin.systemd_service:
    name: wireguard-reresolve.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true
