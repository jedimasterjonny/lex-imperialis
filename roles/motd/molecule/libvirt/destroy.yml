---
- name: Destroy
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Stop instances
      ansible.builtin.command: "virsh -c qemu:///system destroy {{ item.name }}"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      register: motd_stopped
      changed_when: motd_stopped.rc == 0
      failed_when:
        - motd_stopped.rc != 0
        - "'failed to get domain' not in motd_stopped.stderr"
        - "'not running' not in motd_stopped.stderr"

    - name: Undefine instances and their UEFI nvram
      ansible.builtin.command: "virsh -c qemu:///system undefine --nvram {{ item.name }}"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      register: motd_undefined
      changed_when: motd_undefined.rc == 0
      failed_when:
        - motd_undefined.rc != 0
        - "'failed to get domain' not in motd_undefined.stderr"

    - name: Remove instance disks
      ansible.builtin.file:
        path: "/var/lib/libvirt/images/{{ item.name }}.qcow2"
        state: absent
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
