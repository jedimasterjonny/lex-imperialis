---
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # community.libvirt needs the libvirt binding, which only the system
    # interpreter has — not the venv molecule runs from.
    ansible_python_interpreter: /usr/bin/python3
    motd_ssh_key: "{{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/ssh_key"
    motd_image_cache: "{{ lookup('env', 'HOME') }}/.cache/molecule-libvirt"
  tasks:
    - name: Ensure the image cache directory exists
      ansible.builtin.file:
        path: "{{ motd_image_cache }}"
        state: directory
        mode: "0755"

    - name: Generate an ephemeral SSH key
      ansible.builtin.command: "ssh-keygen -t ed25519 -N '' -f {{ motd_ssh_key }}"
      args:
        creates: "{{ motd_ssh_key }}"

    - name: Launch instances
      community.libvirt.virt_cloud_instance:
        name: "{{ item.name }}"
        base_image: "{{ item.image }}"
        image_cache_dir: "{{ motd_image_cache }}"
        image_checksum: "{{ item.image_checksum }}"
        url_timeout: 600
        disks:
          - path: "/var/lib/libvirt/images/{{ item.name }}.qcow2"
            size: 12
            format: qcow2
        memory: 2048
        vcpus: 2
        osinfo:
          name: opensusetumbleweed
        # The module only emits --boot when 'boot' is set, so 'boot' is
        # required for boot_opts (UEFI firmware) to reach virt-install.
        boot: hd
        boot_opts:
          firmware: efi
          loader.secure: "no"
        networks:
          - network: default
        cloud_init:
          root_ssh_key: "{{ motd_ssh_key }}.pub"
        wait_for_cloud_init_reboot: false
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Wait for an IPv4 lease
      ansible.builtin.command: "virsh -c qemu:///system -q domifaddr {{ item.name }}"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      register: motd_domifaddr
      until: "motd_domifaddr.stdout is search('\\d+\\.\\d+\\.\\d+\\.\\d+')"
      retries: 30
      delay: 4
      changed_when: false

    - name: Build the instance config
      ansible.builtin.set_fact:
        motd_instance_conf: "{{ motd_instance_conf | default([]) + [motd_conf] }}"
      vars:
        motd_conf:
          instance: "{{ item.item.name }}"
          address: "{{ item.stdout | regex_search('\\d+\\.\\d+\\.\\d+\\.\\d+') }}"
          user: root
          port: 22
          identity_file: "{{ motd_ssh_key }}"
      loop: "{{ motd_domifaddr.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Write the molecule instance config
      ansible.builtin.copy:
        content: "{{ motd_instance_conf | to_nice_yaml }}"
        dest: "{{ molecule_instance_config }}"
        mode: "0600"

    - name: Wait for SSH to accept the key
      ansible.builtin.command: >-
        ssh -i {{ motd_ssh_key }} -o BatchMode=yes -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null root@{{ item.address }} true
      loop: "{{ motd_instance_conf }}"
      loop_control:
        label: "{{ item.instance }}"
      register: motd_ssh
      until: motd_ssh.rc == 0
      retries: 20
      delay: 3
      changed_when: false
