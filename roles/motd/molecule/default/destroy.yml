---
- name: Destroy
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Delete instances
      ansible.builtin.command: "incus delete --force {{ item.name }}"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      register: motd_deleted
      changed_when: motd_deleted.rc == 0
      failed_when:
        - motd_deleted.rc != 0
        - "'Instance not found' not in motd_deleted.stderr"
