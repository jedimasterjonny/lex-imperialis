---
# Wireguard owns transmission's tunnel; its host setup runs only when the
# wireguard app is enabled.
- name: Set up the wireguard tunnel host
  when: "'wireguard' in arr_enabled"
  become: true
  block:
    # The wireguard container drives the host's kernel wireguard; persist it
    # declaratively and load it only where it's missing — the minimal molecule
    # image has no kmod (nor /etc/modules-load.d), but its host already carries
    # the module.
    - name: Create the modules-load.d directory
      ansible.builtin.file:
        path: /etc/modules-load.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Persist the wireguard module across boots
      ansible.builtin.copy:
        content: |
          wireguard
        dest: /etc/modules-load.d/wireguard.conf
        owner: root
        group: root
        mode: "0644"

    - name: Probe for the wireguard module
      ansible.builtin.stat:
        path: /sys/module/wireguard
      register: arr_wireguard_module

    - name: Load the wireguard module
      community.general.modprobe:
        name: wireguard
      when: not arr_wireguard_module.stat.exists

    - name: Create the wireguard config directory
      ansible.builtin.file:
        path: "{{ arr_wireguard_conf_path | dirname }}"
        state: directory
        owner: root
        group: root
        mode: "0700"

    # The marker keeps the generated keys from churning every run, yet still lets
    # an emptied arr_wireguard_conf converge a stale real config back to a
    # blackhole — creates: would leave the revoked tunnel in place forever. The
    # read-only probe runs even under --check, so a dry run reports the install.
    - name: Probe for a blackhole wireguard config
      ansible.builtin.command: grep -qxF '# blackhole' {{ arr_wireguard_conf_path }}
      register: arr_wireguard_blackhole
      failed_when: false
      changed_when: false
      check_mode: false
      when: arr_wireguard_conf | length == 0

    # Dummy keys and a TEST-NET endpoint bring wg0 up with a dead default route:
    # transmission keeps its kill-switch from first boot, real config or not.
    - name: Install a blackhole wireguard config
      ansible.builtin.copy:
        content: |
          # blackhole
          [Interface]
          PrivateKey = {{ lookup('community.general.random_string', length=32, base64=true) }}
          Address = 100.64.0.2/32

          [Peer]
          PublicKey = {{ lookup('community.general.random_string', length=32, base64=true) }}
          AllowedIPs = 0.0.0.0/0
          Endpoint = 192.0.2.1:51820
        dest: "{{ arr_wireguard_conf_path }}"
        owner: root
        group: root
        mode: "0600"
      when: arr_wireguard_conf | length == 0 and arr_wireguard_blackhole.rc != 0
      notify: Restart wireguard

    - name: Install the wireguard config
      ansible.builtin.copy:
        content: "{{ arr_wireguard_conf }}"
        dest: "{{ arr_wireguard_conf_path }}"
        owner: root
        group: root
        mode: "0600"
      when: arr_wireguard_conf | length > 0
      no_log: true
      notify: Restart wireguard

# The shared group only when an enabled app carries it (the media-access apps).
- name: Create the shared group
  ansible.builtin.group:
    name: "{{ arr_group }}"
    gid: "{{ arr_gid }}"
    system: true
  become: true
  when: arr_enabled | select('in', arr_media_access) | list | length > 0

# Apps without shared media access get their own group, so a misbehaving
# container can't write outside its app's files. An app with no uid runs as its
# image's own user and gets no host account.
- name: Create the per-app groups
  ansible.builtin.group:
    name: "{{ item.key }}"
    gid: "{{ item.value.uid }}"
    system: true
  loop: >-
    {{ arr_apps | dict2items | selectattr('key', 'in', arr_enabled)
    | selectattr('value.uid', 'defined') | rejectattr('key', 'in', arr_media_access) | list }}
  loop_control:
    label: "{{ item.key }}"
  become: true

- name: Create the per-app users
  ansible.builtin.user:
    name: "{{ item.key }}"
    uid: "{{ item.value.uid }}"
    group: "{{ arr_group if item.key in arr_media_access else item.key }}"
    shell: /usr/sbin/nologin
    create_home: false
    system: true
  loop: "{{ arr_apps | dict2items | selectattr('key', 'in', arr_enabled) | selectattr('value.uid', 'defined') | list }}"
  loop_control:
    label: "{{ item.key }}"
  become: true

# One dir per data type, owned by the app that fills it; created only when that
# owning app is enabled.
- name: Create the data directories
  ansible.builtin.file:
    path: "{{ arr_data_root }}/{{ item.key }}"
    state: directory
    owner: "{{ item.value }}"
    group: "{{ arr_group }}"
    mode: "02775"
  loop: "{{ arr_data_dirs | dict2items | selectattr('value', 'in', arr_enabled) | list }}"
  loop_control:
    label: "{{ item.key }}"
  become: true

- name: Create the API-key directory
  ansible.builtin.file:
    path: /etc/arr
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

# A Servarr app's key renders to a 0600 EnvironmentFile the unit reads, so it
# never lands in the world-readable .container. Only apps with a vault-set key
# get a file; an empty key (molecule) leaves the app to generate its own.
- name: Deploy the Servarr API keys
  ansible.builtin.template:
    src: apikey.env.j2
    dest: /etc/arr/{{ item.key }}.env
    owner: root
    group: root
    mode: "0600"
  loop: "{{ arr_api_keys | dict2items | selectattr('key', 'in', arr_enabled) | selectattr('value', 'truthy') | list }}"
  loop_control:
    label: "{{ item.key }}"
  become: true
  no_log: true
  register: arr_api_key_files
  notify: Restart the app containers

# Transmission's RPC auth renders to a 0600 EnvironmentFile the unit reads, so the
# password never lands in the world-readable unit. Only when both creds are set;
# both empty leaves the image's auth-off default, so molecule converges with no
# vault. The unit itself is unchanged by a cred rotation, so this notifies a
# dedicated restart.
- name: Deploy the transmission RPC credentials
  ansible.builtin.template:
    src: transmission.env.j2
    dest: /etc/arr/transmission.env
    owner: root
    group: root
    mode: "0600"
  become: true
  no_log: true
  when:
    - "'transmission' in arr_enabled"
    - arr_transmission_username | length > 0
    - arr_transmission_password | length > 0
  notify: Restart transmission for arr

# A daily timer catalogs the music library into the standing beets DB so it
# tracks what lidarr adds — catalog only, no re-tag and no media writes. The
# config bind-mounts read-only into beets at /config/managed, so its host dir
# must exist before the unit starts — podman won't auto-create a :ro bind
# source. Set up here, ahead of the container, so the mount resolves on first
# start; nothing here needs beets running.
- name: Set up the beets library catalog
  when: "'beets' in arr_enabled"
  become: true
  block:
    - name: Create the beets config directory
      ansible.builtin.file:
        path: "{{ arr_beets_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Render the beets library catalog config
      ansible.builtin.template:
        src: beets-library-config.yaml.j2
        dest: "{{ arr_beets_config_dir }}/library-config.yaml"
        owner: root
        group: root
        mode: "0644"

    - name: Install the beets library catalog script
      ansible.builtin.template:
        src: beets-library.sh.j2
        dest: /usr/local/sbin/beets-library.sh
        owner: root
        group: root
        mode: "0755"

    - name: Install the beets library catalog service and timer
      ansible.builtin.template:
        src: "{{ item }}.j2"
        dest: "/etc/systemd/system/{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - beets-library.service
        - beets-library.timer

    # daemon_reload picks up the new units before enabling; it does not itself
    # report changed, so the task stays idempotent.
    - name: Enable and start the beets library catalog timer
      ansible.builtin.systemd_service:
        name: beets-library.timer
        enabled: true
        state: started
        daemon_reload: true

# A 10-minute timer screens each completed music download: beets copies it to a
# staging area and tags the copy, then the wrapper hands the copy to lidarr to
# hardlink-import (the original keeps seeding); an unmatched copy is quarantined.
# Renders alongside the catalog (same /etc/arr/beets bind, created by the catalog
# block above) but into a separate pipeline DB. The lidarr key is read at runtime
# from the existing /etc/arr/lidarr.env, so no secret is rendered here. The wrapper
# execs into the running container, so nothing here needs beets up — it creates its
# own DB/staging/quarantine dirs on first run.
- name: Set up the beets pipeline
  when: "'beets' in arr_enabled"
  become: true
  block:
    - name: Render the beets pipeline config
      ansible.builtin.template:
        src: beets-pipeline-config.yaml.j2
        dest: "{{ arr_beets_config_dir }}/pipeline-config.yaml"
        owner: root
        group: root
        mode: "0644"

    # Fed into the beets container over stdin by the wrapper — read data, not
    # executed on the host, so 0644 with no shebang. Rendered before the wrapper so
    # the redirect target exists first, even on an in-place upgrade with the timer
    # live.
    - name: Install the beets pipeline inner script
      ansible.builtin.template:
        src: beets-pipeline-inner.sh.j2
        dest: "{{ arr_beets_pipeline_inner_script }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install the beets pipeline script
      ansible.builtin.template:
        src: beets-pipeline.sh.j2
        dest: /usr/local/sbin/beets-pipeline.sh
        owner: root
        group: root
        mode: "0755"

    - name: Install the beets pipeline metric script
      ansible.builtin.template:
        src: beets-pipeline-metric.sh.j2
        dest: "{{ arr_beets_metric_script }}"
        owner: root
        group: root
        mode: "0755"

    - name: Install the beets pipeline service and timer
      ansible.builtin.template:
        src: "{{ item }}.j2"
        dest: "/etc/systemd/system/{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - beets-pipeline.service
        - beets-pipeline.timer

    - name: Enable and start the beets pipeline timer
      ansible.builtin.systemd_service:
        name: beets-pipeline.timer
        enabled: true
        state: started
        daemon_reload: true

# Recyclarr's config renders to /etc/arr/recyclarr and bind-mounts read-only into
# the container, so the host dir must exist before the unit starts — podman won't
# auto-create a :ro bind source. Only a secrets.yml change restarts recyclarr: it's
# a single-file bind, and template's atomic rename swaps the inode the running
# container holds open. The configs/ directory bind serves re-rendered files live.
- name: Set up the recyclarr config
  when: "'recyclarr' in arr_enabled"
  become: true
  block:
    - name: Create the recyclarr config directory
      ansible.builtin.file:
        path: "{{ arr_recyclarr_config_dir }}/configs"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Render the recyclarr configs
      ansible.builtin.template:
        src: "recyclarr-{{ item }}.yml.j2"
        dest: "{{ arr_recyclarr_config_dir }}/configs/{{ item }}.yml"
        owner: root
        group: root
        mode: "0644"
      loop:
        - movies
        - tv

    # secrets.yml carries the radarr/sonarr api keys the configs reference via
    # !secret, so it renders 0600 owned by the recyclarr uid — the in-container
    # process (User=3007) reads the ro bind, which a root-only file would deny.
    - name: Render the recyclarr secrets
      ansible.builtin.template:
        src: recyclarr-secrets.yml.j2
        dest: "{{ arr_recyclarr_config_dir }}/secrets.yml"
        owner: recyclarr
        group: recyclarr
        mode: "0600"
      no_log: true
      notify: Restart recyclarr for arr

- name: Install the app container units
  ansible.builtin.template:
    src: app.container.j2
    dest: /etc/containers/systemd/{{ item.key }}.container
    owner: root
    group: root
    mode: "0644"
  loop: "{{ arr_apps | dict2items | selectattr('key', 'in', arr_enabled) | list }}"
  loop_control:
    label: "{{ item.key }}"
  become: true
  register: arr_app_units
  notify: Restart the app containers

# The caddy role owns /etc/caddy/sites and imports every sites/*.caddy as
# matcher + handle snippets inside its wildcard vhost.
- name: Register the apps with the reverse proxy
  ansible.builtin.template:
    src: arr.caddy.j2
    dest: /etc/caddy/sites/arr.caddy
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart caddy for arr

# Quadlet units only exist after the daemon reload, so apply pending restarts
# before asserting the services are up.
- name: Apply pending unit changes
  ansible.builtin.meta: flush_handlers

- name: Start the containers
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
  loop: "{{ arr_enabled }}"
  become: true
