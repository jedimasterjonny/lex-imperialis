---
# Domain the reverse proxy routes on: each app answers at <app>.<arr_domain>.
# Follows caddy_domain wherever the vault sets it. Point wildcard DNS for it
# at the host.
arr_domain: "{{ caddy_domain | default('home.arpa') }}"

arr_timezone: Etc/UTC

# NAS-backed media root; each app that stores media gets <root>/<data type>.
arr_data_root: /nfs/administratum/scriptorum

# Data dir → owning app, created under arr_data_root with the shared group and
# setgid so the importers co-write. Media types nest under media/ (matching the
# apps' mounts); downloads is a sibling. Set empty on hosts whose NAS layout
# (and its perms) is managed externally, so the role creates no data dirs.
arr_data_dirs:
  media/movies: radarr
  media/tv: sonarr
  media/music: lidarr
  downloads: transmission

# Apps to deploy; the whole stack by default. Override per host (in the play) to
# bring containers up incrementally — each app's user, group, unit and proxy
# snippet, plus the shared group, data dirs and wireguard tunnel, are gated on
# the apps actually enabled.
arr_enabled: "{{ arr_apps.keys() | list }}"

# wg-quick client config routing transmission's traffic (vault-sourced).
# Empty installs a generated blackhole config: the tunnel comes up dead, so
# torrent traffic can never leak outside the VPN.
arr_wireguard_conf: ""

# beets standing-library catalog. A daily timer runs an incremental
# `beet import -A` then `beet update` over the music library so the standing
# catalog tracks what lidarr adds — catalog only, no re-tag and no media writes.
# The rendered config bind-mounts read-only into the beets container at
# /config/managed (see the beets app's binds in vars/main.yml).
arr_beets_config_dir: /etc/arr/beets
# Container path the music library mounts at (arr_data_root is /data inside every
# app), so it holds regardless of the host's arr_data_root.
arr_beets_music_dir: /data/media/music
arr_beets_library_oncalendar: "*-*-* 04:00:00"

# beets per-download pipeline. A 10-minute timer screens each settled music
# download: beets copies it to a staging area and tags the copy (so the original
# keeps seeding intact), then triggers lidarr to move the staged copy into the
# library; an unmatched album's copy is moved to quarantine for hand-processing
# instead of reaching lidarr. lidarr keeps completed-download handling OFF so beets
# gates every import — a runtime *arr setting, not codified here (see README).
arr_beets_lidarr_url: http://lidarr:8686
arr_beets_pipeline_oncalendar: "*:0/10"
# Match thresholds, rendered unquoted into the beets config (it needs numbers):
# only a strong MusicBrainz match auto-imports, a weaker one skips → quarantine.
# 0.18 admits the ~85-90% matches real downloads score without MusicBrainz IDs in
# their tags and with patchy AcoustID coverage; 0.10 quarantined nearly everything.
arr_beets_strong_rec_thresh: "0.18"
arr_beets_rec_gap_thresh: "0.10"
# An album whose files were all untouched this long counts as settled (download
# finished), so the pipeline never screens a half-downloaded album.
arr_beets_stable_minutes: 15
# How many ticks lidarr may queue a matched album without actually importing it
# (the staged copy never empties of audio) before the wrapper gives up and moves
# it to quarantine/lidarr-rejected. DownloadedAlbumsScan returns queued, not imported,
# so a silent reject (unmonitored artist, profile mismatch) is caught only by this
# cap; lidarr merely being unreachable is transient and never counts against it.
arr_beets_poke_cap: 6
# Container paths (arr_data_root mounts at /data in every app): the download dir
# is lidarr's transmission category; staging holds the tagged copies awaiting
# lidarr (same filesystem as the library, so lidarr's Move is an instant rename);
# quarantine takes no-match copies. All three are siblings under downloads, one
# filesystem.
arr_beets_download_dir: /data/downloads/completed/music-lidarr
arr_beets_staging_dir: /data/downloads/staging
arr_beets_quarantine_dir: /data/downloads/quarantine
# ExecStopPost hook that records the screening backlog (quarantine + lidarr-rejected
# album counts) as a node_exporter textfile metric. Same /usr/local/sbin home as the
# wrapper.
arr_beets_metric_script: /usr/local/sbin/beets-pipeline-metric.sh
# node_exporter textfile-collector dir the backlog metric is written to
# (beets-pipeline.prom). Must match the node_exporter role's
# node_exporter_textfile_directory so Prometheus scrapes what this writes.
arr_beets_metric_textfile_dir: /var/lib/node_exporter/textfile_collector

# Servarr API keys, vault-sourced and keyed by app. Each key is injected via the
# app's <APP>__AUTH__APIKEY env var — rendered to a 0600 EnvironmentFile, never
# the world-readable unit — which overrides the config.xml value at runtime, so
# the repo owns the key instead of the app generating its own into the config
# volume. The dict keys name the apps that support it; an empty value leaves that
# app to self-generate, so molecule converges with no vault. Vault replaces the
# whole dict (no merge); seeding it with each app's current key keeps prowlarr
# and recyclarr working across the cutover.
arr_api_keys:
  radarr: ""
  sonarr: ""
  lidarr: ""
  prowlarr: ""

# Transmission RPC auth, vault-sourced. The LSIO image forces auth off on every
# start unless USER/PASS are set, so these render to a 0600 EnvironmentFile the
# unit reads — never the world-readable unit — which turns RPC auth on and sets
# the rpc username/password. Both empty leaves the image's auth-off default, so
# molecule converges with no vault.
arr_transmission_username: ""
arr_transmission_password: ""

# Recyclarr's TRaSH config — the radarr/sonarr quality-profile + custom-format
# configs and the !secret api keys — renders here and bind-mounts read-only into
# the container (on top of the /config volume, which keeps its guide cache).
# gitops re-renders it, so the repo owns it instead of the volume.
arr_recyclarr_config_dir: /etc/arr/recyclarr
