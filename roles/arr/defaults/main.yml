---
# Domain the reverse proxy routes on: each app answers at <app>.<arr_domain>.
# Follows caddy_domain wherever the vault sets it. Point wildcard DNS for it
# at the host.
arr_domain: "{{ caddy_domain | default('home.arpa') }}"

arr_timezone: Etc/UTC

# NAS-backed media root; each app that stores media gets <root>/<data type>.
arr_data_root: /nfs/administratum/scriptorum

# Data dir → owning app, created under arr_data_root with the shared group and
# setgid so the importers co-write. Media types nest under media/ (matching the
# apps' mounts); downloads is a sibling. Set empty on hosts whose NAS layout
# (and its perms) is managed externally, so the role creates no data dirs.
arr_data_dirs:
  media/movies: radarr
  media/tv: sonarr
  media/music: lidarr
  downloads: transmission

# Apps to deploy; the whole stack by default. Override per host (in the play) to
# bring containers up incrementally — each app's user, group, unit and proxy
# snippet, plus the shared group, data dirs and wireguard tunnel, are gated on
# the apps actually enabled.
arr_enabled: "{{ arr_apps.keys() | list }}"

# wg-quick client config routing transmission's traffic (vault-sourced).
# Empty installs a generated blackhole config: the tunnel comes up dead, so
# torrent traffic can never leak outside the VPN.
arr_wireguard_conf: ""

# Servarr API keys, vault-sourced and keyed by app. Each key is injected via the
# app's <APP>__AUTH__APIKEY env var — rendered to a 0600 EnvironmentFile, never
# the world-readable unit — which overrides the config.xml value at runtime, so
# the repo owns the key instead of the app generating its own into the config
# volume. The dict keys name the apps that support it; an empty value leaves that
# app to self-generate, so molecule converges with no vault. Vault replaces the
# whole dict (no merge); seeding it with each app's current key keeps prowlarr
# and recyclarr working across the cutover.
arr_api_keys:
  radarr: ""
  sonarr: ""
  lidarr: ""
  prowlarr: ""
