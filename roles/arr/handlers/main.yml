---
# daemon_reload folded into the restart, never a separate fleet-shared "Reload
# systemd" handler: a duplicate name whose winning definition lives in a later
# role reorders after this role's restart at the mid-play flush, so the
# container is recreated from the stale generated unit. The reload regenerates
# the quadlet-derived unit before the restart.
#
# Bounce only the apps whose unit file or API-key file changed, so an image bump
# or key rotation for one app doesn't interrupt the others. Both tasks notify
# this handler; unique collapses an app whose unit and key file both changed (a
# first deploy) to a single restart.
- name: Restart the app containers
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: restarted
    daemon_reload: true
  loop: >-
    {{ (arr_app_units.results + arr_api_key_files.results)
    | selectattr('changed') | map(attribute='item.key') | unique | list }}
  become: true

# Config changes restart wireguard directly; PartOf bounces transmission too.
- name: Restart wireguard
  ansible.builtin.systemd_service:
    name: wireguard
    state: restarted
  become: true

- name: Restart caddy for arr
  ansible.builtin.systemd_service:
    name: caddy
    state: restarted
  become: true

# A cred rotation changes only the EnvironmentFile, not the unit, so restart
# transmission directly; daemon_reload folded in per the role's convention.
- name: Restart transmission for arr
  ansible.builtin.systemd_service:
    name: transmission
    state: restarted
    daemon_reload: true
  become: true

# secrets.yml is a single-file bind whose inode the running container holds open,
# so a config change needs a recreate, not just a re-read; daemon_reload folded in
# per the role's convention.
- name: Restart recyclarr for arr
  ansible.builtin.systemd_service:
    name: recyclarr
    state: restarted
    daemon_reload: true
  become: true
