---
# Listed reload-first: handlers run in definition order, and restarts of
# quadlet-generated units need the regenerated units loaded.
- name: Reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true
  become: true

# Bounce only the apps whose unit files changed, so an image bump for one
# app doesn't interrupt the others.
- name: Restart the app containers
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: restarted
  loop: "{{ arr_app_units.results | selectattr('changed') | map(attribute='item.key') | list }}"
  become: true

# Config changes restart wireguard directly; PartOf bounces transmission too.
- name: Restart wireguard
  ansible.builtin.systemd_service:
    name: wireguard
    state: restarted
  become: true

- name: Restart caddy
  ansible.builtin.systemd_service:
    name: caddy
    state: restarted
  become: true
