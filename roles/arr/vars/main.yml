---
# Per-app identity and wiring; renovate's image manager bumps the tags. uid
# feeds the container's PUID on lscr.io images and the quadlet User= elsewhere;
# data names what the app mounts under /data — 'root' is the whole tree, so
# imports hardlink across downloads and media; a list is just those dirs.
# publish exposes the app's port on the host for native clients; device passes
# a host device through for hardware transcoding; netns joins another app's
# container netns (lifecycle follows it); network_alias, caps, sysctls and
# binds are quadlet passthroughs. prowlarr only manages indexers and recyclarr
# only talks to the other apps, so neither has a data mount. recyclarr's
# config — and the arr API keys inside it — is operator-managed in its volume,
# keeping the keys out of the repo.
#
# Media-writing apps take their uid from the matching NAS user (filled in as
# each is migrated) so files written over NFS land owned by an id the NAS
# recognises; the non-NAS apps keep a local id.
arr_group: arr
# The NAS's arr group, so media written over NFS is group-owned by a gid the
# NAS recognises and the importers co-write.
arr_gid: 65537

# Media access beyond what ownership grants: these apps carry the shared group
# — the importers co-write with beets and transmission, whose
# files are group-owned — and ro mounts media read-only. The rest run under
# their own per-app group with no media access at all.
arr_media_access:
  radarr: rw
  sonarr: rw
  lidarr: rw
  beets: rw
  transmission: rw
  plex: ro

arr_apps:
  radarr:
    image: lscr.io/linuxserver/radarr:6.2.1@sha256:7b45af3b660f5ff5f7d6d625bfa99960cb9265e902f1bef136486f6d2be73ee9
    uid: 1038
    port: 7878
    data: root
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17@sha256:02bc962946fef994e67a38152446df25c10a52f8583aefeeb6467f9dd44cab99
    uid: 1039
    port: 8989
    data: root
  lidarr:
    image: lscr.io/linuxserver/lidarr:3.1.0@sha256:20025a94077f6f9ad523fbc83a201e35e766f4b2135e92237a41aa5fd51015ce
    uid: 1037
    port: 8686
    data: root
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.4.0@sha256:a46d0ce0a8236bc4e065fe7c91a55d026c9d849620c5845250519b977d8857f3
    uid: 3004
    port: 9696
  beets:
    image: lscr.io/linuxserver/beets:2.11.0@sha256:bb73b8be1142a7b22e13d6f76f986bec99e60761a967714b098f8d766f88ca37
    uid: 1040
    port: 8337
    # Whole tree so beets can import (and hardlink) from downloads into the
    # music library — both must be one mount for hardlinks to work.
    data: root
  plex:
    image: lscr.io/linuxserver/plex:1.43.2@sha256:8b2996bf9a78615d7490d30241ea75f86c3dcdaf14edb4c329eb912932537e4f
    uid: 3006
    port: 32400
    # Host networking replicates the proven ynarri setup: GDM/DLNA discovery and
    # the full port range, not just 32400. Not on caddy.network, so the proxy
    # snippet skips it — reached directly on the host.
    network: host
    device: /dev/dri
    # Plex's restored DB references media at flat /movies, /tv, /music, so mount
    # the NAS media dirs at exactly those paths and the library resolves with no
    # database surgery.
    data:
      media/movies: /movies
      media/tv: /tv
      media/music: /music
    # Plex's TranscoderTempDirectory is /transcode; back it with a tmpfs so
    # transcoding has somewhere to write without touching the config volume.
    tmpfs: [/transcode]
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:8.6.0@sha256:3c38ceeb54438dd8327e4e65c9b48ba601a6d20fff833342d93c9b0bc4b1930b
    uid: 3007
  # Shares the wireguard netns, so every peer connection rides the tunnel;
  # caddy reaches the webui at the wireguard container's transmission alias.
  transmission:
    image: lscr.io/linuxserver/transmission:4.1.2@sha256:90ca6073778ea3f5a77b05db2014cd10a9425aeb6a79e8d557b15f8862b2d495
    uid: 1041
    port: 9091
    netns: wireguard
    data: [downloads]
  wireguard:
    image: lscr.io/linuxserver/wireguard:1.0.20250521@sha256:1bf21d1c8933f7376da97bb14a459ae18e716e49d2e3456dbfd71414f60a319a
    uid: 3009
    network_alias: transmission
    caps: [NET_ADMIN]
    sysctls: [net.ipv4.conf.all.src_valid_mark=1]
    binds: ["{{ arr_wireguard_conf_path }}:/config/wg_confs/wg0.conf:ro"]
    # Auto-recover a dropped tunnel: probe connectivity through wg0 and, on
    # sustained failure, kill the container so systemd restarts it (PartOf
    # bounces transmission into the fresh netns). The template forces on_failure
    # to 'none' when there's no real config, so the blackhole kill-switch is
    # never restart-looped.
    healthcheck:
      cmd: ping -c1 -W5 1.1.1.1
      on_failure: kill

# Client config for transmission's tunnel; the operator's real config arrives
# via arr_wireguard_conf (vault).
arr_wireguard_conf_path: /etc/wireguard/wg0.conf
