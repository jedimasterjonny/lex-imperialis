---
# Per-app identity and wiring; renovate's image manager bumps the tags. uid
# feeds the container's PUID; data names both the subdirectory under
# arr_data_root and the in-container mount, matching the linuxserver.io volume
# conventions. prowlarr only manages indexers, so it has no data mount.
arr_group: arr
arr_gid: 3000
arr_apps:
  radarr:
    image: lscr.io/linuxserver/radarr:6.2.1
    uid: 3001
    port: 7878
    data: movies
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17
    uid: 3002
    port: 8989
    data: tv
  lidarr:
    image: lscr.io/linuxserver/lidarr:3.1.0
    uid: 3003
    port: 8686
    data: music
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.4.0
    uid: 3004
    port: 9696
