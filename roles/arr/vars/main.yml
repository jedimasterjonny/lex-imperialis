---
# Per-app identity and wiring; renovate's image manager bumps the tags. uid
# feeds the container's PUID on lscr.io images and the quadlet User= elsewhere;
# omit it for an image that ships its own non-root user and writes only inside
# its image (flaresolverr) — the role then sets no User= and creates no host
# account, running it as the image's user. data names what the app mounts under
# /data — 'root' is the whole tree, so
# imports hardlink across downloads and media; a list is just those dirs.
# device passes a host device through for hardware transcoding; netns joins
# another app's container netns (lifecycle follows it, and that owner advertises
# each joiner as a network alias so caddy reaches it); caps, sysctls and binds
# are quadlet passthroughs; healthcheck adds a podman liveness
# probe (cmd plus optional interval/timeout/start_period/retries/on_failure, all
# defaulted). prowlarr only manages indexers and recyclarr
# only talks to the other apps, so neither has a data mount. recyclarr's TRaSH
# config is repo-rendered and bind-mounted read-only (see defaults/tasks),
# including the Servarr API keys it references via arr_api_keys.
#
# Media-writing apps take their uid from the matching NAS user (filled in as
# each is migrated) so files written over NFS land owned by an id the NAS
# recognises; the non-NAS apps keep a local id.
arr_group: arr
# The NAS's arr group, so media written over NFS is group-owned by a gid the
# NAS recognises and the importers co-write.
arr_gid: 65537

# Media access beyond what ownership grants: these apps carry the shared group
# — the importers co-write with beets and transmission, whose
# files are group-owned — and ro mounts media read-only. The rest run under
# their own per-app group with no media access at all.
arr_media_access:
  radarr: rw
  sonarr: rw
  lidarr: rw
  beets: rw
  transmission: rw
  plex: ro

arr_apps:
  radarr:
    image: lscr.io/linuxserver/radarr:6.2.1@sha256:39da107b5a9371fdaa651bd188049b863716a815385eb3a30d41071b7e1aeb33
    uid: 1038
    port: 7878
    netns: wireguard
    data: root
    healthcheck:
      cmd: curl -fsS http://127.0.0.1:7878/ping
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.19@sha256:fbb15bb4fb14d1ffe017f6be0e3fed8f1b300e4687e329767da0b61f36ba1eed
    uid: 1039
    port: 8989
    netns: wireguard
    data: root
    healthcheck:
      cmd: curl -fsS http://127.0.0.1:8989/ping
  lidarr:
    image: lscr.io/linuxserver/lidarr:3.1.0@sha256:ba7d43fd5d7de790c38c2dc8f2b2b54c1ac00a452784891c37385a43a039907a
    uid: 1037
    port: 8686
    netns: wireguard
    data: root
    healthcheck:
      cmd: curl -fsS http://127.0.0.1:8686/ping
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.4.0@sha256:3e9bd62ca90c97c5df75b7012e10a29f6926e62807deeddc1dc89e6e2fd141e1
    uid: 3004
    port: 9696
    netns: wireguard
    healthcheck:
      cmd: curl -fsS http://127.0.0.1:9696/ping
  # Prowlarr's Cloudflare-challenge solver. No port, so no proxy snippet: this
  # unauthenticated headless-browser proxy is an open URL-fetcher that must never
  # face the public reverse proxy. No uid: it patches its bundled chromedriver in
  # place under /app, writable only to the image's own user, so it runs as that
  # user with no host account. /health answers 200 without launching the browser.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0@sha256:139dfee1c6f89249c8d665d1333a42e8ec74ec0a86bc6bb1c8461e10d3a66a47
    healthcheck:
      cmd: curl -fsS http://127.0.0.1:8191/health
  beets:
    image: lscr.io/linuxserver/beets:2.12.0@sha256:9d7953d6afc7469e6314c25d9952374338de792171857dc5ff6dc482d488c658
    uid: 1040
    port: 8337
    # Whole tree so beets can import (and hardlink) from downloads into the
    # music library — both must be one mount for hardlinks to work.
    data: root
    # Read-only Ansible-rendered beets configs land at /config/managed; the
    # catalog timer runs `beet -c /config/managed/...`. ro config under /etc, so
    # no :Z (container_t reads etc_t).
    binds: ["{{ arr_beets_config_dir }}:/config/managed:ro"]
    healthcheck:
      cmd: curl -fsS http://127.0.0.1:8337/
  plex:
    image: lscr.io/linuxserver/plex:1.43.2@sha256:5a2dca89f4b53222ba2565ffa9ede3f320f37a69ac4b7fd475b492f772c5523b
    uid: 3006
    port: 32400
    # Host networking replicates the proven ynarri setup: GDM/DLNA discovery and
    # the full port range, not just 32400. Not on caddy.network, so the proxy
    # snippet skips it — reached directly on the host.
    network: host
    device: /dev/dri
    # Plex's restored DB references media at flat /movies, /tv, /music, so mount
    # the NAS media dirs at exactly those paths and the library resolves with no
    # database surgery.
    data:
      media/movies: /movies
      media/tv: /tv
      media/music: /music
    # Plex's TranscoderTempDirectory is /transcode; back it with a tmpfs so
    # transcoding has somewhere to write without touching the config volume.
    tmpfs: [/transcode]
    # /identity answers unauthenticated, so it probes liveness without a token.
    healthcheck:
      cmd: curl -fsS http://127.0.0.1:32400/identity
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:8.6.0@sha256:3c38ceeb54438dd8327e4e65c9b48ba601a6d20fff833342d93c9b0bc4b1930b
    uid: 3007
    # Repo-rendered config bind-mounted read-only on top of the /config volume
    # (the radarr/sonarr configs plus the !secret api keys in secrets.yml); the
    # volume keeps recyclarr's TRaSH-guide cache. ro config under /etc, so no :Z.
    binds:
      - "{{ arr_recyclarr_config_dir }}/secrets.yml:/config/secrets.yml:ro"
      - "{{ arr_recyclarr_config_dir }}/configs:/config/configs:ro"
  # Shares the wireguard netns, so every peer connection rides the tunnel;
  # caddy reaches the webui at the wireguard container's transmission alias.
  transmission:
    image: lscr.io/linuxserver/transmission:4.1.3@sha256:30d59b253993df8c7634fe03cbb33e22324d00d200ff3d3cc30e6184fa55f96b
    uid: 1041
    port: 9091
    netns: wireguard
    data: [downloads]
    # Shares wireguard's netns, so the RPC webui answers on localhost here. A
    # liveness probe only: -sS without -f treats an auth-on 401 the same as an
    # auth-off 200 (both mean "responding"), so it needs no credentials — which
    # would otherwise leak into the probe's argv — and works in either state.
    healthcheck:
      cmd: curl -sS -o /dev/null http://127.0.0.1:9091/transmission/web/
  wireguard:
    image: lscr.io/linuxserver/wireguard:1.0.20250521@sha256:ad0501c857edad4059f90c9b536338cb105bbb5f3fc82070986d36b937c897ca
    uid: 3009
    caps: [NET_ADMIN]
    sysctls: [net.ipv4.conf.all.src_valid_mark=1]
    binds: ["{{ arr_wireguard_conf_path }}:/config/wg_confs/wg0.conf:ro"]
    # Auto-recover a dropped tunnel: probe connectivity through wg0 and, on
    # sustained failure, kill the container so systemd restarts it (PartOf
    # bounces transmission into the fresh netns). The template forces on_failure
    # to 'none' when there's no real config, so the blackhole kill-switch is
    # never restart-looped.
    healthcheck:
      cmd: ping -c1 -W5 1.1.1.1
      on_failure: kill

# Client config for transmission's tunnel; the operator's real config arrives
# via arr_wireguard_conf (vault).
arr_wireguard_conf_path: /etc/wireguard/wg0.conf
