---
platforms:
  - name: "lex-arr-incus-${MOLECULE_RUN_ID:-local}"
    image: images:opensuse/tumbleweed/cloud
    # podman mounts overlays for its storage, which incus only permits in a
    # nested-container-capable instance. The CI runner's AppArmor denies nested
    # runtime's sysctl fd-reopen, so drop the profile — the instance is throwaway.
    config:
      security.nesting: "true"
      raw.lxc: lxc.apparmor.profile=unconfined
provisioner:
  inventory:
    group_vars:
      all:
        # Exercise the API-key injection the way real hosts do (vault-sourced).
        arr_api_keys:
          radarr: a1b2c3d4e5f60718293a4b5c6d7e8f90
          sonarr: b2c3d4e5f60718293a4b5c6d7e8f90a1
          lidarr: c3d4e5f60718293a4b5c6d7e8f90a1b2
          prowlarr: d4e5f60718293a4b5c6d7e8f90a1b2c3
        # Exercise the transmission RPC auth-on path (and the -u healthcheck).
        arr_transmission_username: molecule
        arr_transmission_password: moleculepass
