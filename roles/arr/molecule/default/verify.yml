---
# Most of the verification lives in pytest (roles/arr/tests/), run on the
# controller against the converged instance; VERIFY_TARGET names it and the
# repo-root conftest turns that into `incus exec`. playbook_dir/../../tests
# resolves to the role's tests dir. The decommission re-apply below stays in
# Ansible: it re-invokes the arr role with a reduced arr_enabled — a controller-
# side play operation pytest (which only runs shell inside the instance) cannot
# express — so vars_files is kept for its arr_apps reference.
- name: Verify
  hosts: all
  gather_facts: false
  vars_files:
    - ../../defaults/main.yml
    - ../../vars/main.yml
  tasks:
    - name: Run the pytest verification suite against the instance
      ansible.builtin.command: python -m pytest {{ playbook_dir }}/../../tests -q
      environment:
        VERIFY_TARGET: "{{ inventory_hostname }}"
      delegate_to: localhost
      changed_when: false

    # Decommission path: the converge enables every app, so nothing above
    # exercises the removal loop. Re-apply with flaresolverr dropped and prove its
    # unit and container are torn down — it has no port, proxy snippet or
    # wireguard alias, so removing it touches nothing but its own container.
    - name: Re-apply arr with flaresolverr dropped from arr_enabled
      ansible.builtin.include_role:
        name: arr
      vars:
        arr_enabled: "{{ arr_apps.keys() | list | difference(['flaresolverr']) }}"

    - name: Read the dropped app's unit file
      ansible.builtin.stat:
        path: /etc/containers/systemd/flaresolverr.container
      register: arr_dropped_unit
      become: true

    # The role's stop task errors loudly on a failed stop, so a completed
    # re-apply with the unit gone is proof the container was stopped and removed.
    - name: The dropped app is decommissioned
      ansible.builtin.assert:
        that:
          - not arr_dropped_unit.stat.exists
        quiet: true

    # Re-apply the same reduced set: the reject-list still holds flaresolverr but
    # its unit is already gone, so the cleanup must no-op. The converge idempotence
    # check only exercises the all-enabled (empty reject-list) path, and dropping
    # the stat guard would make this second stop error on the missing unit.
    - name: Re-apply arr again to prove the removal converged
      ansible.builtin.include_role:
        name: arr
      vars:
        arr_enabled: "{{ arr_apps.keys() | list | difference(['flaresolverr']) }}"

    - name: Re-read the dropped app's unit file
      ansible.builtin.stat:
        path: /etc/containers/systemd/flaresolverr.container
      register: arr_dropped_unit_again
      become: true

    - name: The removal stays converged on reconverge
      ansible.builtin.assert:
        that:
          - not arr_dropped_unit_again.stat.exists
        quiet: true
