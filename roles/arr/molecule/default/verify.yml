---
- name: Verify
  hosts: all
  gather_facts: false
  vars_files:
    - ../../defaults/main.yml
    - ../../vars/main.yml
  tasks:
    - name: Wait for each app to answer through the proxy
      ansible.builtin.uri:
        url: http://127.0.0.1/
        headers:
          Host: "{{ item.key }}.{{ arr_domain }}"
        follow_redirects: none
        status_code: [200, 301, 302, 401]
      loop: "{{ arr_apps | dict2items | selectattr('value.port', 'defined') | rejectattr('value.network', 'defined') | list }}"
      loop_control:
        label: "{{ item.key }}"
      register: arr_proxied
      until: arr_proxied.status in [200, 301, 302, 401]
      retries: 30
      delay: 2

    # Host-networked apps aren't on caddy.network, so the proxy snippet skips
    # them; prove they're up by hitting the host port directly instead.
    - name: Wait for each host-networked app to answer directly
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ item.value.port }}/identity"
        status_code: [200]
      loop: "{{ arr_apps | dict2items | selectattr('value.port', 'defined') | selectattr('value.network', 'defined') | list }}"
      loop_control:
        label: "{{ item.key }}"
      register: arr_hostnet
      until: arr_hostnet.status == 200
      retries: 40
      delay: 3

    # The proxy wait already proves the ported apps are up; only the portless
    # ones need their units read directly. daemon_reload is a no-op that just
    # makes the module gather and return the unit's systemctl-show properties
    # to assert against; it reads, not mutates.
    - name: Read the portless apps' unit state
      ansible.builtin.systemd_service:
        name: "{{ item.key }}"
        daemon_reload: true
      loop: "{{ arr_apps | dict2items | rejectattr('value.port', 'defined') | list }}"
      loop_control:
        label: "{{ item.key }}"
      register: arr_portless
      become: true

    - name: The portless apps are running
      ansible.builtin.assert:
        that:
          - item.status.ActiveState == 'active'
        fail_msg: "{{ item.item.key }} is not running"
        quiet: true
      loop: "{{ arr_portless.results }}"
      loop_control:
        label: "{{ item.item.key }}"

    # lscr.io images drop their service to PUID:PGID as the abc account;
    # recyclarr runs under quadlet User= and has no account to read.
    - name: Read each app account inside its container
      ansible.builtin.command: podman exec {{ item.key }} sh -c 'id -u abc && id -g abc'
      become: true
      loop: "{{ arr_apps | dict2items | selectattr('value.image', 'match', 'lscr\\.io/') | list }}"
      loop_control:
        label: "{{ item.key }}"
      register: arr_app_ids
      changed_when: false

    - name: Each app drops to its host user and its policy group
      ansible.builtin.assert:
        that:
          - item.stdout_lines == [arr_app_uid | string, arr_app_gid | string]
        fail_msg: "{{ item.item.key }} is not running as {{ arr_app_uid }}:{{ arr_app_gid }}"
        quiet: true
      vars:
        arr_app_uid: "{{ item.item.value.uid }}"
        arr_app_gid: "{{ arr_gid if item.item.key in arr_media_access else item.item.value.uid }}"
      loop: "{{ arr_app_ids.results }}"
      loop_control:
        label: "{{ item.item.key }}"

    # recyclarr has no service account to read — quadlet User= sets its
    # identity, and exec inherits it, so id reads what it actually runs as.
    - name: Read recyclarr's runtime account
      ansible.builtin.command: podman exec recyclarr sh -c 'id -u && id -g'
      become: true
      register: arr_recyclarr_id
      changed_when: false

    - name: Recyclarr runs as its host user and per-app group
      ansible.builtin.assert:
        that:
          - arr_recyclarr_id.stdout_lines == [arr_apps.recyclarr.uid | string, arr_apps.recyclarr.uid | string]
        quiet: true

    # The checks above prove each app works; they can't prove its capability set
    # is minimal. Assert the posture directly so a regression that widens the caps
    # or drops NoNewPrivileges fails here, not silently in production. The lscr.io
    # images start as root at the container level and drop internally, so their
    # EffectiveCaps reflect the add-back; flaresolverr and recyclarr run as a
    # non-root user, whose EffectiveCaps are always empty regardless of the drop,
    # so only BoundingCaps has teeth — assert whichever field is meaningful per app.
    - name: Read each app's security posture
      ansible.builtin.command: podman inspect {{ item.name }}
      become: true
      loop:
        - {name: radarr, field: EffectiveCaps, caps: [CAP_CHOWN, CAP_KILL, CAP_SETGID, CAP_SETUID]}
        - {name: sonarr, field: EffectiveCaps, caps: [CAP_CHOWN, CAP_KILL, CAP_SETGID, CAP_SETUID]}
        - {name: lidarr, field: EffectiveCaps, caps: [CAP_CHOWN, CAP_KILL, CAP_SETGID, CAP_SETUID]}
        - {name: prowlarr, field: EffectiveCaps, caps: [CAP_CHOWN, CAP_KILL, CAP_SETGID, CAP_SETUID]}
        - {name: transmission, field: EffectiveCaps, caps: [CAP_CHOWN, CAP_DAC_OVERRIDE, CAP_KILL, CAP_SETGID, CAP_SETUID]}
        - {name: beets, field: EffectiveCaps, caps: [CAP_CHOWN, CAP_DAC_OVERRIDE, CAP_KILL, CAP_SETGID, CAP_SETUID]}
        - {name: plex, field: EffectiveCaps, caps: [CAP_CHOWN, CAP_DAC_OVERRIDE, CAP_KILL, CAP_SETGID, CAP_SETUID]}
        - {name: wireguard, field: EffectiveCaps, caps: [CAP_CHOWN, CAP_NET_ADMIN, CAP_SETGID, CAP_SETUID]}
        - {name: flaresolverr, field: BoundingCaps, caps: []}
        - {name: recyclarr, field: BoundingCaps, caps: []}
      loop_control:
        label: "{{ item.name }}"
      register: arr_posture
      changed_when: false

    - name: Each app keeps only its minimal capabilities and bars privilege escalation
      vars:
        container: "{{ item.stdout | from_json | first }}"
      ansible.builtin.assert:
        that:
          - "container[item.item.field] | default([], true) | sort == item.item.caps | sort"
          - "'no-new-privileges' in (container.HostConfig.SecurityOpt | default([], true))"
        fail_msg: "{{ item.item.name }}'s capability or no-new-privileges posture has regressed"
        quiet: true
      loop: "{{ arr_posture.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    # The posture list is hand-maintained, unlike the loops above that iterate
    # arr_apps — so a newly-added app would be hardened by the template but escape
    # the one assert that guards the minimal set. Fail if the two fall out of sync.
    - name: The posture check covers every app
      ansible.builtin.assert:
        that:
          - "(arr_posture.results | map(attribute='item.name') | sort) == (arr_apps.keys() | sort)"
        fail_msg: "the capability posture list is out of sync with arr_apps — add the new app to it"
        quiet: true

    # Recyclarr's config renders to the host and bind-mounts read-only into the
    # container. cat from inside proves the bind resolves and the User=3007 process
    # can read each file; a missing or unreadable file fails the task.
    - name: Read the rendered recyclarr configs from inside the container
      ansible.builtin.command: podman exec recyclarr sh -c 'cat /config/{{ item }}'
      loop:
        - configs/movies.yml
        - configs/tv.yml
      become: true
      register: arr_recyclarr_cfg
      changed_when: false

    - name: The recyclarr configs carry the instances and !secret key references
      ansible.builtin.assert:
        that:
          - "'!secret radarr_api_key' in arr_recyclarr_cfg.results[0].stdout"
          - "'!secret sonarr_api_key' in arr_recyclarr_cfg.results[1].stdout"
        quiet: true

    # secrets.yml renders 0600 owned by the recyclarr uid; test -r as the container
    # user proves it's readable without dumping the keys into output.
    - name: The recyclarr secrets file is readable by the container user
      ansible.builtin.command: podman exec recyclarr sh -c 'test -r /config/secrets.yml'
      become: true
      changed_when: false

    - name: Stat the recyclarr secrets file
      ansible.builtin.stat:
        path: "{{ arr_recyclarr_config_dir }}/secrets.yml"
      become: true
      register: arr_recyclarr_secrets

    - name: The recyclarr secrets file is private to the recyclarr user
      ansible.builtin.assert:
        that:
          - arr_recyclarr_secrets.stat.exists
          - arr_recyclarr_secrets.stat.mode == '0600'
          - arr_recyclarr_secrets.stat.pw_name == 'recyclarr'
        fail_msg: "secrets.yml is missing or not 0600 recyclarr"
        quiet: true

    # exec defaults to container root, which bypasses file perms — drop to the
    # service account so the write exercises the shared group.
    - name: Probe a media write from beets
      ansible.builtin.command: podman exec --user abc beets sh -c 'touch /data/media/music/.probe && rm /data/media/music/.probe'
      become: true
      register: arr_beets_write
      changed_when: false

    - name: Probe a media write from plex
      ansible.builtin.command: podman exec plex touch /movies/.probe
      become: true
      register: arr_plex_write
      changed_when: false
      failed_when: false

    - name: Beets writes media through the shared group; plex cannot at all
      ansible.builtin.assert:
        that:
          - arr_beets_write.rc == 0
          - arr_plex_write.rc != 0
        quiet: true

    - name: Read the wireguard netns and each app that joins it
      ansible.builtin.command: podman exec {{ item }} readlink /proc/self/ns/net
      loop: >-
        {{ ['wireguard'] + (arr_apps | dict2items | selectattr('key', 'in', arr_enabled)
        | selectattr('value.netns', 'defined') | map(attribute='key') | list) }}
      become: true
      register: arr_netns
      changed_when: false

    - name: Read the default route in the tunnel netns
      ansible.builtin.command: podman exec wireguard ip route get 1.1.1.1
      become: true
      register: arr_tunnel_route
      changed_when: false

    - name: The tunnel netns routes its default out of wg0
      ansible.builtin.assert:
        that:
          - "'dev wg0' in arr_tunnel_route.stdout"
        quiet: true

    # Route via wg0 is necessary but not sufficient — with the blackhole tunnel
    # molecule converges, a real request from transmission (the confined client
    # that must never leak) must die inside the netns: curl 28, wg0 swallowing
    # the packets.
    - name: Probe internet egress from inside the tunnel netns
      ansible.builtin.command: podman exec transmission curl --max-time 5 -sS https://1.1.1.1
      become: true
      register: arr_egress_probe
      changed_when: false
      failed_when: false

    - name: The tunnel netns cannot reach the internet past the dead tunnel
      ansible.builtin.assert:
        that:
          - arr_egress_probe.rc == 28
        fail_msg: "egress escaped the netns or the probe broke (rc={{ arr_egress_probe.rc }})"
        quiet: true

    # The proxy wait above already proves each webui path skips the tunnel: the
    # blackhole config molecule converges with would eat a proxied request.
    - name: Wireguard and every app that joins its netns share one net namespace
      ansible.builtin.assert:
        that:
          - item.stdout == arr_netns.results[0].stdout
        fail_msg: "{{ item.item }} is not in the wireguard netns"
        quiet: true
      loop: "{{ arr_netns.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Wireguard carries the auto-recovery healthcheck
      ansible.builtin.command: grep -q '^HealthCmd=' /etc/containers/systemd/wireguard.container
      become: true
      changed_when: false

    # Run each webui app's probe directly (a non-zero exit fails the task), so
    # the command resolving inside the image and the endpoint answering are both
    # proven. wireguard is excluded — its blackhole tunnel is meant to fail.
    - name: Each app's healthcheck passes
      ansible.builtin.command: podman healthcheck run {{ item.key }}
      become: true
      loop: "{{ arr_apps | dict2items | selectattr('value.healthcheck', 'defined') | rejectattr('key', 'equalto', 'wireguard') | list }}"
      loop_control:
        label: "{{ item.key }}"
      changed_when: false

    # Transmission RPC auth: the creds render to a 0600 EnvironmentFile (USER/PASS
    # turn auth on in the image). The healthcheck above already proves the -u probe
    # authenticates; prove the file is locked down and that auth is enforced.
    - name: Stat the transmission RPC credentials file
      ansible.builtin.stat:
        path: /etc/arr/transmission.env
      become: true
      register: arr_transmission_env

    - name: The transmission RPC creds file is private to root
      ansible.builtin.assert:
        that:
          - arr_transmission_env.stat.exists
          - arr_transmission_env.stat.mode == '0600'
          - arr_transmission_env.stat.pw_name == 'root'
        fail_msg: /etc/arr/transmission.env is missing or not 0600 root
        quiet: true

    - name: Probe transmission RPC without credentials
      ansible.builtin.command: >-
        podman exec transmission
        curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9091/transmission/rpc/
      become: true
      register: arr_transmission_noauth
      changed_when: false

    - name: Transmission RPC rejects unauthenticated access
      ansible.builtin.assert:
        that:
          - arr_transmission_noauth.stdout == '401'
        fail_msg: "transmission RPC returned {{ arr_transmission_noauth.stdout }}, expected 401 (auth not enforced)"
        quiet: true

    # The Servarr apps take their API key from the repo, injected via a 0600
    # EnvironmentFile so it never lands in the world-readable unit. Prove the
    # file is locked down and the container actually receives the key.
    - name: Stat each Servarr API-key env file
      ansible.builtin.stat:
        path: /etc/arr/{{ item }}.env
      loop: "{{ arr_api_keys | dict2items | selectattr('key', 'in', arr_enabled) | map(attribute='key') | list }}"
      become: true
      register: arr_keyfile_stat

    - name: Each API-key file is private to root
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.mode == '0600'
          - item.stat.pw_name == 'root'
        fail_msg: "/etc/arr/{{ item.item }}.env is missing or not 0600 root"
        quiet: true
      loop: "{{ arr_keyfile_stat.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read each Servarr app's injected API key
      ansible.builtin.command: podman exec {{ item }} printenv {{ item | upper }}__AUTH__APIKEY
      loop: "{{ arr_api_keys | dict2items | selectattr('key', 'in', arr_enabled) | map(attribute='key') | list }}"
      become: true
      register: arr_injected_keys
      changed_when: false

    - name: Each Servarr app receives its API key from the env file
      ansible.builtin.assert:
        that:
          - item.stdout | length > 0
        fail_msg: "{{ item.item }} did not receive its API key"
        quiet: true
      loop: "{{ arr_injected_keys.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Stat the data directories
      ansible.builtin.stat:
        path: "{{ arr_data_root }}/{{ item.key }}"
      loop: "{{ arr_data_dirs | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: arr_dirs

    - name: Each data directory belongs to its app and the shared group
      ansible.builtin.assert:
        that:
          - item.stat.isdir
          - item.stat.pw_name == item.item.value
          - item.stat.gr_name == arr_group
        fail_msg: "{{ item.item.key }} is not owned by {{ item.item.value }}:{{ arr_group }}"
        quiet: true
      loop: "{{ arr_dirs.results }}"
      loop_control:
        label: "{{ item.item.key }}"

    # The standing beets catalog: a daily timer runs the catalog script against
    # the running beets container. Prove the unit, script, rendered config, and
    # that a run completes cleanly over the (empty) molecule music library.
    - name: Read the beets library catalog timer state
      ansible.builtin.systemd_service:
        name: beets-library.timer
        daemon_reload: true
      become: true
      register: arr_beets_timer

    - name: The beets library catalog timer is enabled and active
      ansible.builtin.assert:
        that:
          - arr_beets_timer.status.UnitFileState == 'enabled'
          - arr_beets_timer.status.ActiveState == 'active'
        quiet: true

    - name: Stat the beets library catalog script
      ansible.builtin.stat:
        path: /usr/local/sbin/beets-library.sh
      become: true
      register: arr_beets_script

    - name: The catalog script is present and executable
      ansible.builtin.assert:
        that:
          - arr_beets_script.stat.exists
          - arr_beets_script.stat.mode == '0755'
        quiet: true

    # cat (not a separate test -r) proves both readability and the content below;
    # a missing or unreadable file fails this task.
    - name: Read the rendered catalog config from inside the container
      ansible.builtin.command: podman exec beets cat /config/managed/library-config.yaml
      become: true
      register: arr_beets_cfg
      changed_when: false

    - name: The catalog config is catalog-only (no media writes)
      ansible.builtin.assert:
        that:
          - "'write: no' in arr_beets_cfg.stdout"
        quiet: true

    # Running the oneshot proves the script resolves beet inside the container and
    # the catalog completes — a non-zero exit fails the start, failing verify.
    - name: Run the beets library catalog over the empty library
      ansible.builtin.systemd_service:
        name: beets-library.service
        state: started
      become: true

    # Prove the catalog actually imports — not just that it runs clean on empty —
    # and that a second run adds nothing (the standing catalog's core contract).
    # The fixture is generated in-container with ffmpeg (no committed binary), and
    # import -A is no-autotag so it needs no MusicBrainz network.
    - name: Generate a tagged music fixture in the library
      ansible.builtin.command:
        argv:
          - podman
          - exec
          - --user
          - abc
          - beets
          - sh
          - -c
          - >-
            mkdir -p /data/media/music/TestArtist/TestAlbum &&
            ffmpeg -hide_banner -loglevel error -f lavfi -i anullsrc=r=44100:cl=mono
            -t 1 -metadata artist=TestArtist -metadata album=TestAlbum
            -metadata title=Track1 /data/media/music/TestArtist/TestAlbum/01.mp3
      become: true
      changed_when: true

    - name: Run the catalog over the populated library
      ansible.builtin.systemd_service:
        name: beets-library.service
        state: started
      become: true

    - name: Count catalogued items after the first populated run
      ansible.builtin.command: podman exec --user abc beets beet -c /config/managed/library-config.yaml ls
      become: true
      register: arr_beets_items_first
      changed_when: false

    - name: Re-run the catalog over the populated library
      ansible.builtin.systemd_service:
        name: beets-library.service
        state: started
      become: true

    - name: Count catalogued items after the re-run
      ansible.builtin.command: podman exec --user abc beets beet -c /config/managed/library-config.yaml ls
      become: true
      register: arr_beets_items_again
      changed_when: false

    - name: The catalog imported the album and the re-run added nothing
      ansible.builtin.assert:
        that:
          - arr_beets_items_first.stdout_lines | length >= 1
          - arr_beets_items_again.stdout_lines | length == arr_beets_items_first.stdout_lines | length
        fail_msg: >-
          catalog not idempotent: first={{ arr_beets_items_first.stdout_lines | length }}
          again={{ arr_beets_items_again.stdout_lines | length }}
        quiet: true

    # The beets pipeline: a 10-minute timer screens completed downloads, handing
    # matches to lidarr and quarantining the rest. Molecule has no download tree,
    # so the wrapper's "no download dir → exit 0" path runs — proving the unit,
    # wrapper, rendered config, lidarr env file, and that a run is clean.
    - name: Read the beets pipeline timer state
      ansible.builtin.systemd_service:
        name: beets-pipeline.timer
        daemon_reload: true
      become: true
      register: arr_beets_pipeline_timer

    - name: The beets pipeline timer is enabled and active
      ansible.builtin.assert:
        that:
          - arr_beets_pipeline_timer.status.UnitFileState == 'enabled'
          - arr_beets_pipeline_timer.status.ActiveState == 'active'
        quiet: true

    - name: Stat the beets pipeline script
      ansible.builtin.stat:
        path: /usr/local/sbin/beets-pipeline.sh
      become: true
      register: arr_beets_pipeline_script

    - name: The pipeline script is present and executable
      ansible.builtin.assert:
        that:
          - arr_beets_pipeline_script.stat.exists
          - arr_beets_pipeline_script.stat.mode == '0755'
        quiet: true

    - name: Read the rendered pipeline config from inside the container
      ansible.builtin.command: podman exec beets cat /config/managed/pipeline-config.yaml
      become: true
      register: arr_beets_pipeline_cfg
      changed_when: false

    - name: The pipeline config enables the musicbrainz matcher
      ansible.builtin.assert:
        that:
          - "'musicbrainz' in arr_beets_pipeline_cfg.stdout"
        quiet: true

    # Running the oneshot proves the wrapper resolves beet/find/curl inside the
    # container and exits 0 on the empty tree (no download dir), creating the
    # staging and quarantine dirs as a side effect.
    - name: Run the beets pipeline over the empty tree
      ansible.builtin.systemd_service:
        name: beets-pipeline.service
        state: started
      become: true

    - name: The staging and quarantine directories exist after a run
      ansible.builtin.command: podman exec beets test -d {{ item }}
      loop:
        - "{{ arr_beets_staging_dir }}"
        - "{{ arr_beets_quarantine_dir }}"
      become: true
      changed_when: false

    # The ExecStopPost hook ran and published the backlog metric; the empty tree
    # has nothing parked, so both gauges read zero.
    - name: Read the backlog metric the ExecStopPost published
      ansible.builtin.command: cat {{ arr_beets_metric_textfile_dir }}/beets-pipeline.prom
      become: true
      register: arr_beets_metric_prom
      changed_when: false

    - name: The backlog metric reports an empty queue
      ansible.builtin.assert:
        that:
          - "'beets_pipeline_quarantine_albums 0' in arr_beets_metric_prom.stdout"
          - "'beets_pipeline_lidarr_rejected_albums 0' in arr_beets_metric_prom.stdout"
        quiet: true

    # Exercise the counting itself, not just the empty-tree zero: park one no-match
    # album and one lidarr-rejected album, re-run the hook, and confirm each gauge
    # counts its own pile (the lidarr-rejected subdir excluded from the no-match count).
    - name: Park a no-match album and a lidarr-rejected album
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ arr_data_root }}/downloads/quarantine/Some No-Match Album"
        - "{{ arr_data_root }}/downloads/quarantine/lidarr-rejected/Some Rejected Album"
      become: true

    - name: Re-run the metric hook over the parked albums
      ansible.builtin.command: "{{ arr_beets_metric_script }}"
      become: true
      changed_when: false

    - name: Read the backlog metric after parking albums
      ansible.builtin.command: cat {{ arr_beets_metric_textfile_dir }}/beets-pipeline.prom
      become: true
      register: arr_beets_metric_parked
      changed_when: false

    - name: The metric counts the no-match and lidarr-rejected piles separately
      ansible.builtin.assert:
        that:
          - "'beets_pipeline_quarantine_albums 1' in arr_beets_metric_parked.stdout"
          - "'beets_pipeline_lidarr_rejected_albums 1' in arr_beets_metric_parked.stdout"
        quiet: true
