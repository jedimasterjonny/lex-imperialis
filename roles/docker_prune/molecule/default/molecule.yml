---
platforms:
  # Underscore in the role name hyphenated: incus rejects underscores in instance
  # names.
  - name: "lex-docker-prune-incus-${MOLECULE_RUN_ID:-local}"
    image: images:opensuse/tumbleweed/cloud
    # docker mounts overlays for its storage, which incus only permits in a
    # nested-container-capable instance. The CI runner's AppArmor denies nested
    # runc's sysctl fd-reopen, so drop the profile — the instance is throwaway.
    config:
      security.nesting: "true"
      raw.lxc: lxc.apparmor.profile=unconfined
