---
# pre-commit-hooks stay remote (no venv equivalent to call); yamllint,
# ansible-lint, shellcheck, and ruff run as local hooks against the venv-pinned
# tools, so their versions live in exactly one place — requirements-dev.txt.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-json
      - id: check-executables-have-shebangs
      - id: detect-private-key
      # The scenario architecture shares converge/verify/prepare via relative
      # symlinks; these guard against a rename leaving a dangler or a symlink
      # being committed as its dereferenced content.
      - id: check-symlinks
      - id: destroyed-symlinks
  # gitleaks backstops detect-private-key, catching tokens, passwords, and
  # cloud credentials the lone key check misses. Stays remote like the other
  # binary hooks.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        types: [yaml]
      - id: ansible-lint
        name: ansible-lint
        entry: ansible-lint
        language: system
        pass_filenames: false
        always_run: true
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
      # identify tags *.sh.j2 as jinja, not shell, so the hook above skips the
      # riskiest scripts. This one strips the Jinja and pipes the result through
      # shellcheck so they get analysed too.
      - id: shellcheck-jinja
        name: shellcheck-jinja
        entry: bin/shellcheck-jinja.sh
        language: script
        files: '(\.sh\.j2$|/(wp|wp-db-dump)\.j2$)'
      # ruff lints and formats the pytest verify suites (the repo's only Python);
      # config in pyproject.toml. check reports, format --check gates the layout.
      - id: ruff-check
        name: ruff-check
        entry: ruff check
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format
        entry: ruff format --check
        language: system
        types: [python]
      # Every role must ship an incus or libvirt test (libvirt implies hetzner).
      - id: role-test-coverage
        name: role-test-coverage
        entry: bin/check-role-test-coverage.sh
        language: script
        pass_filenames: false
        always_run: true
      # OpenTofu gates for terraform/, mirroring the yamllint/ansible-lint style:
      # local hooks calling the tofu on PATH (zypper-installed; setup-opentofu in CI).
      - id: tofu-fmt
        name: tofu-fmt
        entry: tofu fmt -check -recursive terraform
        language: system
        pass_filenames: false
        files: '\.tf$'
      - id: tofu-validate
        name: tofu-validate
        entry: bin/tofu-validate.sh
        language: script
        pass_filenames: false
        files: '\.tf$'
      - id: tflint
        name: tflint
        entry: tflint --chdir=terraform
        language: system
        pass_filenames: false
        files: '(\.tf$|\.tflint\.hcl$)'
