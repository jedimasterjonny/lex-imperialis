---
# pre-commit-hooks stay remote (no venv equivalent to call); yamllint,
# ansible-lint, and shellcheck run as local hooks against the venv-pinned
# tools, so their versions live in exactly one place — requirements-dev.txt.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-json
      - id: check-executables-have-shebangs
      - id: detect-private-key
      # The scenario architecture shares converge/verify/prepare via relative
      # symlinks; these guard against a rename leaving a dangler or a symlink
      # being committed as its dereferenced content.
      - id: check-symlinks
      - id: destroyed-symlinks
  # editorconfig-checker enforces .editorconfig — the indent style (tabs vs spaces)
  # per file type, on top of the whitespace/EOL/newline hooks above. A Go binary
  # with no pip-pure equivalent, so it stays remote like gitleaks; the rev is
  # renovate-tracked (:enablePreCommit). Its IndentSize (multiple-of-N) check is
  # off in .editorconfig-checker.json — it fights the intentional Jinja-expression
  # alignment in the YAML, markdown prose, and the vendored LICENSE.
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.6.1
    hooks:
      - id: editorconfig-checker
  # gitleaks backstops detect-private-key, catching tokens, passwords, and
  # cloud credentials the lone key check misses. Stays remote like the other
  # binary hooks.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  # actionlint lints .github/workflows/*.yml for GitHub Actions semantics yamllint
  # can't see (expression types, runs-on labels, cron/glob syntax, action `uses`
  # form) and runs shellcheck over every `run:` step — the local shellcheck hook
  # is typed to standalone shell files, so scripts embedded in workflows were
  # unchecked until now. A Go binary with no pip package, so it stays remote and
  # builds through pre-commit's golang toolchain, like gitleaks; the rev is
  # renovate-tracked (:enablePreCommit). It finds shellcheck on PATH — the
  # venv-pinned one under `make pre-commit` — so embedded and standalone scripts
  # face the same shellcheck.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  # markdownlint-cli2 lints every tracked *.md for structure and style yamllint and
  # prose review can't reach — heading levels, fenced-code languages, table and
  # list formatting. A Node tool with no pip equivalent, so it stays remote and
  # builds through pre-commit's node toolchain, like actionlint's and gitleaks'
  # golang; the rev is renovate-tracked (:enablePreCommit). Rules live in
  # .markdownlint-cli2.yaml — every default on, only MD013 line-length relaxed.
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.1
    hooks:
      - id: markdownlint-cli2
  - repo: local
    hooks:
      - id: yamllint
        name: yamllint
        # --strict: warnings fail the gate too, not just errors.
        entry: yamllint --strict
        language: system
        types: [yaml]
      - id: ansible-lint
        name: ansible-lint
        # --strict: promote warnings to failures on top of the production profile.
        entry: ansible-lint --strict
        language: system
        pass_filenames: false
        always_run: true
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
      # identify tags *.sh.j2 as jinja, not shell, so the hook above skips the
      # riskiest scripts. This one strips the Jinja and pipes the result through
      # shellcheck so they get analysed too.
      - id: shellcheck-jinja
        name: shellcheck-jinja
        entry: bin/shellcheck-jinja.sh
        language: script
        files: '(\.sh\.j2$|/(wp|wp-db-dump)\.j2$)'
      # Every role must ship an incus or libvirt test (libvirt implies hetzner).
      - id: role-test-coverage
        name: role-test-coverage
        entry: bin/check-role-test-coverage.sh
        language: script
        pass_filenames: false
        always_run: true
      # OpenTofu gates for terraform/, mirroring the yamllint/ansible-lint style:
      # local hooks calling the tofu on PATH (zypper-installed; setup-opentofu in CI).
      - id: tofu-fmt
        name: tofu-fmt
        entry: tofu fmt -check -recursive terraform
        language: system
        pass_filenames: false
        files: '\.tf$'
      - id: tofu-validate
        name: tofu-validate
        entry: bin/tofu-validate.sh
        language: script
        pass_filenames: false
        files: '\.tf$'
      - id: tflint
        name: tflint
        entry: tflint --chdir=terraform
        language: system
        pass_filenames: false
        files: '(\.tf$|\.tflint\.hcl$)'
