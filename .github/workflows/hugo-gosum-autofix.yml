---
name: hugo go.sum autofix

# Blowfish (the Hugo theme) is an indirect gomod require that no Go package
# imports, so `go get` records only its /go.mod hash — never the content h1 hash
# — and leaves the superseded version's lines behind. Only Hugo's own tooling
# records the content hash, and the Mend-hosted Renovate app can't run it
# (postUpgradeTasks need self-hosted allowedCommands). So the fix lives in CI: on
# any PR that touches jonnyoc-site/go.{mod,sum}, regenerate a complete, tidy
# go.sum and fold it into the Renovate commit (amend + force-push), so each bump
# stays a single clean commit rather than growing a checksum-fixup churn.
#
# The amend is force-pushed with a GitHub App token, not GITHUB_TOKEN: a
# GITHUB_TOKEN push doesn't re-trigger workflows, which would leave the required
# site-gate check unreported on the amended head and hang the PR. An App-token
# push re-triggers the checks, and can't loop — the autofix only pushes when
# go.sum is incomplete, which the pushed fix clears. Needs a GitHub App with
# contents:write installed on the repo; its id and private key are the
# AUTOFIX_APP_ID / AUTOFIX_APP_KEY secrets.
"on":
  pull_request:
    paths:
      - 'jonnyoc-site/go.mod'
      - 'jonnyoc-site/go.sum'

permissions:
  contents: read # the push authenticates with the App token below, not GITHUB_TOKEN

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  autofix:
    name: complete go.sum
    # Fork PRs get a read-only token and an unpushable branch; skip them.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./jonnyoc-site
    steps:
      # Mint a short-lived App token so the amend's push re-triggers the required
      # checks (a GITHUB_TOKEN push wouldn't). Forks are skipped above, so the
      # secrets are always available here.
      - name: Mint a GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.AUTOFIX_APP_ID }}
          private-key: ${{ secrets.AUTOFIX_APP_KEY }}
          permission-contents: write # pin the token to contents:write, even if the App is over-granted

      - name: Check out the PR branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0 # full history so the amend + force-push is clean
          token: ${{ steps.app-token.outputs.token }} # push with the App token so checks re-trigger

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: jonnyoc-site/go.mod
          cache-dependency-path: jonnyoc-site/go.sum

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: "0.164.0"
          extended: true

      # `hugo mod tidy` drops the superseded lines; the build downloads the theme
      # and records its content hash — the same completion the preview build does
      # — so together they yield the canonical two-line entry. Abort if tidy ever
      # drops the theme require rather than commit a broken go.mod.
      - name: Regenerate a complete, tidy go.sum
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo mod tidy
          hugo --minify -d "${RUNNER_TEMP}/gosum-build" >/dev/null
          grep -q 'nunocoracao/blowfish' go.mod \
            || { echo '::error::theme require missing after hugo mod tidy — aborting'; exit 1; }

      - name: Fold the corrected go.sum into the Renovate commit
        run: |
          if git diff --quiet -- go.mod go.sum; then
            echo 'go.sum already complete — nothing to fix.'
            exit 0
          fi
          orig="$(git rev-parse HEAD)"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add go.mod go.sum
          # Amend rather than stack a fixup commit, so each bump stays one clean
          # commit (Renovate's — author preserved). The App-token push re-triggers
          # the required checks on the amended head; the lease rejects the push if
          # the branch moved since checkout.
          git commit --amend --no-edit
          git push --force-with-lease="${GITHUB_HEAD_REF}:${orig}" origin HEAD:"${GITHUB_HEAD_REF}"
