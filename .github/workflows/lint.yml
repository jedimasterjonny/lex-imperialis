---
name: Lint

# "on" is quoted so yamllint's truthy rule does not read it as a boolean.
"on":
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs; let main pushes finish so each commit keeps a check.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # make pre-commit activates .venv, so mirror the local layout.
      - name: Install dev tooling
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements-dev.txt

      - name: Cache pre-commit environments
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-

      # The tofu-fmt/tofu-validate hooks call the tofu on PATH; on the fleet it is
      # zypper-installed, here the action provides it. Renovate can't track that
      # rolling package, so it bumps this from upstream opentofu releases instead,
      # across both CI workflows (held for review — see renovate.json).
      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: "1.12.5"
          tofu_wrapper: false

      # tflint has no zypper package; the action installs the pinned release the
      # tflint hook runs. github_token lifts the release-download rate limit.
      - name: Set up tflint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
        with:
          tflint_version: "v0.64.0"
          github_token: ${{ github.token }}

      # promtool has no zypper package; the pre-commit promtool hook needs it on
      # PATH. Derive the version from the prometheus role's pinned image — the same
      # prometheus that evaluates these rules at runtime, so the linter never drifts
      # from the evaluator and renovate's image manager stays the one pin (as the
      # secret-scan job derives gitleaks from its hook). Verify the tarball against
      # the release's own checksums before trusting the binary; the token lifts the
      # release-download limit.
      - name: Set up promtool
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          version=$(grep -oP 'prom/prometheus:v\K[^@"]+' roles/prometheus/vars/main.yml)
          base="https://github.com/prometheus/prometheus/releases/download/v${version}"
          tarball="prometheus-${version}.linux-amd64.tar.gz"
          curl -sSfL -H "Authorization: Bearer $GITHUB_TOKEN" -O "${base}/${tarball}"
          curl -sSfL -H "Authorization: Bearer $GITHUB_TOKEN" -O "${base}/sha256sums.txt"
          sha256sum -c --ignore-missing sha256sums.txt
          tar -xzf "$tarball" "prometheus-${version}.linux-amd64/promtool"
          sudo install "prometheus-${version}.linux-amd64/promtool" /usr/local/bin/promtool
          promtool --version

      - name: Run lint gate
        run: make pre-commit

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      # gitleaks walks git history, so the default shallow checkout would scan
      # only the tip: a secret added and later deleted within a branch stays in
      # history through the --no-ff merge, yet is invisible at HEAD.
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      # The pre-commit gitleaks hook scans the staged index (--staged); on CI's
      # fresh checkout nothing is staged, so it scans zero bytes and passes
      # vacuously. Run the same git-mode scan without --staged — the real
      # push-time backstop over the checked-out commit. Version tracks the hook,
      # the single source of truth.
      #
      # Verify the tarball against the release's own checksums file before trusting
      # the binary: a corrupted or truncated download must not silently pass the
      # gate it implements. The token lifts the 60/hour anonymous release-download
      # limit (as setup-tflint's github_token does). No --location-trusted: the
      # release URL redirects to a CDN on another host, and curl drops the header
      # across that hop — so it authenticates only the rate-limited github.com
      # request.
      - name: Scan the checked-out commit for secrets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          version=$(grep -A1 'repo: https://github.com/gitleaks/gitleaks' .pre-commit-config.yaml | sed -n 's/.*rev: v//p')
          base="https://github.com/gitleaks/gitleaks/releases/download/v${version}"
          curl -sSfL -H "Authorization: Bearer $GITHUB_TOKEN" -O "${base}/gitleaks_${version}_linux_x64.tar.gz"
          curl -sSfL -H "Authorization: Bearer $GITHUB_TOKEN" -O "${base}/gitleaks_${version}_checksums.txt"
          sha256sum -c --ignore-missing "gitleaks_${version}_checksums.txt"
          tar -xzf "gitleaks_${version}_linux_x64.tar.gz" gitleaks
          ./gitleaks git . --no-banner --redact
