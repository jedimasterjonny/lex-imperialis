---
name: Lint

# "on" is quoted so yamllint's truthy rule does not read it as a boolean.
"on":
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs; let main pushes finish so each commit keeps a check.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # make pre-commit activates .venv, so mirror the local layout.
      - name: Install dev tooling
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements-dev.txt

      - name: Cache pre-commit environments
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-

      - name: Run lint gate
        run: make pre-commit

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # The pre-commit gitleaks hook scans the staged index (--staged); on CI's
      # fresh checkout nothing is staged, so it scans zero bytes and passes
      # vacuously. Run the same git-mode scan without --staged — the real
      # push-time backstop over the checked-out commit. Version tracks the hook,
      # the single source of truth.
      - name: Scan the checked-out commit for secrets
        run: |
          version=$(grep -A1 'repo: https://github.com/gitleaks/gitleaks' .pre-commit-config.yaml | sed -n 's/.*rev: v//p')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks git . --no-banner --redact
