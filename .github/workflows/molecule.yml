---
name: molecule

# "on" is quoted so yamllint's truthy rule does not read it as a boolean.
# Tier-3 provisions a real, billable VM: gate it to PRs touching the role, deps,
# vault, or this workflow, plus manual dispatch. No push:main — the --no-ff merge
# tree equals the validated PR tree.
"on":
  pull_request:
    paths:
      - 'roles/motd/**'
      - 'inventory/group_vars/all/vault.yml'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - '.github/workflows/molecule.yml'
  workflow_dispatch:

permissions:
  contents: read

# Serialise globally: the scenario uses a fixed server name, so overlapping runs
# would collide. Queue, don't cancel, so each run completes its own teardown.
concurrency:
  group: molecule-hetzner
  cancel-in-progress: false

jobs:
  hetzner:
    name: hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev tooling
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements-dev.txt

      # VAULT_PASSWORD decrypts the in-repo vault holding the hcloud token — the
      # only secret CI needs; molecule reads this repo-root file as a local run does.
      - name: Write the vault password file
        env:
          VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}
        run: |
          printf '%s' "$VAULT_PASSWORD" > .vault_pass
          chmod 600 .vault_pass

      - name: Run the hetzner molecule scenario
        run: make test-hetzner

      # Backstop for cancellation (timeout/manual), where molecule is killed
      # before its own --destroy=always teardown and would orphan a billable VM.
      # Success and failure both already tear down, so only run on cancellation.
      - name: Tear down the Hetzner server
        if: cancelled()
        run: make destroy-hetzner
