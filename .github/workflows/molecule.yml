---
name: molecule

# `on` is quoted so yamllint's truthy rule doesn't read it as a boolean;
# GitHub Actions parses the string trigger key the same way.
#
# Path filter: only fire when something CI actually exercises changes —
# role content, the Tier-3 shared scaffolding, the Galaxy/PyPI deps the
# workflow installs, or this workflow file itself. Renovate dep-bumps
# outside these paths (e.g. yamllint, antsibull-changelog) skip the
# workflow entirely, which keeps the Hetzner spend bounded.
"on":
  pull_request:
    branches: [main]
    paths:
      - 'collections/ansible_collections/jedimasterjonny/lex/roles/**'
      - 'collections/ansible_collections/jedimasterjonny/lex/molecule/shared/hetzner/**'
      - 'requirements.yml'
      - 'requirements-ci.txt'
      - '.github/workflows/molecule.yml'
  push:
    branches: [main]
    paths:
      - 'collections/ansible_collections/jedimasterjonny/lex/roles/**'
      - 'collections/ansible_collections/jedimasterjonny/lex/molecule/shared/hetzner/**'
      - 'requirements.yml'
      - 'requirements-ci.txt'
      - '.github/workflows/molecule.yml'

permissions:
  contents: read

jobs:
  molecule:
    name: Molecule (${{ matrix.role }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        role: [motd]    # Add roles here as they're built. Keep alphabetical.
    # Per-PR (or per-ref for push events) concurrency: same-PR retries cancel
    # the previous run; cross-PR runs proceed in parallel. Drops the previous
    # repo-wide hetzner-molecule cap because that was discarding queued runs
    # whenever Renovate opened a burst of PRs in quick succession (only one
    # could ever be pending, the rest got cancelled before they ran).
    concurrency:
      group: molecule-${{ matrix.role }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      ANSIBLE_FORCE_COLOR: "1"
      PY_COLORS: "1"
      # Scopes Hetzner `run_id` labels per matrix entry so concurrent entries
      # don't clobber each other's servers when cleanup-orphans.yml runs.
      MOLECULE_RUN_ID: ${{ github.run_id }}-${{ matrix.role }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt
      - run: pip install -r requirements-ci.txt
      - run: ansible-galaxy collection install -r requirements.yml

      - name: Run molecule test (ci scenario)
        working-directory: collections/ansible_collections/jedimasterjonny/lex/roles/${{ matrix.role }}
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible.cfg
        run: molecule test -s ci

      - name: Cleanup orphaned Hetzner servers (always runs)
        if: always()
        run: >
          ansible-playbook
          collections/ansible_collections/jedimasterjonny/lex/molecule/shared/hetzner/cleanup-orphans.yml
          -e run_id=$MOLECULE_RUN_ID
