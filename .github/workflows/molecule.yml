---
name: molecule

# "on" is quoted so yamllint's truthy rule does not read it as a boolean.
# Three tiers, routed by the scenarios a role ships: incus runs free on the
# GitHub runner on two images — Tumbleweed (default) and Leap 16 (leap, the
# LEAP_ROLES subset); the full-VM tier runs on a billable Hetzner VM (Hetzner
# Cloud cannot nest KVM, so the VM is the real machine). discover gates each to
# the roles a PR actually touches. No push:main — the --no-ff merge tree equals
# the validated PR tree.
"on":
  pull_request:
    paths:
      - 'roles/**'
      - 'molecule/**'
      - 'inventory/group_vars/all/vault.yml'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'bin/check-role-test-coverage.sh'
      - '.github/workflows/molecule.yml'
  workflow_dispatch:

permissions:
  contents: read

# Per-ref, not global: different PRs run side by side; a re-push supersedes its
# own in-flight run (the hetzner teardown backstop still fires on cancel). Within
# a run, the matrix legs are already parallel and use distinct VM names.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  discover:
    name: discover
    runs-on: ubuntu-latest
    outputs:
      incus: ${{ steps.set.outputs.incus }}
      leap: ${{ steps.set.outputs.leap }}
      hetzner: ${{ steps.set.outputs.hetzner }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      # Emit one matrix per tier from the PR diff. A changed role runs its own
      # tiers; shared infra (anything outside roles/) is exercised via the motd
      # harness. The incus tiers (Tumbleweed default + Leap) are free, so any
      # shared change runs them; the billable hetzner VM validates real-machine
      # behaviour, so a requirements-dev.txt (test/lint toolchain) bump alone
      # stays on the free incus tiers.
      - name: Determine roles and tiers
        id: set
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "workflow_dispatch" ]; then
            roles=$(find roles -mindepth 1 -maxdepth 1 -type d -printf '%f\n')
            shared=""
          else
            changed=$(git diff --name-only "$BASE_SHA...$HEAD_SHA")
            roles=$(printf '%s\n' "$changed" | sed -n 's#^roles/\([^/]*\)/.*#\1#p')
            shared=$(printf '%s\n' "$changed" | grep -vE '^roles/' || true)
          fi

          incus_cand="$roles"
          hetzner_cand="$roles"
          if [ -n "$shared" ]; then
            incus_cand=$(printf '%s\nmotd' "$roles")
            if printf '%s\n' "$shared" | grep -qvE '^requirements-dev\.txt$'; then
              hetzner_cand=$(printf '%s\nmotd' "$roles")
            fi
          fi

          tier_matrix() {  # $1: candidate roles  $2: scenario dir gating the tier
            local out="" r
            for r in $(printf '%s\n' "$1" | sort -u); do
              if [ -n "$r" ] && [ -d "roles/$r/molecule/$2" ]; then
                out="${out}${r}"$'\n'
              fi
            done
            printf '%s' "$out" | jq -R -s -c 'split("\n") | map(select(length > 0))'
          }
          incus=$(tier_matrix "$incus_cand" default)
          leap=$(tier_matrix "$incus_cand" leap)
          hetzner=$(tier_matrix "$hetzner_cand" hetzner)
          echo "incus=$incus" >> "$GITHUB_OUTPUT"
          echo "leap=$leap" >> "$GITHUB_OUTPUT"
          echo "hetzner=$hetzner" >> "$GITHUB_OUTPUT"
          echo "incus: $incus  leap: $leap  hetzner: $hetzner"

  incus:
    name: incus (${{ matrix.role }})
    needs: discover
    if: needs.discover.outputs.incus != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        role: ${{ fromJSON(needs.discover.outputs.incus) }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev tooling
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements-dev.txt

      # The dev-host preseed pins a btrfs pool; GitHub runners are ext4, so init
      # with --auto and a dir pool — the storage driver is irrelevant to the test.
      # The connection plugin runs incus as the runner user, so grant it socket
      # access via the incus-admin group and enter that group with sg.
      - name: Set up incus
        run: |
          sudo apt-get update
          sudo apt-get install -y incus
          sudo incus admin init --auto --storage-backend=dir
          # Docker (preinstalled on the runner) defaults FORWARD to DROP, which
          # blocks incus container NAT; the runner also has no IPv6 egress.
          sudo iptables -P FORWARD ACCEPT
          sudo incus network set incusbr0 ipv6.address none
          sudo usermod -aG incus-admin "$USER"

      # No MOLECULE_RUN_ID: each incus leg gets its own ephemeral runner, so the
      # stable instance name can't collide; only Hetzner's shared account needs one.
      - name: Run the incus molecule scenario
        env:
          ROLE: ${{ matrix.role }}
        run: sg incus-admin -c "make test ROLE=$ROLE"

  leap:
    name: leap (${{ matrix.role }})
    needs: discover
    if: needs.discover.outputs.leap != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        role: ${{ fromJSON(needs.discover.outputs.leap) }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev tooling
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements-dev.txt

      # Same incus setup as the default-image tier above; see its comments.
      - name: Set up incus
        run: |
          sudo apt-get update
          sudo apt-get install -y incus
          sudo incus admin init --auto --storage-backend=dir
          sudo iptables -P FORWARD ACCEPT
          sudo incus network set incusbr0 ipv6.address none
          sudo usermod -aG incus-admin "$USER"

      - name: Run the leap molecule scenario
        env:
          ROLE: ${{ matrix.role }}
        run: sg incus-admin -c "make test-leap ROLE=$ROLE"

  hetzner:
    name: hetzner (${{ matrix.role }})
    needs: discover
    if: needs.discover.outputs.hetzner != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        role: ${{ fromJSON(needs.discover.outputs.hetzner) }}
    # Distinct VM + SSH-key names per run and role, so concurrent legs and runs
    # never collide; create and destroy read the same name, including the
    # cancellation backstop below.
    env:
      MOLECULE_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev tooling
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements-dev.txt

      # VAULT_PASSWORD decrypts the in-repo vault holding the hcloud token — the
      # only secret CI needs; molecule reads this repo-root file as a local run does.
      - name: Write the vault password file
        env:
          VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}
        run: |
          printf '%s' "$VAULT_PASSWORD" > .vault_pass
          chmod 600 .vault_pass

      - name: Run the hetzner molecule scenario
        env:
          ROLE: ${{ matrix.role }}
        run: make test-hetzner ROLE=$ROLE

      # Backstop for cancellation (timeout/manual/supersede), where molecule is
      # killed before its own --destroy=always teardown and would orphan a
      # billable VM. Success and failure both already tear down.
      - name: Tear down the Hetzner server
        if: cancelled()
        env:
          ROLE: ${{ matrix.role }}
        run: make destroy-hetzner ROLE=$ROLE
