---
name: firebase (merge)

# Build jonnyoc-site with Hugo and deploy to the Firebase live channel on merge
# to main. Path-filtered to the site. Auth is keyless via Workload Identity
# Federation: google-github-actions/auth exchanges the runner's OIDC token for
# short-lived credentials for the deploy SA, which the Firebase CLI reads as ADC
# — no SA key. The WIF pool/binding live in terraform/infra-shared.tf, the SA in
# terraform/firebase-jonnyoc-website.tf. Actions pinned by SHA (version in a
# trailing comment); hugo-version is renovate-tracked (see renovate.json).
"on":
  push:
    branches: [main]
    paths:
      - 'jonnyoc-site/**'
      - '.github/workflows/firebase-hosting-merge.yml'

permissions:
  contents: read
  id-token: write # mint the OIDC token WIF exchanges for GCP credentials

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build_and_deploy:
    name: build and deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./jonnyoc-site
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Hugo Modules resolve the theme via Go; pin it rather than use the runner's
      # ambient Go. Both paths are relative to the workspace root; the module go.sum
      # lives under jonnyoc-site/, so point the cache key there too.
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: jonnyoc-site/go.mod
          cache-dependency-path: jonnyoc-site/go.sum

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: "0.164.0"
          extended: true

      # No -E/-F: the live deploy honours hugo.toml's buildFuture=false and
      # expiryDate, so future-dated and expired content stays unpublished.
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --minify -d public

      # Keyless auth: exchanges the runner's OIDC token for credentials for the
      # deploy SA, exported as ADC for the Firebase CLI in the next step.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/1052179412171/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-action-815812811@jonnyoc-website.iam.gserviceaccount.com

      - name: Deploy to the live channel
        run: npx --yes firebase-tools@15.23.0 deploy --only hosting --project jonnyoc-website --non-interactive
