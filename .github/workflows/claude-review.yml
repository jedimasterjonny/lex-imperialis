---
name: claude-review

# `on` is quoted so yamllint's truthy rule doesn't read it as a boolean;
# GitHub Actions parses the string trigger key the same way.
"on":
  pull_request_target:
    types: [labeled]

permissions:
  pull-requests: write

jobs:
  # Posts an `@claude` comment so the Claude GitHub App reviews the PR.
  # The `labeled` event fires for every label addition — including labels
  # set at PR creation via Renovate's `addLabels` — so this single trigger
  # covers both auto and manual paths without risking a duplicate comment.
  request-review:
    if: github.event.label.name == 'claude-review'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Request Claude review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: >
          gh pr comment "$PR_NUMBER"
          --body "@claude review"
