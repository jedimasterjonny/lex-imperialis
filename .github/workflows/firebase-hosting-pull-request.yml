---
name: firebase (preview)

# Build jonnyoc-site and deploy a 30-day preview channel for PRs touching the
# site, commenting its URL on the PR. Auth is keyless via Workload Identity
# Federation — see the merge workflow. hugo-version is renovate-tracked.
#
# No PR paths filter: the workflow runs on every PR so site-gate (a fixed-name,
# always-reporting required check) can gate the automerge — a hugo/theme bump
# that breaks the build fails the gate instead of merging into a broken live
# deploy (which the merge workflow would fail, leaving the old site up). discover
# decides whether the build runs; a non-site PR skips it and still passes the gate.
#
# The build is split from the preview deploy: the build needs no secret, so it is
# the gate (site-gate reflects it) and runs for every in-scope PR including forks;
# the preview deploy needs WIF, so it is a separate best-effort job that forks skip
# and that a Firebase API flake can fail without reddening the required gate.
"on":
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  discover:
    name: discover
    runs-on: ubuntu-latest
    outputs:
      site: ${{ steps.set.outputs.site }}
    steps:
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      # Build only when the diff touches jonnyoc-site/ or this workflow; otherwise
      # the build skips and site-gate still reports green, so a non-site PR is never
      # blocked on a check that never runs. Unlike terraform's discover, *.md is not
      # dropped — the site's content is markdown, and a post that breaks the build
      # must be caught. git diff on its own line so a real git failure aborts under
      # set -e instead of yielding an empty diff read as "not in scope".
      - name: Determine whether the site is in scope
        id: set
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          changed=$(git diff --name-only "$BASE_SHA...$HEAD_SHA")
          if printf '%s\n' "$changed" \
            | grep -qE -e '^jonnyoc-site/' -e '^\.github/workflows/firebase-hosting-pull-request\.yml$'; then
            site=true
          else
            site=false
          fi
          echo "site=$site" >> "$GITHUB_OUTPUT"
          echo "site in scope: $site"

  build:
    name: build
    needs: discover
    if: needs.discover.outputs.site == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./jonnyoc-site
    steps:
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: jonnyoc-site/go.mod
          cache-dependency-path: jonnyoc-site/go.sum

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: "0.164.0"
          extended: true

      # Build exactly as the live merge deploy does — no -E -F, so hugo.toml's
      # buildFuture=false and expiryDate apply — so a green gate means the merge
      # build succeeds (the gate predicts the live build, not the preview). A hugo
      # or theme bump that breaks compilation fails here regardless of content.
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --minify -d public

  preview:
    name: preview
    needs: build
    # Best-effort preview: only for same-repo PRs (forks can't mint the WIF
    # id-token). needs:build skips it on a non-site PR (build skipped) or a broken
    # build (implicit success()), so it only runs on a green in-scope build. Its
    # failure never blocks the merge — site-gate reflects build, not this.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint the OIDC token WIF exchanges for GCP credentials
      pull-requests: write # comment the preview-channel URL on the PR
    defaults:
      run:
        working-directory: ./jonnyoc-site
    steps:
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: jonnyoc-site/go.mod
          cache-dependency-path: jonnyoc-site/go.sum

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: "0.164.0"
          extended: true

      # -E -F: unlike the gate build and the live deploy, the preview includes
      # future-dated and expired content so scheduled posts can be reviewed before
      # they publish.
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo -E -F --minify -d public

      # Keyless auth: exchanges the runner's OIDC token for credentials for the
      # deploy SA, exported as ADC for the Firebase CLI in the next step.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/1052179412171/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-action-815812811@jonnyoc-website.iam.gserviceaccount.com

      # Deploy to an ephemeral preview channel (auto-expires) and comment its URL
      # on the PR. Found by a hidden marker, not --edit-last, so it never clobbers
      # the terraform plan comment (same bot author) on a PR touching both trees.
      - name: Deploy a preview channel
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.number }}
        run: |
          npx --yes firebase-tools@15.24.0 hosting:channel:deploy "preview-${PR}" \
            --project jonnyoc-website --expires 30d --json > channel.json
          url=$(jq -r '.result[].url' channel.json)
          {
            echo '<!-- firebase-preview -->'
            echo "### Firebase Hosting preview"
            echo
            echo "This PR is deployed to a 30-day preview channel:"
            echo
            echo "$url"
          } > preview.md
          id=$(gh pr view "$PR" --json comments \
            --jq '[.comments[] | select(.body | contains("<!-- firebase-preview -->"))] | last | .url // empty')
          if [ -n "$id" ]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/${id##*-}" -f body="$(cat preview.md)" >/dev/null
          else
            gh pr comment "$PR" --body-file preview.md
          fi

  # Fixed-name summary check for branch protection: the build is skipped on a
  # non-site PR, so this always-running job reports the real result — green there,
  # so a required check doesn't wedge every non-site PR on a check that never runs.
  # It reflects the build (which runs for every in-scope PR, forks included) and
  # not the best-effort preview. Make this a required check so an automerge waits
  # on it.
  site-gate:
    name: site-gate
    if: always()
    needs: [discover, build]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if the build failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "the site build failed or was cancelled."
          exit 1
