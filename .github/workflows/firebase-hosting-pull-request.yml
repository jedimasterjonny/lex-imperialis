---
name: firebase (preview)

# Build jonnyoc-site and deploy a 30-day preview channel for PRs touching the
# site, commenting its URL on the PR. Skipped for fork PRs (no id-token for WIF).
# Auth is keyless via Workload Identity Federation — see the merge workflow.
# hugo-version is renovate-tracked.
"on":
  pull_request:
    paths:
      - 'jonnyoc-site/**'
      - '.github/workflows/firebase-hosting-pull-request.yml'

permissions:
  contents: read
  id-token: write # mint the OIDC token WIF exchanges for GCP credentials
  pull-requests: write # comment the preview-channel URL on the PR

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build_and_preview:
    name: build and preview
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./jonnyoc-site
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: jonnyoc-site/go.mod
          cache-dependency-path: jonnyoc-site/go.sum

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: "0.164.0"
          extended: true

      # -E -F: the preview intentionally includes expired and future-dated content
      # so scheduled posts can be reviewed before the live deploy omits them.
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo -E -F --minify -d public

      # Keyless auth: exchanges the runner's OIDC token for credentials for the
      # deploy SA, exported as ADC for the Firebase CLI in the next step.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/1052179412171/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-action-815812811@jonnyoc-website.iam.gserviceaccount.com

      # Deploy to an ephemeral preview channel (auto-expires) and comment its URL
      # on the PR. Found by a hidden marker, not --edit-last, so it never clobbers
      # the terraform plan comment (same bot author) on a PR touching both trees.
      - name: Deploy a preview channel
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.number }}
        run: |
          npx --yes firebase-tools@15.23.0 hosting:channel:deploy "preview-${PR}" \
            --project jonnyoc-website --expires 30d --json > channel.json
          url=$(jq -r '.result[].url' channel.json)
          {
            echo '<!-- firebase-preview -->'
            echo "### Firebase Hosting preview"
            echo
            echo "This PR is deployed to a 30-day preview channel:"
            echo
            echo "$url"
          } > preview.md
          id=$(gh pr view "$PR" --json comments \
            --jq '[.comments[] | select(.body | contains("<!-- firebase-preview -->"))] | last | .url // empty')
          if [ -n "$id" ]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/${id##*-}" -f body="$(cat preview.md)" >/dev/null
          else
            gh pr comment "$PR" --body-file preview.md
          fi
