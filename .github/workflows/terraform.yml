---
name: terraform

# terraform/ runs OpenTofu locally against the HCP workspace (Local execution),
# so this plans on the runner rather than via HCP's remote runs. tofu, the venv
# (for ansible-vault), and .vault_pass are all it needs — the HCP and Cloudflare
# tokens come from the vault, so VAULT_PASSWORD is the only secret. Offline
# fmt/validate/tflint stay in the lint workflow.
"on":
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      # bin/vault-var.sh only needs ansible-vault to read the tokens; requirements.txt
      # (ansible) supplies it without the dev toolchain (molecule, linters).
      - name: Install ansible-vault
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: "1.12.3"
          tofu_wrapper: false

      - name: Write the vault password file
        env:
          VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}
        run: |
          printf '%s' "$VAULT_PASSWORD" > .vault_pass
          chmod 600 .vault_pass

      # TF_TOKEN_app_terraform_io is the non-interactive form of `tofu login`; it
      # authenticates init/plan to the HCP workspace. The Cloudflare token feeds
      # the provider. set +e captures the output and exit code so the next step
      # can post the plan and still fail the job on a real error.
      - name: Plan
        id: plan
        run: |
          set +e
          export TF_TOKEN_app_terraform_io="$(bin/vault-var.sh terraform_hcp_token)"
          export TF_VAR_cloudflare_api_token="$(bin/vault-var.sh terraform_cloudflare_api_token)"
          # -lock=false: this plan is read-only, and cancel-in-progress could kill
          # it mid-run and orphan the HCP state lock (local execution holds it).
          { tofu -chdir=terraform init -input=false \
            && tofu -chdir=terraform plan -input=false -no-color -lock=false; } 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      # One comment per PR, edited in place on re-push. Truncated to stay under
      # GitHub's 65536-char comment limit; the full plan is in the run log.
      - name: Comment the plan on the PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          CODE: ${{ steps.plan.outputs.exitcode }}
        run: |
          status=$([ "$CODE" = 0 ] && echo 'ok' || echo "failed (exit $CODE)")
          {
            echo "### OpenTofu plan — $status"
            echo '<details><summary>Show plan</summary>'
            echo
            echo '```'
            head -c 60000 plan.txt
            echo
            echo '```'
            echo '</details>'
            echo
            echo '_Full output in the run log._'
          } > comment.md
          gh pr comment "$PR" --body-file comment.md --edit-last --create-if-none

      - name: Fail if the plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1
