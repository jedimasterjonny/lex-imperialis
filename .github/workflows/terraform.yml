---
name: terraform

# terraform/ runs OpenTofu locally against the HCP workspace (Local execution),
# so this runs on the runner rather than via HCP's remote runs: a PR plans (as
# the read-only tofu-plan SA) and comments the plan; a merge to main applies (as
# the write tofu-apply SA). tofu, the venv (for ansible-vault), and .vault_pass
# are all it needs — the HCP, Cloudflare, and Hetzner tokens come from the vault
# and GCP auth is keyless via WIF, so VAULT_PASSWORD is the only secret. Offline
# fmt/validate/tflint stay in the lint workflow.
#
# No PR paths filter: the workflow runs on every PR so terraform-gate (a required
# check) always reports. discover decides whether the plan actually runs, and a
# non-infra PR skips it and still passes the gate. Because renovate automerges
# minor/patch bumps into the merge-to-main apply with no human reading the plan,
# the plan job is the safety gate: it halts on any destructive action, so routine
# in-place updates flow through unattended while a delete/replace stops for review.
"on":
  pull_request:
  # push keeps its paths filter — it only ever needs to run to apply a terraform
  # change (or a bump to this workflow, which the apply job reads).
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
  # Weekly drift check: plan main against live infra and fail on any diff. An
  # off-:00 minute — GitHub delays or drops on-the-hour crons.
  schedule:
    - cron: '41 6 * * 1' # Mondays 06:41 UTC

# Floor for the whole workflow; the plan job elevates to what WIF and the PR
# comment need. discover and terraform-gate get no more than this read.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  discover:
    name: discover
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.set.outputs.terraform }}
    steps:
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      # Only a PR needs filtering: push is paths-gated to terraform changes and
      # schedule/dispatch always plan. For a PR, plan only when the diff touches
      # terraform/ or this workflow; otherwise the plan job skips and
      # terraform-gate still reports green, so a non-infra PR is never blocked on
      # a check that never runs. *.md is dropped first (as molecule's discover
      # does) so a docs-only edit — e.g. terraform/README.md — plans nothing. git
      # diff on its own line so a real git failure aborts under set -e instead of
      # yielding an empty diff read as "not in scope".
      - name: Determine whether terraform is in scope
        id: set
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            all_changed=$(git diff --name-only "$BASE_SHA...$HEAD_SHA")
            changed=$(printf '%s\n' "$all_changed" | grep -vE '\.md$' || true)
            if printf '%s\n' "$changed" \
              | grep -qE -e '^terraform/' -e '^\.github/workflows/terraform\.yml$'; then
              tf=true
            else
              tf=false
            fi
          else
            tf=true
          fi
          echo "terraform=$tf" >> "$GITHUB_OUTPUT"
          echo "terraform in scope: $tf"

  plan:
    name: plan
    needs: discover
    # Run when terraform is in scope (always so, except a PR that doesn't touch
    # it) and this is not a fork PR — forks can't mint the WIF id-token or read
    # the vault, so skip them cleanly (a skipped plan still passes terraform-gate)
    # rather than fail red at the auth step. Push/dispatch/schedule always run.
    if: >-
      ${{ needs.discover.outputs.terraform == 'true'
      && (github.event_name != 'pull_request'
      || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    # A hung apply holds the HCP state lock until the job dies — 6h on the
    # default. Well above a plan+apply of this config, well below that.
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write # mint the OIDC token that WIF exchanges for GCP credentials
    steps:
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      # bin/vault-var.sh only needs ansible-vault to read the tokens; requirements.txt
      # (ansible) supplies it without the dev toolchain (molecule, linters).
      - name: Install ansible-vault
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: "1.12.4"
          tofu_wrapper: false

      # Authenticate to GCP via Workload Identity Federation (no key): the
      # runner's OIDC token is exchanged for short-lived credentials, which the
      # google provider reads as ADC. A PR impersonates the read-only tofu-plan
      # SA; a push to main impersonates the write tofu-apply SA. Both, and the
      # pool/provider, are defined in terraform/infra-shared.tf.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/1052179412171/locations/global/workloadIdentityPools/github/providers/github
          service_account: >-
            ${{ github.event_name == 'push'
            && 'tofu-apply@jonnyoc-infra-shared.iam.gserviceaccount.com'
            || 'tofu-plan@jonnyoc-infra-shared.iam.gserviceaccount.com' }}

      - name: Write the vault password file
        env:
          VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}
        run: |
          printf '%s' "$VAULT_PASSWORD" > .vault_pass
          chmod 600 .vault_pass

      # Plan to a file so the apply below runs exactly this plan, not a fresh
      # re-plan, and so the destructive-action check reads the same plan the human
      # (or, for a routine bump, nobody) would see. TF_TOKEN_app_terraform_io is
      # the non-interactive `tofu login` for the HCP workspace; the Cloudflare and
      # Hetzner tokens feed their providers. -lock=false: the plan is read-only
      # (apply re-locks and re-checks the saved plan), and cancel-in-progress could
      # otherwise kill it mid-run and orphan the HCP state lock. set +e captures the
      # output and exit code so the next step can post the plan and still fail the
      # job on a real error.
      - name: Plan
        id: plan
        env:
          EVENT: ${{ github.event_name }}
        run: |
          set +e
          # Scheduled runs only: -detailed-exitcode makes plan exit 2 on any diff,
          # so the fail step flags drift. A PR plan with changes is expected, so it
          # stays a plain plan (exit 0) and must not start failing.
          detail=""
          [ "$EVENT" = "schedule" ] && detail="-detailed-exitcode"
          # Assign then export separately (matches Apply): `export VAR=$(...)` would
          # mask the vault lookup's exit under shellcheck's SC2155, and reads cleaner.
          TF_TOKEN_app_terraform_io="$(bin/vault-var.sh terraform_hcp_token)"
          TF_VAR_cloudflare_api_token="$(bin/vault-var.sh terraform_cloudflare_api_token)"
          TF_VAR_hcloud_token="$(bin/vault-var.sh hcloud_token_emmas_edit)"
          export TF_TOKEN_app_terraform_io TF_VAR_cloudflare_api_token TF_VAR_hcloud_token
          # -no-color on both: the combined output is teed into the PR comment.
          { tofu -chdir=terraform init -input=false -no-color \
            && tofu -chdir=terraform plan -input=false -no-color -lock=false $detail -out=tfplan; } 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      # One comment per PR, edited in place on re-push. Found by a hidden marker,
      # not --edit-last, so it never clobbers the firebase preview comment (same
      # bot author) on a PR that touches both trees. Truncated to stay under
      # GitHub's 65536-char comment limit; the full plan is in the run log.
      - name: Comment the plan on the PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          CODE: ${{ steps.plan.outputs.exitcode }}
        run: |
          status=$([ "$CODE" = 0 ] && echo 'ok' || echo "failed (exit $CODE)")
          {
            echo '<!-- tofu-plan -->'
            echo "### OpenTofu plan — $status"
            echo '<details><summary>Show plan</summary>'
            echo
            echo '```'
            head -c 60000 plan.txt
            echo
            echo '```'
            echo '</details>'
            echo
            echo '_Full output in the run log._'
          } > comment.md
          id=$(gh pr view "$PR" --json comments \
            --jq '[.comments[] | select(.body | contains("<!-- tofu-plan -->"))] | last | .url // empty')
          if [ -n "$id" ]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/${id##*-}" -f body="$(cat comment.md)" >/dev/null
          else
            gh pr comment "$PR" --body-file comment.md
          fi

      # exitcode 2 only ever occurs on a scheduled run (-detailed-exitcode), so
      # the drift branch can't misfire on a PR or dispatch. Runs for every event:
      # a plan error must fail the job before the apply below can run a bad plan.
      - name: Fail on plan error or drift
        if: steps.plan.outputs.exitcode != '0'
        run: |
          if [ "${{ steps.plan.outputs.exitcode }}" = 2 ]; then
            echo "::error::OpenTofu drift — live infra differs from terraform/ on main; see the plan output."
          else
            echo "::error::OpenTofu plan errored (exit ${{ steps.plan.outputs.exitcode }})."
          fi
          exit 1

      # The automation gate — CI never applies a delete or replace. Minor/patch
      # bumps automerge and apply with no human reading the plan, so a destructive
      # plan is the one thing that must stop: on a PR it fails terraform-gate and
      # blocks the automerge; on a push (a bump gone destructive because live infra
      # drifted since its PR plan) it halts before the apply below. A deliberate
      # destroy is landed with a local `make tofu-apply` — the sanctioned path for
      # the rare acts CI's scoped SA can't make (terraform/README). tofu encodes a
      # replace as a delete+create action pair, so any "delete" catches both.
      - name: Halt on a destructive plan
        if: (github.event_name == 'pull_request' || github.event_name == 'push') && steps.plan.outputs.exitcode == '0'
        run: |
          set -euo pipefail
          destroys=$(tofu -chdir=terraform show -json tfplan \
            | jq -r '.resource_changes[] | select(.change.actions | index("delete")) | .address')
          if [ -n "$destroys" ]; then
            echo "::error::Plan would delete or replace resources — CI won't apply these; run 'make tofu-apply' locally:"
            printf '%s\n' "$destroys"
            exit 1
          fi
          echo "No destructive actions in the plan."

      # Merge to main: apply the plan saved above (not a fresh re-plan), so what
      # applies is what was logged. Unlike the read-only plan this locks the HCP
      # state; a stale saved plan (state moved since the plan) makes apply error
      # rather than apply something unreviewed. The concurrency group serialises
      # main runs and never auto-cancels them; a manual cancel, job timeout, or
      # runner death mid-apply can still orphan the lock, recoverable with
      # `tofu force-unlock`.
      - name: Apply
        if: github.event_name == 'push'
        run: |
          # Assign then export separately: `export VAR=$(...)` would mask a failed
          # vault lookup under `set -e` (export's own exit status is 0).
          TF_TOKEN_app_terraform_io="$(bin/vault-var.sh terraform_hcp_token)"
          TF_VAR_cloudflare_api_token="$(bin/vault-var.sh terraform_cloudflare_api_token)"
          TF_VAR_hcloud_token="$(bin/vault-var.sh hcloud_token_emmas_edit)"
          export TF_TOKEN_app_terraform_io TF_VAR_cloudflare_api_token TF_VAR_hcloud_token
          tofu -chdir=terraform apply -input=false -no-color tfplan

  # Fixed-name summary check for branch protection: the plan job is skipped on a
  # non-infra PR, so this always-running job reports the real result — green there,
  # so a required check doesn't wedge every non-infra PR on a check that never runs.
  # But a fork PR that *does* touch terraform also skips the plan (it can't reach
  # the vault or WIF), and a green gate would then wave an unplanned, unchecked infra
  # change past the required check — so fail when discover flagged terraform in scope
  # yet the plan didn't run. Make this a required check (with strict status policy)
  # so an automerge waits on it.
  terraform-gate:
    name: terraform-gate
    if: always()
    needs: [discover, plan]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if the plan failed, was cancelled, or was skipped in scope
        if: >-
          contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
          || (needs.discover.outputs.terraform == 'true' && needs.plan.result == 'skipped')
        run: |
          echo "terraform plan failed, was cancelled, or was skipped while terraform was in scope (e.g. a fork PR that can't run the gated plan)."
          exit 1
