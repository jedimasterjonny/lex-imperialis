# Anchors pytest's rootdir at the repo root, so the repo-root conftest.py (the
# host fixture the role verify suites depend on) loads no matter which directory
# molecule invokes pytest from. Without an ini here rootdir would fall back to
# the tests directory and the fixture would go undiscovered.
[pytest]
# Put the repo root on sys.path so the suites can import the shared testlib
# regardless of pytest's cwd; resolved relative to rootdir (this file), so it is
# the repo root whichever scenario directory molecule runs from.
pythonpath = .
