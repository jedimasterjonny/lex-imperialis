---
# this_host, not localhost: redefining the reserved localhost would reroute
# delegate_to: localhost and local tasks over SSH. Reached at loopback as the
# ansible account (NOPASSWD sudo) so plays escalate without a password.
all:
  hosts:
    this_host:
      ansible_host: 127.0.0.1
      ansible_user: ansible
    # Remote fleet host, driven from the control host. No ansible_host: the
    # inventory name resolves on the LAN (DHCP-registered), so the address
    # stays out of this public repo.
    solar:
      ansible_user: ansible
    # Reached over the WireGuard tunnel, not the LAN, so unlike solar it needs
    # an explicit ansible_host. The VPN address is RFC1918, not public topology,
    # and already appears in bootstrap/rogue-trader.yml.
    rogue-trader:
      ansible_host: 192.168.3.3
      ansible_user: ansible
    # The Synology NAS, not a fleet openSUSE host: managed unprivileged as jonny
    # (in the docker group; sudo needs a password). The DSM python is 3.8, too old
    # for ansible-core, so point at the Python 3.9 DSM package. No ansible_host:
    # the name resolves on the LAN, like solar.
    administratum:
      ansible_user: jonny
      ansible_python_interpreter: /usr/local/bin/python3.9
